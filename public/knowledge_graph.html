יחסים ובעסקים.", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_1_כוחה_של_פגיעות_vulnerability", "label": "1. כוחה של פגיעות (Vulnerability)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. כוחה של פגיעות (Vulnerability)", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "פגיעות היא אי-הוודאות, הסיכון והחשיפה הרגשית המעורבים בפעולות יומיומיות. להיות פגיע משמעו להופיע ולהיראות במלואנו גם כשאין לנו שום דרך לשלוט בתוצאה (למשל: לומר \"אני אוהב אותך\" ראשון, לבקש עזרה, או להודות בטעות). זהו האומץ הבסיסי ביותר.", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_2_בושה_shame_מול_אשמה_guilt", "label": "2. בושה (Shame) מול אשמה (Guilt)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. בושה (Shame) מול אשמה (Guilt)", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "בושה היא המחסום המרכזי שמונע מאיתנו להיות פגיעים וקשורים לאחרים.\n*   **אשמה:** \"עשיתי משהו רע\" (התמקדות במעשה, מאפשרת תיקון ולקיחת אחריות).\n*   **בושה:** \"אני אדם רע\" (התמקדות בערך העצמי, מובילה להסתרה ולהרס עצמי).\nהבושה משגשגת בסודיות, שתיקה ושיפוט. התרופה לבושה היא **אמפתיה** – חשיפת הפגיעות בפני אדם שראוי לשמוע את הסיפור שלנו ומגיב בהבנה.", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_3_אומץ_ושייכות_wholeheartedness", "label": "3. אומץ ושייכות (Wholeheartedness)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. אומץ ושייכות (Wholeheartedness)", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "אנשים שחיים \"בכל הלב\" מתאפיינים באמונה שהם ראויים לאהבה ולשייכות בדיוק כפי שהם, מבלי שיצטרכו \"להרוויח\" זאת. שייכות אמיתית אינה מתרחשת כשאנו משנים את עצמנו כדי להתאים לאחרים (Fitting in), אלא כשאנו מציגים בפני העולם את מי שאנחנו באמת.", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "אישיות בריאה דורשת ויתור על הפרפקציוניזם, שמשמש כשריון שנועד להגן עלינו מפני כאב וביקורת. במערכות יחסים, הקשר העמוק ביותר נוצר דווקא ברגעים של חשיפה רגשית. אם אנו אוטמים את עצמנו מחשש להיפגע, אנו אוטמים את עצמנו גם ליכולת לחוש שמחה גדולה, אהבה והכרת תודה.", "_is_h1": false}, {"id": "knowledge_base_relationships_buber", "label": "relationships_buber.md", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_buber.md", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_buber_פילוסופיית_הדיאלוג_ויחסי_אני_אתה_martin_buber", "label": "פילוסופיית הדיאלוג ויחסי אני-אתה (Martin Buber)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "פילוסופיית הדיאלוג ויחסי אני-אתה (Martin Buber)", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nMartin Buber's I and Thou", "_is_h1": true}, {"id": "knowledge_base_relationships_buber_הגדרה", "label": "הגדרה", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 1, "_description": "מרטין בובר, פילוסוף יהודי אקזיסטנציאליסט, חקר את מהות הקיום האנושי דרך הפריזמה של מערכות יחסים ודיאלוג. בספרו \"אני ואתה\" (I and Thou), בובר טוען כי האדם אינו קיים במנותק, אלא תמיד ביחס למשהו או למישהו אחר. הוא מגדיר שתי צורות בסיסיות של יחס אל העולם.", "_is_h1": false}, {"id": "knowledge_base_relationships_buber_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_buber_1_יחסי_אני_לזאת_i_it", "label": "1. יחסי אני-לזאת (I-It)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. יחסי אני-לזאת (I-It)", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 1, "_description": "זהו המצב הנפוץ והיומיומי ביותר. במצב זה, האדם מתייחס לזולת או לעולם כאובייקט, כאמצעי להשגת מטרה, או כאוסף של תכונות שניתן למדוד ולנתח. היחס הוא תועלתני, מרוחק וחסר מעורבות רגשית עמוקה. \n*   **לדוגמה:** ההתייחסות למלצר רק כמי שמביא לנו אוכל, או שימוש בקשר חברתי רק כדי לקדם אינטרס אישי. זהו מצב הכרחי להישרדות ולתפקוד בחברה, אך הוא חסר נשמה.", "_is_h1": false}, {"id": "knowledge_base_relationships_buber_2_יחסי_אני_אתה_i_thou", "label": "2. יחסי אני-אתה (I-Thou)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. יחסי אני-אתה (I-Thou)", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 1, "_description": "זהו מפגש אותנטי, עמוק והדדי בין שני סובייקטים. במצב זה, האדם רואה את הזולת בשלמותו, ללא שיפוטיות, וללא מטרה נסתרת. המפגש מתרחש ב\"כאן ועכשיו\" מתוך נוכחות מוחלטת.\n*   **מאפיינים:** היחס הוא ישיר, קרוב ובלתי אמצעי. אין בו ניסיון לשלוט או לתמרן את האחר. בובר האמין כי רק מתוך יחסי \"אני-אתה\", האדם יכול לחוות את מלוא אנושיותו ולהתקרב אל המוחלט (האלוהי).", "_is_h1": false}, {"id": "knowledge_base_relationships_buber_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 34, "community_name": "Community 34", "source_file": "knowledge_base/relationships_buber.md", "file_type": "document", "degree": 1, "_description": "על פי בובר, אישיות האדם מתעצבת מתוך הדיאלוג. אנחנו לא נולדים כ\"אני\" מגובש, אלא ה\"אני\" שלנו נוצר מתוך המפגש עם ה\"אתה\". מערכת יחסים אמיתית אינה בנויה על מה שאדם אחד עושה לשני, אלא על המרחב שנוצר *ביניהם* (The Between). מעבר מדיבור על אנשים (I-It) לדיבור עִם אנשים (I-Thou) הוא המפתח ליחסים בין-אישיים משמעותיים ומספקים.", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius", "label": "relationships_confucius.md", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_confucius.md", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius_רן_וחמש_מערכות_היחסים_confucius", "label": "רן וחמש מערכות היחסים (Confucius)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "רן וחמש מערכות היחסים (Confucius)", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nThe Analects of Confucius", "_is_h1": true}, {"id": "knowledge_base_relationships_confucius_הגדרה", "label": "הגדרה", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 1, "_description": "הפילוסופיה של קונפוציוס מתמקדת בטיפוח אופי מוסרי כדי לייצר הרמוניה חברתית. בניגוד לתפיסות המעמידות את האינדיבידואל במרכז, קונפוציוס ראה את אישיות האדם כדבר שנבנה ומתקיים אך ורק דרך מערכות היחסים שלו עם אחרים. המידה הטובה הגבוהה ביותר היא ה\"רן\" (Ren) - אנושיות או חסד - והיא באה לידי ביטוי במבנה היררכי והדדי המכונה \"חמש מערכות היחסים\" (The Five Bonds).", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius_1_רן_ren_אנושיות", "label": "1. רן (Ren) - אנושיות", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. רן (Ren) - אנושיות", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 1, "_description": "המושג \"רן\" מורכב בסינית מהסימניות של \"אדם\" ו\"שניים\", מה שמדגיש כי אנושיות קיימת רק באינטראקציה בין אנשים. זהו פוטנציאל שאינו מולד בצורה מושלמת, אלא דורש עבודה עצמית, אמפתיה והתנהגות ראויה. אדם שמגלם את הרן (Junzi - \"אדם מעולה\") פועל מתוך חמלה וכבוד לזולת ומהווה מודל מוסרי לחיקוי.", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius_2_חמש_מערכות_היחסים_the_five_bonds", "label": "2. חמש מערכות היחסים (The Five Bonds)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. חמש מערכות היחסים (The Five Bonds)", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 1, "_description": "קונפוציוס האמין שהחברה מתפקדת בהרמוניה כאשר כל אדם מבין את תפקידו ואת החובות ההדדיות הנגזרות ממנו. מערכות אלו מבוססות על הדדיות - לכל צד יש מחויבות כלפי הצד השני:\n1. **שליט ונתין:** השליט חייב להיות מיטיב ולדאוג לעם, והנתין חב לו נאמנות.\n2. **אב ובן (כיבוד אבות):** האב מספק הגנה והכוונה; הבן מעניק כבוד, ציות וטיפול (Filial Piety). זהו הבסיס לכל שאר מערכות היחסים.\n3. **בעל ואישה:** מושתת על תמיכה הדדית, כאשר לכל אחד יש תפקיד מובחן (היסטורית - חלוקה מגדרית של פרנסה וניהול משק הבית).\n4. **אח בוגר ואח צעיר:** האח הבוגר מדריך ומגן, הצעיר מכבד ומציית.\n5. **חבר וחבר:** מערכת היחסים היחידה בין שווים, המבוססת על אמון, נאמנות ועידוד הדדי לצמיחה מוסרית.", "_is_h1": false}, {"id": "knowledge_base_relationships_confucius_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 35, "community_name": "Community 35", "source_file": "knowledge_base/relationships_confucius.md", "file_type": "document", "degree": 1, "_description": "בקונפוציאניזם, **המשפחה היא מגרש האימונים של האישיות**. דרך תרגול של מידות כמו \"רן\", כבוד ונימוס (Li) בתוך המשפחה, האדם לומד כיצד להתנהל מול העולם הרחב. ההיררכיה אינה נתפסת כדיכוי, אלא כמסגרת שמעניקה סדר וביטחון, בה כל אדם זוכה לכבוד הראוי לו על פי תפקידו. שגשוג אישי אפשרי רק כאשר הקהילה כולה משגשגת, וזה מושג כאשר כל פרט ממלא את תפקידו מתוך אהבת אדם.", "_is_h1": false}, {"id": "knowledge_base_relationships_kant", "label": "relationships_kant.md", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_kant.md", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_kant_הצו_הקטגורי_והאדם_כתכלית_kant", "label": "הצו הקטגורי והאדם כתכלית (Kant)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "הצו הקטגורי והאדם כתכלית (Kant)", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nGroundwork of the Metaphysics of Morals (Immanuel Kant)", "_is_h1": true}, {"id": "knowledge_base_relationships_kant_הגדרה", "label": "הגדרה", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 1, "_description": "עמנואל קאנט ביסס את הפילוסופיה של המוסר שלו על התבונה. הוא טען שלכל בני האדם יש ערך מוחלט (כבוד אנושי סגולי) מעצם היותם יצורים תבוניים המסוגלים לקבל החלטות מוסריות חופשיות. הגישה הקאנטיאנית מתנגדת לשימוש באנשים כ\"כלים\" ודורשת יחס של כבוד עמוק לאוטונומיה של כל פרט.", "_is_h1": false}, {"id": "knowledge_base_relationships_kant_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_kant_1_הצו_הקטגורי_הנוסחה_של_האנושיות", "label": "1. הצו הקטגורי: הנוסחה של האנושיות", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. הצו הקטגורי: הנוסחה של האנושיות", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 1, "_description": "הניסוח המפורסם ביותר של קאנט לאתיקה בינאישית הוא:\n*\"עשה פעולתך כך שהאנושות, הן שבך והן שבכל איש אחר, תשמש לך לעולם גם תכלית ולעולם לא אמצעי בלבד.\"*\n* **אמצעי (Means):** שימוש באדם כדי להשיג מטרה אישית (למשל, להשתמש בקופאי כדי לשלם על מצרכים).\n* **תכלית (End):** הכרה בכך שלאותו אדם יש רצונות, חיים, תבונה וכבוד משלו.\n\nקאנט אינו אוסר על כך שנעזר באנשים (אמצעי), אך הוא דורש ש*בנוסף* לכך תמיד נכיר בהם כתכלית בפני עצמם.", "_is_h1": false}, {"id": "knowledge_base_relationships_kant_2_כבוד_ואוטונומיה", "label": "2. כבוד ואוטונומיה", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. כבוד ואוטונומיה", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 1, "_description": "האישיות האנושית זוכה לכבוד לא בגלל הישגים, סטטוס או כסף, אלא אך ורק בזכות יכולתה לחקיקה עצמית מוסרית (אוטונומיה). כל פגיעה ברצון החופשי של אדם אחר (למשל, על ידי שקר או מניפולציה) היא פגיעה באנושיות שלו.", "_is_h1": false}, {"id": "knowledge_base_relationships_kant_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 36, "community_name": "Community 36", "source_file": "knowledge_base/relationships_kant.md", "file_type": "document", "degree": 1, "_description": "מערכת יחסים ראויה, לפי קאנט, היא כזו שאין בה מניפולציה או ניצול חסר הסכמה. \n* **הימנעות משימוש אינסטרומנטלי:** אם אדם מקיים חברות רק כדי לקדם את העסק שלו, הוא משתמש בחברו כ\"אמצעי בלבד\", וזה פסול מוסרית.\n* **הסכמה אמיתית:** אינטראקציה בריאה דורשת שקיפות, כך שהצד השני יכול לבחור בתבונה אם לקחת בה חלק.\nהאישיות המוסרית מתפתחת כאשר האדם מתרגל התנהגות שרואה את כולם סביבו - החל מבן הזוג ועד לאדם זר ברחוב - כישויות שוות ערך בעלות מטרה פנימית משלהן.", "_is_h1": false}];

const LEGEND = [];

// HTML-escape helper — prevents XSS when injecting graph data into innerHTML
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Build vis datasets
const nodesDS = new vis.DataSet(RAW_NODES.map(n => ({
  id: n.id, label: n.label, color: n.color, size: n.size,
  font: n.font, title: n.title,
  _community: n.community, _community_name: n.community_name, _description: n._description, _is_h1: n._is_h1,
  _source_file: n.source_file, _file_type: n.file_type, _degree: n.degree,
})));

const edgesDS = new vis.DataSet(RAW_EDGES.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  label: '',
  title: e.title,
  dashes: e.dashes,
  width: e.width,
  color: e.color,
  arrows: { to: { enabled: true, scaleFactor: 0.5 } },
})));

const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -180,
      centralGravity: 0.01,
      springLength: 220,
      springConstant: 0.04,
      damping: 0.4,
      avoidOverlap: 1.0,
    },
    stabilization: { iterations: 300, fit: true },
  },
  interaction: {
    hover: true,
    tooltipDelay: 100,
    hideEdgesOnDrag: true,
    navigationButtons: false,
    keyboard: false,
  },
  nodes: { shape: 'dot', borderWidth: 1.5 },
  edges: { smooth: { type: 'continuous', roundness: 0.2 }, selectionWidth: 3 },
});

network.on('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});


function showInfo(nodeId) {
  let n = nodesDS.get(nodeId);
  if (!n) {
    if (typeof network !== 'undefined' && network.isCluster && network.isCluster(nodeId)) {
      const thinkerName = nodeId.replace('cluster_', '');
      
      // Find all nodes grouped under this thinker
      const childNodes = (window.GLOBAL_NODES_LIST || []).filter(node => {
        const isFile = (node.label || '').endsWith('.md');
        return !isFile && extractThinker(node) === thinkerName;
      });
      
      const childLinks = childNodes.map(node => {
        const color = node.color ? (node.color.background || node.color) : '#60a5fa';
        return `<div class="linked-entry-item" style="border-right: 3px solid ${esc(color)}; margin-top: 8px; text-align: right;" onclick="try { network.openCluster('${esc(nodeId)}'); } catch(e){} focusNode('${esc(node.id)}');">📄 ${esc(node.label || node.name)}</div>`;
      }).join('');
      
      n = {
        id: nodeId,
        label: thinkerName,
        _description: `הוגה: <strong>${thinkerName}</strong><br><br>צומת זה מקבץ את כל התיאוריות, הכתבים והמושגים השייכים להוגה זה. לחץ על מושג כדי לפתוח אותו בגרף:<br><br>${childLinks}`
      };
    } else {
      return;
    }
  }
  const neighborIds = network.getConnectedNodes(nodeId);
  const neighborItems = neighborIds.map(nid => {
    const nb = nodesDS.get(nid);
    const color = nb ? nb.color.background : '#555';
    return `<span class="neighbor-link" style="border-left-color:${esc(color)}" data-nid="${esc(nid)}">${esc(nb ? nb.label : nid)}</span>`;
  }).join('');
  
  // Format source file to clickable vscode/local link or notify parent window
  let sourceLink = '-';
  if (n._source_file) {
    const fileName = n._source_file.split('/').pop();
    sourceLink = `<span class="local-file-link" onclick="window.parent.postMessage({type: 'OPEN_LOCAL_FILE', path: '${esc(n._source_file)}'}, '*')">${esc(fileName)}</span>`;
  }

  // Update left overlay panel (detailed content)
  const leftPanel = document.getElementById('left-panel');
  if (n._description) {
    const isThinkerHub = (nodeId.indexOf('thinker_') === 0);
    document.getElementById('left-panel-description').innerHTML = isThinkerHub ? n._description : esc(n._description);
    document.getElementById('left-panel-title').innerText = n.label;
    leftPanel.style.display = 'flex';
    
    // Request linked diary entries from React wrapper
    const container = document.getElementById('linked-entries-container');
    container.innerHTML = '<div class="linked-entries-header">רשומות יומן מקושרות</div><div style="color: #888; font-size: 12px; font-style: italic;">טוען רשומות מקושרות...</div>';
    window.parent.postMessage({ type: 'GET_LINKED_ENTRIES', label: n.label }, '*');
  } else {
    leftPanel.style.display = 'none';
  }
}

// Listen to linked entries response from the parent React window
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'LINKED_ENTRIES_RESPONSE') {
    const container = document.getElementById('linked-entries-container');
    if (!container) return;
    
    const entries = event.data.entries || [];
    if (entries.length > 0) {
      container.innerHTML = '<div class="linked-entries-header">רשומות יומן מקושרות (' + entries.length + ')</div>' + 
        entries.map(e => {
          // Format date or default name
          const dateStr = e.date || 'רשומה ללא תאריך';
          return `<div class="linked-entry-item" onclick="window.parent.postMessage({type: 'OPEN_ENTRY', entryId: '${esc(e.id)}'}, '*')">✍️ ${esc(dateStr)}</div>`;
        }).join('');
    } else {
      container.innerHTML = '<div class="linked-entries-header">רשומות יומן מקושרות</div><div style="color: #64748b; font-size: 12px; font-style: italic;">אין רשומות יומן שקשורות למושג זה כרגע.</div>';
    }
  }
  
  if (event.data && event.data.type === 'UPDATE_GRAPH_DATA') {
    const newNodes = event.data.nodes || [];
    const newLinks = event.data.links || [];
    
    // Create a map of raw nodes for quick lookup
    const rawNodesMap = {};
    if (typeof RAW_NODES !== 'undefined') {
      RAW_NODES.forEach(rn => {
        rawNodesMap[rn.id.toLowerCase()] = rn;
      });
    }
    
    const formattedNodes = newNodes.map(n => {
      const match = rawNodesMap[n.id.toLowerCase()];
      if (match) {
        return {
          id: n.id,
          label: match.label || n.name || n.id,
          color: match.color,
          size: match.size,
          font: match.font,
          _community: match.community,
          _description: n.content || match._description,
          _is_h1: n.isH1 !== undefined ? n.isH1 : match._is_h1,
          _source_file: n.sourceFile || match.source_file,
          _file_type: n.type || match.file_type
        };
      }
      
      let bgColor = '#4e79a7';
      if (n.type === 'Person') bgColor = '#48bb78';
      else if (n.type === 'Emotion') bgColor = '#ed64a6';
      else if (n.type === 'Topic') bgColor = '#9f7aea';
      
      return {
        id: n.id,
        label: n.name || n.id,
        color: { background: bgColor, border: bgColor, highlight: { background: bgColor, border: '#fff' } },
        size: n.isH1 ? 25 : 10,
        font: { color: '#ffffff', size: n.isH1 ? 12 : 0 },
        _description: n.content,
        _is_h1: n.isH1,
        _source_file: n.sourceFile,
        _file_type: n.type
      };
    });
    
    // Map raw edges for lookup
    const rawEdgesMap = {};
    if (typeof RAW_EDGES !== 'undefined') {
      RAW_EDGES.forEach(re => {
        const key = `${re.from.toLowerCase()}-${re.to.toLowerCase()}`;
        rawEdgesMap[key] = re;
      });
    }
    
    const formattedEdges = newLinks.map((e, i) => {
      const fromId = typeof e.source === 'object' ? e.source.id : e.source;
      const toId = typeof e.target === 'object' ? e.target.id : e.target;
      
      const key = `${fromId.toLowerCase()}-${toId.toLowerCase()}`;
      const reverseKey = `${toId.toLowerCase()}-${fromId.toLowerCase()}`;
      const match = rawEdgesMap[key] || rawEdgesMap[reverseKey];
      
      if (match) {
        return {
          id: `dyn-edge-${i}`,
          from: fromId,
          to: toId,
          label: '',
          title: match.title,
          dashes: match.dashes,
          width: match.width,
          color: match.color,
          arrows: { to: { enabled: true, scaleFactor: 0.5 } }
        };
      }
      
      return {
        id: `dyn-edge-${i}`,
        from: fromId,
        to: toId,
        label: '',
        title: `${fromId} -> ${toId} (${e.label || 'relates'})`,
        dashes: e.isTheoretical ? false : true,
        width: 2,
        color: { color: e.sentimentScore > 0 ? '#48bb78' : e.sentimentScore < 0 ? '#e53e3e' : '#cbd5e1' },
        arrows: { to: { enabled: true, scaleFactor: 0.5 } }
      };
    });
    
    nodesDS.clear();
    nodesDS.add(formattedNodes);
    
    edgesDS.clear();
    edgesDS.add(formattedEdges);
    
    network.setOptions({ physics: { enabled: true } });
    network.setData({ nodes: nodesDS, edges: edgesDS });
    
    window.GLOBAL_NODES_LIST = formattedNodes;
    window.GLOBAL_EDGES_LIST = formattedEdges;
    
    const modeSelect = document.getElementById('grouping-mode');
    const mode = modeSelect ? modeSelect.value : 'theory';
    rebuildSidebar(formattedNodes, mode);
    if (mode === 'thinker') {
      applyGraphClustering(formattedNodes, mode);
    }
  }
});


function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.4, animation: true });
  network.selectNodes([nodeId]);
  showInfo(nodeId);
}

// Neighbor links use a data attribute + one delegated listener rather than an
// inline onclick. A node id/label sourced from a document or a scraped URL
// (graphify add) can contain a double-quote; dropping the stringified id
// unescaped into a quoted onclick both broke every link and allowed a hostile
// source to inject an event handler into the local report (stored XSS, #1838).
// esc() on data-nid keeps the value inside the attribute; the listener reads it
// back verbatim. Bound to document so it survives the innerHTML rebuild that
// recreates #neighbors-list on each showInfo().
document.addEventListener('click', e => {
  const el = e.target.closest('.neighbor-link');
  if (el && el.dataset.nid !== undefined) focusNode(el.dataset.nid);
});

// Track hovered node — hover detection is more reliable than click params
let hoveredNodeId = null;
network.on('hoverNode', params => {
  hoveredNodeId = params.node;
  container.style.cursor = 'pointer';
});
network.on('blurNode', () => {
  hoveredNodeId = null;
  container.style.cursor = 'default';
});
container.addEventListener('click', () => {
  if (hoveredNodeId !== null) {
    showInfo(hoveredNodeId);
    network.selectNodes([hoveredNodeId]);
  }
});
network.on('click', params => {
  if (params.nodes.length > 0) {
    showInfo(params.nodes[0]);
  } else if (hoveredNodeId === null) {
    document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
  }
});

const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.label.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = `3px solid ${n.color.background}`;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      network.focus(n.id, { scale: 1.5, animation: true });
      network.selectNodes([n.id]);
      showInfo(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

const hiddenCommunities = new Set();

const selectAllCb = document.getElementById('select-all-cb');

function updateSelectAllState() {
  const total = LEGEND.length;
  const hidden = hiddenCommunities.size;
  selectAllCb.checked = hidden === 0;
  selectAllCb.indeterminate = hidden > 0 && hidden < total;
}

function toggleAllCommunities(hide) {
  document.querySelectorAll('.legend-item').forEach(item => {
    hide ? item.classList.add('dimmed') : item.classList.remove('dimmed');
  });
  document.querySelectorAll('.legend-cb').forEach(cb => {
    cb.checked = !hide;
  });
  LEGEND.forEach(c => {
    if (hide) hiddenCommunities.add(c.cid); else hiddenCommunities.delete(c.cid);
  });
  const updates = RAW_NODES.map(n => ({ id: n.id, hidden: hide }));
  nodesDS.update(updates);
  updateSelectAllState();
}

const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'legend-cb';
  cb.checked = true;
  cb.addEventListener('change', (e) => {
    e.stopPropagation();
    if (cb.checked) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    const updates = RAW_NODES
      .filter(n => n.community === c.cid)
      .map(n => ({ id: n.id, hidden: !cb.checked }));
    nodesDS.update(updates);
    updateSelectAllState();
  });
  item.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>
    <span class="legend-label">${c.label}</span>
    <span class="legend-count">${c.count}</span>`;
  item.prepend(cb);
  item.onclick = (e) => {
    if (e.target === cb) return;
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  };
  legendEl.appendChild(item);
});
</script>
<script>
// Render hyperedges as shaded regions
const hyperedges = [];
// afterDrawing passes ctx already transformed to network coordinate space.
// Draw node positions raw — no manual pan/zoom/DPR math needed.
network.on('afterDrawing', function(ctx) {
    hyperedges.forEach(h => {
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        // Centroid and expanded hull in network coordinates
        const cx = positions.reduce((s, p) => s + p.x, 0) / positions.length;
        const cy = positions.reduce((s, p) => s + p.y, 0) / positions.length;
        const expanded = positions.map(p => ({
            x: cx + (p.x - cx) * 1.15,
            y: cy + (p.y - cy) * 1.15
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
    });
});
</script>
<script>
const fileToThinkerMap = {};

const thinkerOverrides = {
  "הפילוסופיה הסטואית": "Marcus Aurelius & Seneca",
  "Attachment Theory": "John Bowlby",
  "Behavioral": "B.F. Skinner & Watson",
  "Buddhism": "Siddhartha Gautama (Buddha)",
  "CBT": "Aaron Beck & Albert Ellis",
  "ACT": "Steven Hayes",
  "TMT": "Ernest Becker",
  "Polyvagal": "Stephen Porges",
  "Gottman": "John Gottman & Julie Gottman",
  "NVC": "Marshall Rosenberg",
  "Positive Psychology": "Martin Seligman",
  "Stoicism": "Marcus Aurelius & Seneca",
  "Logotherapy": "Viktor Frankl",
  "Taoism": "Lao Tzu",
  "Self-Determination Theory": "Edward Deci & Richard Ryan",
  "Trauma": "Gabor Maté & Bessel van der Kolk",
  "Neuroscience": "Andrew Huberman",
  "DBT": "Marsha Linehan"
};

function extractThinker(n) {
  if (n.thinker && n.thinker !== "Unknown") {
    if (thinkerOverrides[n.thinker]) return thinkerOverrides[n.thinker];
    return n.thinker;
  }
  
  const srcFile = n.source_file || n._source_file || n.sourceFile;
  if (srcFile && fileToThinkerMap[srcFile]) {
    const rawThinker = fileToThinkerMap[srcFile];
    if (thinkerOverrides[rawThinker]) return thinkerOverrides[rawThinker];
    // Check if parts of the name match overrides (e.g. case insensitive)
    for (let key in thinkerOverrides) {
      if (rawThinker.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(rawThinker.toLowerCase())) {
        return thinkerOverrides[key];
      }
    }
    return rawThinker;
  }
  
  // Fallback to regex
  const label = n.label || n.name || '';
  const match = label.match(/\(([^)]+)\)$/);
  if (match) {
    const matchedVal = match[1].trim();
    if (thinkerOverrides[matchedVal]) return thinkerOverrides[matchedVal];
    return matchedVal;
  }
  
  if (srcFile) {
    const parts = srcFile.split('/');
    const fname = parts[parts.length - 1];
    if (fname && fname.includes('_')) {
        const namePart = fname.split('_')[1].replace('.md', '');
        const formattedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
        if (thinkerOverrides[formattedName]) return thinkerOverrides[formattedName];
        return formattedName;
    }
  }
  return "Unknown";
}

let currentClusters = [];

function applyGraphClustering(nodesList, mode) {
  // Build thinker map first
  nodesList.forEach(n => {
    if (n._is_h1 || n.isH1 || n.is_h1) {
      const srcFile = n.source_file || n._source_file || n.sourceFile;
      if (srcFile) {
        const label = n.label || n.name || '';
        let thinker = label;
        const match = label.match(/\(([^)]+)\)$/);
        if (match) {
          thinker = match[1].trim();
        }
        fileToThinkerMap[srcFile] = thinker;
      }
    }
  });

  // First open all existing clusters
  currentClusters.forEach(cid => {
    try { network.openCluster(cid); } catch(e){}
  });
  currentClusters = [];

  if (mode === 'thinker') {
    const thinkers = new Set();
    nodesList.forEach(n => {
      const isFileNode = (n.label || '').endsWith('.md');
      if (!isFileNode) thinkers.add(extractThinker(n));
    });

    thinkers.forEach(thinker => {
      if (!thinker || thinker === "Unknown") return;
      
      const cid = 'cluster_' + thinker;
      const clusterOptionsByData = {
        joinCondition: function(childOptions) {
          if ((childOptions.label || '').endsWith('.md')) return false;
          const origNode = nodesList.find(n => n.id === childOptions.id);
          if (!origNode) return false;
          return extractThinker(origNode) === thinker;
        },
        clusterNodeProperties: {
          id: cid,
          borderWidth: 3,
          shape: 'star',
          size: 40,
          label: thinker,
          font: { size: 16, color: '#ffffff', face: 'arial' },
          color: { background: '#60a5fa', border: '#ffffff' },
          allowSingleNodeCluster: true
        }
      };
      network.cluster(clusterOptionsByData);
      currentClusters.push(cid);
    });
  }
}

// Add event listener to open cluster on click
network.on("selectNode", function(params) {
  if (params.nodes.length === 1) {
    if (network.isCluster(params.nodes[0]) === true) {
      network.openCluster(params.nodes[0]);
    }
  }
});

const groupingModeSelect = document.getElementById('grouping-mode');
if (groupingModeSelect) {
  groupingModeSelect.addEventListener('change', (e) => {
    const mode = e.target.value;
    if (typeof window.GLOBAL_NODES_LIST !== 'undefined' && typeof window.GLOBAL_EDGES_LIST !== 'undefined') {
      // Restore original graph data first
      nodesDS.clear();
      nodesDS.add(window.GLOBAL_NODES_LIST);
      edgesDS.clear();
      edgesDS.add(window.GLOBAL_EDGES_LIST);
      
      rebuildSidebar(window.GLOBAL_NODES_LIST, mode);
      applyGraphClustering(window.GLOBAL_NODES_LIST, mode);
    }
  });
}

function rebuildSidebar(nodesList, mode = 'theory') {
  window.GLOBAL_NODES_LIST = nodesList;
  
  // Build thinker map first
  nodesList.forEach(n => {
    if (n._is_h1 || n.isH1 || n.is_h1) {
      const srcFile = n.source_file || n._source_file || n.sourceFile;
      if (srcFile) {
        const label = n.label || n.name || '';
        let thinker = label;
        const match = label.match(/\(([^)]+)\)$/);
        if (match) {
          thinker = match[1].trim();
        }
        fileToThinkerMap[srcFile] = thinker;
      }
    }
  });

  const listBody = document.getElementById('nodes-list-body');
  if (!listBody) return;
  listBody.innerHTML = '';
  
  const groups = {};
  
  nodesList.forEach(n => {
    const isFileNode = (n.label || '').endsWith('.md');
    if (isFileNode) return;
    
    let key = n.source_file || n._source_file || n.sourceFile;
    if (mode === 'thinker') {
      key = extractThinker(n);
    }
    if (!key) return;
    
    if (!groups[key]) {
      groups[key] = { parent: null, children: [] };
    }
    
    if (mode === 'theory') {
      if (n._is_h1 || n.isH1 || n.is_h1) {
        groups[key].parent = n;
      } else if (n._description || n.description || n.content) {
        groups[key].children.push(n);
      }
    } else {
      if (!groups[key].parent) {
        groups[key].parent = {
          id: 'thinker_' + key,
          label: key,
          name: key,
          color: n.color
        };
      }
      if (n._is_h1 || n.isH1 || n.is_h1) {
        groups[key].children.push(n);
      }
    }
  });

  const sortedGroups = Object.values(groups).filter(g => g.parent);
  sortedGroups.sort((a, b) => (a.parent.label || a.parent.name || '').localeCompare(b.parent.label || b.parent.name || '', 'he'));

  sortedGroups.forEach(g => {
    const parentItem = document.createElement('div');
    parentItem.className = 'nodes-list-item';
    const parentColor = g.parent.color ? (g.parent.color.background || g.parent.color) : '#555';
    parentItem.style.borderRight = `4px solid ${parentColor}`;
    parentItem.style.fontWeight = 'bold';
    parentItem.style.color = '#ffffff';
    parentItem.style.background = 'rgba(255, 255, 255, 0.05)';
    parentItem.style.marginTop = '12px';
    parentItem.textContent = g.parent.label || g.parent.name;
    
    parentItem.onclick = () => {
      if (mode === 'thinker') {
        const clusterId = 'cluster_' + (g.parent.label || g.parent.name);
        if (network.isCluster(clusterId)) {
          network.focus(clusterId, { scale: 1.3, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
          network.selectNodes([clusterId]);
          showInfo(clusterId);
        } else if (g.children.length > 0) {
          network.focus(g.children[0].id, { scale: 1.3, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
          network.selectNodes([g.children[0].id]);
          showInfo(g.children[0].id);
        }
      } else {
        network.focus(g.parent.id, { scale: 1.3, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
        network.selectNodes([g.parent.id]);
        showInfo(g.parent.id);
      }
    };
    listBody.appendChild(parentItem);

    if (mode === 'theory') {
      g.children.sort((a, b) => (a.label || a.name || '').localeCompare(b.label || b.name || '', 'he'));
      
      g.children.forEach(c => {
        const childItem = document.createElement('div');
        childItem.className = 'nodes-list-item';
        const childColor = c.color ? (c.color.background || c.color) : '#888';
        childItem.style.borderRight = `2px solid ${childColor}`;
        childItem.style.marginRight = '14px';
        childItem.style.fontSize = '12px';
        childItem.style.color = '#cbd5e1';
        childItem.style.background = 'transparent';
        childItem.textContent = '└ ' + (c.label || c.name);
        
        childItem.onclick = () => {
          const thinker = extractThinker(c);
          const clusterId = 'cluster_' + thinker;
          if (network.isCluster(clusterId)) {
            network.openCluster(clusterId);
          }
          network.focus(c.id, { scale: 1.3, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
          network.selectNodes([c.id]);
          showInfo(c.id);
        };
        listBody.appendChild(childItem);
      });
    }
  });
}

// Initial sidebar population
if (typeof RAW_NODES !== 'undefined') {
  const parsedNodes = RAW_NODES.map(n => ({
    ...n,
    id: n.id,
    label: n.label,
    color: n.color,
    _is_h1: n._is_h1,
    _description: n._description,
    _source_file: n.source_file || n._source_file || n.sourceFile
  }));
  window.GLOBAL_NODES_LIST = parsedNodes;
  window.GLOBAL_EDGES_LIST = typeof RAW_EDGES !== 'undefined' ? RAW_EDGES : [];
  rebuildSidebar(parsedNodes, 'theory');
}
</script>
