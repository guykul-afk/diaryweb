ghlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "1. **השבר הרומנטי:** היינה כותב על אהבה נכזבת וכמיהה אינסופית, אך בניגוד למשוררים רומנטיים אחרים, הוא נוטה לסיים את שיריו בשורת מחץ אירונית שחושפת את המגבלות של הפנטזיה לעומת המציאות הקרה.\n2. **כאב פנימי וביקורת חברתית:** הוא חיבר בין הלב השבור האישי לבין התחושה של \"קרע בעולם\" (הקרע החברתי והפוליטי). חוסר השלמות באהבה משקף עולם בלתי שלם.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_1_die_lorelei_הלורליי", "label": "1. Die Lorelei (הלורליי)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Die Lorelei (הלורליי)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "*בלדה מפורסמת על סירנה המפתה מלחים אל מותם בנהר הריין.*\n> \"Ich weiß nicht, was soll es bedeuten,\n> Dass ich so traurig bin;\n> Ein Märchen aus alten Zeiten,\n> Das kommt mir nicht aus dem Sinn.\"\n*הסבר:* הלורליי מסמלת את המשיכה ההרסנית ליופי ולאהבה בלתי מושגת, המובילה בסופו של דבר לאובדן של האדם כאשר הוא פועל ללא שיקול דעת.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_2_du_bist_wie_eine_blume_הנך_כפרח", "label": "2. Du bist wie eine Blume (הנך כפרח)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Du bist wie eine Blume (הנך כפרח)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "*שיר לירי עדין המשלב הערצת יופי לצד פחד מהשחתה.*\n> \"Du bist wie eine Blume,\n> So hold und schön und rein;\n> Ich schau dich an, und Wehmut\n> Schleicht mir ins Herz hinein.\"\n*הסבר:* פחד מפני שבירותו של היופי והטוהר בעולם. היינה חווה עצב ומבקש להתפלל שאלוהים ישמור על האדם האהוב מפני פגעי החברה.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_3_ein_fichtenbaum_steht_einsam_אורן_עומד_בודד", "label": "3. Ein Fichtenbaum steht einsam (אורן עומד בודד)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Ein Fichtenbaum steht einsam (אורן עומד בודד)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "*שיר המביע את הבדידות הקיומית וכמיהה לשותף רחוק.*\n> \"Ein Fichtenbaum steht einsam\n> Im Norden auf kahler Höh.\n> Ihn schläfert; mit weißer Decke\n> Umhüllen ihn Eis und Schnee.\"\n*הסבר:* מטאפורה המציגה שני עצים בודדים – אחד בצפון הקר ואחד במזרח הרחוק – כמהים זה לזה. מסמל את חוסר היכולת לגשר על המרחק במערכות יחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_4_leise_zieht_durch_mein_gemüt_שיר_אביב", "label": "4. Leise zieht durch mein Gemüt (שיר אביב)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Leise zieht durch mein Gemüt (שיר אביב)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "*שיר אביב קליל החוגג את התעוררות הרגש והטבע.*\n> \"Leise zieht durch mein Gemüt\n> Liebliches Geläute;\n> Kling, kleine Frühlingslied,\n> Kling hinaus ins Weite.\"\n*הסבר:* הטבע והאהבה מניעים את נפש האדם. השיר מתאר כיצד המוטיבציה והרגש יכולים להתעורר מחדש בנפש אחרי תקופת קפאון.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_5_die_grenadiere_הגרנדירים", "label": "5. Die Grenadiere (הגרנדירים)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Die Grenadiere (הגרנדירים)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "*בלדה דרמטית על נאמנות עיוורת ואובדן.*\n> \"Nach Frankreich zogen zwei Grenadier’,\n> Die waren in Russland gefangen.\n> Und als sie kamen ins deutsche Quartier,\n> Sie ließen die Köpfe hangen.\"\n*הסבר:* סיפורם של שני חיילים נאמנים החוזרים מהשבי, שמדגים כיצד מסירות מוחלטת לרעיון או לדמות יכולה להכניע אפילו את יצר ההישרדות הבסיסי של האדם.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe", "label": "poetry_poe.md", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_poe.md", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_התת_מודע_אימה_ודחף_ההרס_edgar_allan_poe", "label": "התת-מודע, אימה ודחף ההרס (Edgar Allan Poe)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "התת-מודע, אימה ודחף ההרס (Edgar Allan Poe)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nEdgar Allan Poe's Poetry and Tales", "_is_h1": true}, {"id": "knowledge_base_poetry_poe_הגדרה", "label": "הגדרה", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "אדגר אלן פו, מאבות ספרות האימה והבלש המודרנית, צלל עמוק אל נבכי התת-מודע האנושי עשרות שנים לפני פרויד. יצירותיו חושפות את הפחדים, האובססיות והצדדים האפלים ביותר של הנפש.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "1. **שד הסוררות (The Imp of the Perverse):** פו זיהה שאצל בני אדם קיים דחף אי-רציונלי לעשות דווקא את הדבר שאסור להם לעשות, או זה שיביא לאובדנם, ללא שום סיבה הגיונית. זהו דחף הרס עצמי הטבוע בנפש האדם.\n2. **האבל ואובדן האהבה:** ב\"העורב\" ובשירים אחרים, פו חוקר את ההשפעה הפסיכולוגית ההרסנית של האבל (\"Nevermore\"), ואת חוסר היכולת של הנפש להשתחרר מזיכרון טראומטי של אובדן.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_1_the_raven_העורב", "label": "1. The Raven (העורב)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. The Raven (העורב)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "*שיר המייצג את השקיעה אל השיגעון מתוך אבל עמוק.*\n> \"Once upon a midnight dreary, while I pondered, weak and weary,\n> Over many a quaint and curious volume of forgotten lore—\n> While I nodded, nearly napping, suddenly there came a tapping,\n> As of some one gently rapping, rapping at my chamber door.\n> ...\n> Quoth the Raven 'Nevermore'.\"\n*הסבר:* העורב מסמל את קולו של התת-מודע המזכיר לאדם שאינו מסוגל להתגבר על אובדן אהובתו לנור.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_2_annabel_lee_אנבל_לי", "label": "2. Annabel Lee (אנבל לי)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Annabel Lee (אנבל לי)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "*בלדה רומנטית אפלה על אהבה נצחית המתגברת על המוות.*\n> \"It was many and many a year ago,\n> In a kingdom by the sea,\n> That a maiden there lived whom you may know\n> By the name of Annabel Lee;\n> And this maiden she lived with no other thought\n> Than to love and be loved by me.\"\n*הסבר:* תפיסת מערכת היחסים כקשר נפשי כה עמוק, שאפילו מלאכי השמיים מקנאים בו. היא משקפת את קידוש האהבה המוחלט.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_3_a_dream_within_a_dream_חלום_בתוך_חלום", "label": "3. A Dream Within a Dream (חלום בתוך חלום)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. A Dream Within a Dream (חלום בתוך חלום)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "*שיר המביע ספק קיומי לגבי המציאות והזמן החולף.*\n> \"Take this kiss upon the brow!\n> And, in parting from you now,\n> Thus much let me avow—\n> You are not wrong, who deem\n> That my days have been a dream;\n> ...\n> Is all that we see or seem\n> But a dream within a dream?\"\n*הסבר:* פו מתאר את חוסר האונים של האדם מול בריחת הזמן וזרימת המציאות, המערערים את תחושת העצמי והשליטה בחייו.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_4_ulalume_אולאלום", "label": "4. Ulalume (אולאלום)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Ulalume (אולאלום)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "*שיר סימבוליסטי העוסק במאבק הפנימי בין תשוקה ואבל.*\n> \"The skies they were ashen and sober;\n> The leaves they were crisped and sere—\n> The leaves they were withering and sere;\n> It was night in the lonesome October\n> Of my most immemorial year...\"\n*הסבר:* תיאור נוף מנטלי מלנכולי וסוריאליסטי, המשקף את הפיצול והמבוכה בתוך נפשו של האדם.", "_is_h1": false}, {"id": "knowledge_base_poetry_poe_5_to_helen_אל_הלן", "label": "5. To Helen (אל הלן)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. To Helen (אל הלן)", "community": 9, "community_name": "Community 9", "source_file": "knowledge_base/poetry_poe.md", "file_type": "document", "degree": 1, "_description": "*שיר קצר המהלל יופי קלאסי כמשקם רוחני.*\n> \"Helen, thy beauty is to me\n> Like those Nicéan barks of yore,\n> That gently, o'er a perfumed sea,\n> The weary, wayworn wanderer bore\n> To his own native shore.\"\n*הסבר:* היופי נתפס כעוגן המביא מנוחה ונחמה לנפש המשוטטת והעייפה.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust", "label": "poetry_proust.md", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_proust.md", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_זיכרון_לא_רצוני_וסובייקטיביות_האהבה_marcel_proust", "label": "זיכרון לא-רצוני וסובייקטיביות האהבה (Marcel Proust)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "זיכרון לא-רצוני וסובייקטיביות האהבה (Marcel Proust)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nMarcel Proust's In Search of Lost Time", "_is_h1": true}, {"id": "knowledge_base_poetry_proust_הגדרה", "label": "הגדרה", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "מרסל פרוסט, מגדולי הסופרים הצרפתים, חקר לעומק ביצירתו \"בעקבות הזמן האבוד\" את מנגנוני הזיכרון, הזמן, והתעתועים של תודעת האדם באהבה.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "1. **הזיכרון הלא-רצוני (Involuntary Memory):** זיכרונות העבר האמיתיים לא עולים כשאנו מנסים לחשוב עליהם, אלא מופעלים בעקבות חוויה חושית מקרית (כמו טעם עוגיית ה\"מדלן\"). זה מוכיח שהזמן שאבד עדיין קיים בתוכנו ומעצב את זהותנו ללא הרף.\n2. **אשליית האהבה:** אהבה, לפי פרוסט, היא פעמים רבות יצירה סובייקטיבית של המוח. איננו מתאהבים באדם כפי שהוא במציאות, אלא בדימוי שלו שיצרנו בתוכנו. לכן, אהבה מלווה תמיד בחרדה ובניסיון בלתי אפשרי לדעת את האחר בשלמותו.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_5_תחנות_ופרקים_מרכזיים_ניתוח_ספרותי_ותמטי", "label": "5 תחנות ופרקים מרכזיים (ניתוח ספרותי ותמטי)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 תחנות ופרקים מרכזיים (ניתוח ספרותי ותמטי)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_1_the_episode_of_the_madeleine_עוגיית_המדלן", "label": "1. The Episode of the Madeleine (עוגיית המדלן)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. The Episode of the Madeleine (עוגיית המדלן)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "*   **האירוע:** טעימת עוגיית מדלן טבולה בתה מעוררת בגיבור שטף פתאומי של זיכרונות ילדות מלאים מהעיירה קומברה.\n*   **ניתוח תמטי:** פרוסט מציג את הדיכוטומיה שבין הזיכרון השכלי (הרצוני) לבין הזיכרון החושי (הלא-רצוני). הזיכרון הרצוני מביא רק עובדות יבשות, בעוד גירוי חושי פתאומי משחזר את ה*חוויה הרגשית* המלאה של העבר.\n*   **הקשר ליומן:** כתיבה ביומן יכולה להיות מופעלת על ידי חושים קטנים, ועוזרת לחשוף רגשות קבורים בתת-מודע.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_2_the_vinteuil_sonata_הסונטה_של_ונטיי", "label": "2. The Vinteuil Sonata (הסונטה של ונטיי)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. The Vinteuil Sonata (הסונטה של ונטיי)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "*   **האירוע:** קטע מוזיקלי קצר הופך לסמל האהבה והייסורים של סוואן כלפי אודט.\n*   **ניתוח תמטי:** האמנות והמוזיקה משמשות כקיצור דרך לנפש. הסונטה מעלה באוב את תחושת האושר המוקדמת של האהבה, ומאוחר יותר, כשהיחסים מתדרדרים, היא הופכת לתזכורת כואבת וקנאית למה שאבד.\n*   **הקשר ליחסים:** כיצד אובייקטים או חוויות משותפות הופכים לעוגנים רגשיים טעונים בתוך קשר.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_3_albertine_disparue_אלברטין_נעלמת_קנאה_באהבה", "label": "3. Albertine Disparue (אלברטין נעלמת / קנאה באהבה)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Albertine Disparue (אלברטין נעלמת / קנאה באהבה)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "*   **האירוע:** הגיבור מנסה לכלוא ולשלוט באלברטין מתוך קנאה וחשדנות, עד שהיא בורחת ונעלמת.\n*   **ניתוח תמטי:** פרוסט מדגים את הטבע המרעיל של הקנאה ואת האשליה שאנו יכולים \"להחזיק\" באדם אחר. אנו מבינים את ערכו של האדם ואת עוצמת רגשותינו כלפיו לעיתים קרובות רק כאשר הוא איננו עוד.\n*   **הקשר ליחסים:** הגבול הצר שבין אהבה לרכושנות וכיצד חוסר ביטחון פנימי מחריב קשרים.", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_4_the_death_of_bergotte_מותו_של_ברגוט", "label": "4. The Death of Bergotte (מותו של ברגוט)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. The Death of Bergotte (מותו של ברגוט)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "*   **האירוע:** הסופר ברגוט מת לאחר שהוא מביט בפרט קטן וצהוב בציור של ורמיר (\"מבט על דלפט\").\n*   **ניתוח תמטי:** משמעות החיים והשאיפה לנצחיות דרך יצירת יופי. ברגוט מת פיזית, אך יצירותיו נשארות לנצח כמצבות חיות של הנפש שלו.\n*   **הקשר לאישיות:** הרצון להשאיר חותם ולמצוא נחמה ביצירה נוכח פחד המוות (בדומה לתיאוריית ניהול האימה).", "_is_h1": false}, {"id": "knowledge_base_poetry_proust_5_time_regained_הזמן_שנמצא", "label": "5. Time Regained (הזמן שנמצא)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Time Regained (הזמן שנמצא)", "community": 10, "community_name": "Community 10", "source_file": "knowledge_base/poetry_proust.md", "file_type": "document", "degree": 1, "_description": "*   **האירוע:** הגיבור חווה סדרה של הבנות זיכרון לא-רצוניות במסיבה של הדוכסית מגרמאנט, ומבין שייעודו הוא לכתוב את ספרו.\n*   **ניתוח תמטי:** סיכום של משנתו של פרוסט: החיים האמיתיים מתגלים רק כאשר אנו משחזרים אותם דרך האמנות והכתיבה. דרך המבט הרפלקטיבי, אנו משחררים את עצמנו מכבלי הזמן ומבינים את המבנה השלם של חיינו.\n*   **הקשר ליומן:** הכתיבה ככלי לגאולת החוויות היומיומיות והפיכתן למשמעות קיומית יציבה.", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke", "label": "poetry_rilke.md", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_rilke.md", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_בדידות_אהבה_וקבלת_הקושי_rainer_maria_rilke", "label": "בדידות, אהבה וקבלת הקושי (Rainer Maria Rilke)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "בדידות, אהבה וקבלת הקושי (Rainer Maria Rilke)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nRainer Maria Rilke's Letters to a Young Poet", "_is_h1": true}, {"id": "knowledge_base_poetry_rilke_הגדרה", "label": "הגדרה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "המשורר האוסטרי-גרמני ריינר מריה רילקה התעמק במשמעות העמוקה של החיים הפנימיים, הבדידות והאהבה. ב\"מכתבים למשורר צעיר\", הוא פורס את משנתו לגבי התפתחות הנפש וקבלת הסבל כחלק בלתי נפרד מצמיחה.", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "1. **אהבת הבדידות:** רילקה לא ראה בבדידות עונש, אלא מרחב הכרחי לגדילה. רק מתוך התכנסות פנימית כנה יכול האדם לגלות את קולו הייחודי.\n2. **לחיות את השאלות:** במקום לחפש תשובות מיידיות, רילקה מציע \"לחיות את השאלות עצמן\" בסבלנות, עד שביום מן הימים \"נחיה לתוך התשובה\".\n3. **הקושי שבאופן:** האהבה היא המשימה הקשה מכולן. לאהוב אדם אחר אין פירושו להתמזג איתו, אלא ששתי בדידויות מגינות, נוגעות ומברכות זו את זו.", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_5_יצירות_מפורסמות_ניתוח_ספרותי_ותמטי", "label": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_1_duino_elegies_אלגיות_דואינו", "label": "1. Duino Elegies (אלגיות דואינו)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Duino Elegies (אלגיות דואינו)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** משבר קיומי, השוואה בין בני האדם החולפים והחלשים לבין המלאכים הנשגבים והנצחיים.\n*   **ניתוח תמטי:** רילקה חוקר את הבסיס למגבלות האדם: אנו תמיד חווים חוסר שלמות וניכור, בניגוד למלאכים שמייצגים שלמות רוחנית מוחלטת. השיר מלמד לקבל את העובדה שהחיים האנושיים מתקיימים על הגבול שבין היופי המפעים לבין האימה.\n*   **ציטוט מפתח:** *\"Denn das Schöne ist nichts als des Schrecklichen Anfang, den wir noch gerade ertragen...\" (כי היופי אינו אלא ראשיתו של הנורא, אשר בקושי עוד נוכל לשאת).*", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_2_sonnets_to_orpheus_סונטות_לאורפיאוס", "label": "2. Sonnets to Orpheus (סונטות לאורפיאוס)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Sonnets to Orpheus (סונטות לאורפיאוס)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** מחזוריות החיים והמוות, כוחה המרפא והמחבר של האמנות והשירה.\n*   **ניתוח תמטי:** אורפיאוס המיתולוגי יורד לשאול כדי להציל את אהובתו. רילקה משתמש בדמותו כדי להראות שהנפש צריכה לעבור דרך התהומות (החלקים האפלים, האבל) כדי להגיע ליכולת שירה, יצירה והשלמה עם החיים.\n*   **ציטוט מפתח:** *\"Ein für alle Male ists Orpheus, wenn es singt.\" (אחת ולתמיד זהו אורפיאוס, כאשר ישנה שירה).*", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_3_herbsttag_יום_סתיו", "label": "3. Herbsttag (יום סתיו)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Herbsttag (יום סתיו)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** הבדידות הקיומית שמתחדדת עם חילופי העונות.\n*   **ניתוח תמטי:** שינויי העונות בטבע משקפים את המצבים הנפשיים של האדם. הסתיו הוא זמן של התכנסות ובניית חוסן. מי שלא מצא בית או קשר עד עכשיו, יישאר בודד, יקרא ספרים ארוכים וינדוד ללא מנוח – בדידות שרילקה רואה בה הזדמנות ליצירה ולמבט פנימי נוקב.\n*   **ציטוט מפתח:** *\"Wer jetzt kein Haus hat, baut sich keines mehr. Wer jetzt allein ist, wird es lange bleiben...\" (מי שאין לו בית כעת, כבר לא יבנה לעצמו. מי שבנידות כעת, יישאר בה עוד זמן רב).*", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_4_der_panther_הפנתר", "label": "4. Der Panther (הפנתר)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Der Panther (הפנתר)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** שבי פנימי וחיצוני, איבוד רצון החיים עקב מגבלות חיצוניות.\n*   **ניתוח תמטי:** מטאפורה עוצמתית על מצבו של אדם שמכונס בתוך מוסכמות, דיכאון או שבי רגשי. מבטו של הפנתר עייף מלעבור בין הסורגים, רצונו משותק, ורק מדי פעם חודרת תמונה של העולם החיצוני אל התודעה ומתפוגגת בתוכה ללא פעולה.\n*   **ציטוט מפתח:** *\"Ihm ist, als ob es tausend Stäbe gäbe und hinter tausend Stäben keine Welt.\" (נדמה לו שישנם אלפי סורגים, ומעבר לאלפי סורגים אין שום עולם).*", "_is_h1": false}, {"id": "knowledge_base_poetry_rilke_5_archäischer_torso_apollos_טורסו_ארכאי_של_אפולו", "label": "5. Archäischer Torso Apollos (טורסו ארכאי של אפולו)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Archäischer Torso Apollos (טורסו ארכאי של אפולו)", "community": 11, "community_name": "Community 11", "source_file": "knowledge_base/poetry_rilke.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** המפגש עם האמנות כדרישה לשינוי חיים מוסרי ואישי.\n*   **ניתוח תמטי:** בהתבוננות בפסל שבור ונטול ראש של האל אפולו, רילקה מרגיש שהפסל עדיין מקרין עוצמה שמביטה אליו מכל נקודה. המסקנה שלו היא שהמפגש עם יופי אותנטי ואמת אינו יכול להשאיר אותנו אדישים – הוא מחייב אותנו לעשות מהפך בחיינו.\n*   **ציטוט מפתח:** *\"Du mußt dein Leben ändern.\" (עליך לשנות את חייך).*", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller", "label": "poetry_schiller.md", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_schiller.md", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_חינוך_אסתטי_ויצר_המשחק_friedrich_schiller", "label": "חינוך אסתטי ויצר המשחק (Friedrich Schiller)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "חינוך אסתטי ויצר המשחק (Friedrich Schiller)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nFriedrich Schiller's Letters on the Aesthetic Education of Man", "_is_h1": true}, {"id": "knowledge_base_poetry_schiller_הגדרה", "label": "הגדרה", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "פרידריך שילר, משורר ופילוסוף גרמני, קשר בין חופש פוליטי ואישי לבין יופי ואסתטיקה. הוא טען שהאדם הקרע בין היצר החומרי ליצר הצורני (השכלי) יכול למצוא הרמוניה רק דרך חוויית היופי ו\"יצר המשחק\".", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "1. **יצר המשחק (Spieltrieb):** האדם אינו אנושי במלואו כשהוא עובד מתוך הכרח חומרי, או כשהוא כפוף לחוק רציונלי נוקשה. האדם חופשי ואנושי באמת רק כשהוא \"משחק\" – כשהוא יוצר, נהנה מיופי וחווה אמנות. \"האדם משחק רק כאשר הוא אדם במלוא מובן המילה\".\n2. **הרמוניה של הנפש:** חינוך לאסתטיקה ולאמנות הוא שמאפשר לאדם לאזן בין הדחפים החייתיים לבין השכל הקר, וליצור נפש יפה וחופשית.", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_1_an_die_freude_אודה_לשמחה", "label": "1. An die Freude (אודה לשמחה)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. An die Freude (אודה לשמחה)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "*שיר הלל לאחווה אנושית, חופש ושמחה אוניברסלית.*\n> \"Freude, schöner Götterfunken,\n> Tochter aus Elysium,\n> Wir betreten feuertrunken,\n> Himmlische, dein Heiligtum!\"\n*הסבר:* השמחה מיוצגת ככוח מאחד המסוגל לגשר על פערים חברתיים ולאחד את כל בני האדם תחת ערכים של אחווה ואהבה קוסמית.", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_2_der_handschuh_הכפפה", "label": "2. Der Handschuh (הכפפה)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Der Handschuh (הכפפה)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "*בלדה על אביר וגבירה הבוחנת את נאמנותו דרך סכנת מוות.*\n> \"Vor seinem Löwengarten,\n> Das Kampfspiel zu erwarten,\n> Saß König Franz,\n> Und um ihn die Großen der Krone...\"\n*הסבר:* האביר מסרב לקבל את אהבתה של הגבירה לאחר שהיא מעמידה את חייו בסכנה לשם שעשוע קטנוני. מדגים את חשיבות הכבוד העצמי והגבולות במערכות יחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_3_die_bürgschaft_הערובה", "label": "3. Die Bürgschaft (הערובה)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Die Bürgschaft (הערובה)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "*סיפור על חברות אמת, נאמנות והקרבה עצמית מול עריצות.*\n> \"Zu Dionys, dem Tyrannen, schlich\n> Damon, den Dolch im Gewande:\n> Ihn schlugen die Häscher in Bande...\"\n*הסבר:* חברותו של דמון המציע את חייו כערובה לחברו מוכיחה לעריץ שישנו ערך אנושי עמוק שמתעלה על פחד המוות – נאמנות חברית מוחלטת.", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_4_das_lied_von_der_glocke_שירת_הפעמון", "label": "4. Das Lied von der Glocke (שירת הפעמון)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Das Lied von der Glocke (שירת הפעמון)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "*פואמה ארוכה המקשרת בין יציקת פעמון לבין שלבי החיים האנושיים והקהילה.*\n> \"Fest gemauert in der Erden\n> Steht die Form, aus Lehm gebrannt.\n> Heute muß die Glocke werden.\n> Frisch Gesellen, seid zur Hand!\"\n*הסבר:* שילר מציג את החשיבות של יציבות, סדר חברתי, חריצות וההרמוניה המשפחתית כבסיס לבניית אישיות יציבה ותומכת.", "_is_h1": false}, {"id": "knowledge_base_poetry_schiller_5_hoffnung_תקווה", "label": "5. Hoffnung (תקווה)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Hoffnung (תקווה)", "community": 12, "community_name": "Community 12", "source_file": "knowledge_base/poetry_schiller.md", "file_type": "document", "degree": 1, "_description": "*שיר המהלל את כוחה של התקווה שמלווה את האדם תמיד.*\n> \"Es reden und träumen die Menschen viel\n> Von besseren künftigen Tagen;\n> Nach einem glücklichen, goldenen Ziel\n> Sieht man sie rennen und jagen.\"\n*הסבר:* התקווה אינה אשליה שנוצרת מבחוץ, אלא כוח מולד בתוך נפש האדם שמניע אותו להמשיך לשאוף לטוב גם בזמנים קשים.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman", "label": "poetry_whitman.md", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_whitman.md", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_העצמי_האינסופי_והחיבור_הקוסמי_walt_whitman", "label": "העצמי האינסופי והחיבור הקוסמי (Walt Whitman)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "העצמי האינסופי והחיבור הקוסמי (Walt Whitman)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nWalt Whitman's Leaves of Grass", "_is_h1": true}, {"id": "knowledge_base_poetry_whitman_הגדרה", "label": "הגדרה", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "וולט ויטמן, ממשורריה הגדולים של אמריקה, הציג בספרו \"עלי עשב\" תפיסה של אישיות אוניברסלית, אופטימית ומשוחררת מכבלים חברתיים. הוא כתב ב\"שירת עצמי\" שיר הלל לדמוקרטיה, לטבע, לגוף האנושי ולקשר בין כל בני האדם.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "1. **קבלת הסתירות הפנימיות:** \"האם אני סותר את עצמי? יפה, אז אני סותר את עצמי (אני עצום, אני מכיל המונים).\" ויטמן חגג את מורכבות הנפש וראה באישיות משהו עשיר מאין כמותו שאין צורך לצמצם אותו להגדרה צרה אחת.\n2. **האחדות שבין הגוף לנפש ובין האדם לעולם:** אין הפרדה בין הקודש לחול, ואין היררכיה בין אנשים. העצמי של ויטמן מתפשט ומרגיש את כאבם ושמחתם של כל האנשים שסביבו.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_1_song_of_myself_שירת_עצמי", "label": "1. Song of Myself (שירת עצמי)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Song of Myself (שירת עצמי)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "*יצירת המופת המרכזית שלו החוגגת את האינדיבידואל והחיבור הקוסמי.*\n> \"I celebrate myself, and sing myself,\n> And what I assume you shall assume,\n> For every atom belonging to me as good belongs to you.\n> ...\n> Do I contradict myself?\n> Very well then I contradict myself,\n> (I am large, I contain multitudes.)\"\n*הסבר:* ויטמן מציג תפיסת אישיות המכילה ריבוי קולות וסתירות, ומזמין את הקורא להכיר בכך שכולנו חולקים את אותו חומר קוסמי.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_2_o_captain_my_captain_הו_רב_חובל_רב_חובל_שלי", "label": "2. O Captain! My Captain! (הו רב חובל! רב חובל שלי!)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. O Captain! My Captain! (הו רב חובל! רב חובל שלי!)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "*קינה שנכתבה בעקבות רצח אברהם לינקולן בסיום מלחמת האזרחים.*\n> \"O Captain! my Captain! our fearful trip is done,\n> The ship has weather’d every rack, the prize we sought is won,\n> The port is near, the bells I hear, the people all exulting,\n> While follow eyes the steady keel, the vessel grim and daring;\n> But O heart! heart! heart!\n> O the bleeding drops of red,\n> Where on the deck my Captain lies,\n> Fallen cold and dead.\"\n*הסבר:* שיר המשלב ניצחון קולקטיבי עם אבל אישי עמוק, ומדגים את השבריריות של ההנהגה והיחסים הבינאישיים.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_3_i_hear_america_singing_אני_שומע_את_אמריקה_שרה", "label": "3. I Hear America Singing (אני שומע את אמריקה שרה)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. I Hear America Singing (אני שומע את אמריקה שרה)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "*שיר הלל למעמד הפועלים והאינטגרציה החברתית.*\n> \"I hear America singing, the varied carols I hear,\n> Those of mechanics, each one singing his as it should be blithe and strong,\n> The carpenter singing his as he measures his plank or beam,\n> The mason singing his as he makes ready for work, or leaves off work...\"\n*הסבר:* חגיגה של האישיות היצרנית והאינדיבידואלית התורמת להרמוניה הכללית.", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_4_a_noiseless_patient_spider_עכביש_חרישי_וסבלן", "label": "4. A Noiseless Patient Spider (עכביש חרישי וסבלן)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. A Noiseless Patient Spider (עכביש חרישי וסבלן)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "*מטאפורה מבריקה למאמצי הנפש ליצור קשר עם העולם.*\n> \"A noiseless patient spider,\n> I mark’d where on a little promontory it stood isolated,\n> Mark’d how to explore the vacant vast surrounding,\n> It launch’d forth filament, filament, filament, out of itself,\n> Ever unreeling them, ever tirelessly speeding them.\n> And you O my soul where you stand,\n> Surrounded, detached, in measureless oceans of space...\"\n*הסבר:* השוואה של נפש האדם לעכביש הטווה קורים אל תוך החלל הריק כדי למצוא נקודת אחיזה וחיבור (קשרים בין-אישיים וקיומיים).", "_is_h1": false}, {"id": "knowledge_base_poetry_whitman_5_out_of_the_cradle_endlessly_rocking_מתוך_העריסה_המתנועעת_בלי_די", "label": "5. Out of the Cradle Endlessly Rocking (מתוך העריסה המתנועעת בלי די)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Out of the Cradle Endlessly Rocking (מתוך העריסה המתנועעת בלי די)", "community": 13, "community_name": "Community 13", "source_file": "knowledge_base/poetry_whitman.md", "file_type": "document", "degree": 1, "_description": "*פואמה על לידת משורר מתוך צפייה בזוג ציפורים ואובדן.*\n> \"Out of the cradle endlessly rocking,\n> Out of the mocking-bird’s throat, the musical shuttle,\n> Out of the Ninth-month midnight,\n> Over the sterile sands and the fields beyond, where the child leaving his bed wander’d alone, bareheaded, barefoot...\"\n*הסבר:* חקירה של המוות כיוצר יופי ואמנות, וכיצד אובדן מעצב את רגשות האדם והאישיות.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde", "label": "poetry_wilde.md", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_wilde.md", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_אסתטיציזם_מסכות_והחיים_כאמנות_oscar_wilde", "label": "אסתטיציזם, מסכות והחיים כאמנות (Oscar Wilde)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "אסתטיציזם, מסכות והחיים כאמנות (Oscar Wilde)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nOscar Wilde's The Picture of Dorian Gray and De Profundis", "_is_h1": true}, {"id": "knowledge_base_poetry_wilde_הגדרה", "label": "הגדרה", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "אוסקר ויילד, סופר, מחזאי ומשורר אירי, היה נציג מובהק של התנועה האסתטית (\"אמנות לשם אמנות\"). הוא טען שהחיים מחקים את האמנות יותר מאשר האמנות מחקה את החיים, וראה בחיים עצמם יצירת אמנות שיש לעצב.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "1. **מסכות ואותנטיות:** \"תן לאדם מסכה, והוא יגיד לך את האמת.\" ויילד הבין שהחברה דורשת מאיתנו לעטות מסכות, אך דווקא באמצעות מסווה ומשחק האדם יכול לבטא את רצונותיו הכמוסים ביותר. \n2. **מחיר היופי וההדחקה:** ב\"תמונתו של דוריאן גריי\", הוא חושף את ההשלכות ההרסניות של מרדף חסר פשרות אחר יופי חיצוני תוך כדי הדחקת ההשחתה המוסרית והנפשית (הצל המוסתר בציור).\n3. **הסבל כגילוי:** במכתבו מהכלא (\"ממעמקים\"), ויילד חושף את העומק שנוצר באישיות דווקא דרך סבל וכאב שאינו ניתן להסתרה.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_1_the_ballad_of_reading_gaol_בלדת_כלא_רדינג", "label": "1. The Ballad of Reading Gaol (בלדת כלא רדינג)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. The Ballad of Reading Gaol (בלדת כלא רדינג)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "*שיר עוצמתי שנכתב לאחר שחרורו מהכלא, הדן בסבל, צדק והטבע האנושי.*\n> \"Yet each man kills the thing he loves,\n> By each let this be heard,\n> Some do it with a bitter look,\n> Some with a flattering word,\n> The coward does it with a kiss,\n> The brave man with a sword!\"\n*הסבר:* ויילד חושף את המורכבות והסתירות שבלב האדם, וכיצד רגשות עזים של אהבה יכולים להפוך להרסניים במערכות יחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_2_requiescat_ינוח_בשלום", "label": "2. Requiescat (ינוח בשלום)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Requiescat (ינוח בשלום)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "*קינה קורעת לב שנכתבה לזכר אחותו הצעירה שנפטרה.*\n> \"Tread lightly, she is near\n> Under the snow,\n> Speak gently, she can hear\n> The daisies grow.\"\n*הסבר:* ביטוי של אבל מעודן ושקט, המדגים כיצד חוויית האובדן מעדנת את נפש האדם ומחברת אותה אל העדינות שבטבע.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_3_the_harlot_s_house_בית_הזונה", "label": "3. The Harlot’s House (בית הזונה)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. The Harlot’s House (בית הזונה)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "*שיר המשלב מקצבים תיאטרליים ודימויים המציגים ניכור מודרני.*\n> \"We caught the tread of dancing feet,\n> We saw the shadows flit and fleet,\n> As we went down the horny street.\"\n*הסבר:* ויילד מתאר בני אדם כבובות על חוט או כצללים חסרי רוח חיים, מטאפורה המבקרת את השטחיות והריקנות של קשרים חברתיים מסוימים.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_4_the_sphinx_הספינקס", "label": "4. The Sphinx (הספינקס)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. The Sphinx (הספינקס)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "*פואמה אקזוטית העוסקת בקונפליקט שבין התשוקה הפיזית ליציבות הרוחנית.*\n> \"Go-seek thy lovers in the tomb! Go-seek thy mates in the hot sands!\n> Go to the land of Nile and wash thy sweaty and sunburnt hands.\"\n*הסבר:* מאבק פנימי בין הרצון בהתעלות רוחנית לבין המשיכה ליצרים הפראיים והקדמוניים בתוך אישיות האדם.", "_is_h1": false}, {"id": "knowledge_base_poetry_wilde_5_symphony_in_yellow_סימפוניה_בצהוב", "label": "5. Symphony in Yellow (סימפוניה בצהוב)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Symphony in Yellow (סימפוניה בצהוב)", "community": 14, "community_name": "Community 14", "source_file": "knowledge_base/poetry_wilde.md", "file_type": "document", "degree": 1, "_description": "*שיר אימפרסיוניסטי המתאר את לונדון בערפל צהבהב.*\n> \"An omnibus across the bridge\n> Crawls like a yellow butterfly,\n> And, here and there, a passer-by\n> Shows like a little restless midge.\"\n*הסבר:* הדגמת הגישה האסתטית שרואה בעולם ובבני האדם מרכיבים בתוך תמונה אומנותית רחבה, המאפשרת התבוננות שלווה ומרוחקת על המציאות.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt", "label": "productivity_tmt.md", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "productivity_tmt.md", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_תיאוריית_המוטיבציה_הטמפורלית_temporal_motivation_theory", "label": "תיאוריית המוטיבציה הטמפורלית (Temporal Motivation Theory)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "תיאוריית המוטיבציה הטמפורלית (Temporal Motivation Theory)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nSteel, P. (2007). The nature of procrastination: A meta-analytic and theoretical integration of quintessential self-regulatory failure. Psychological Bulletin.", "_is_h1": true}, {"id": "knowledge_base_productivity_tmt_הגדרה", "label": "הגדרה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "תיאוריית המוטיבציה הטמפורלית (TMT) היא מודל אינטגרטיבי למוטיבציה ודחיינות המשלב מספר תיאוריות (כגון תיאוריית הציפיות וכלכלה התנהגותית). התיאוריה מסבירה מוטיבציה וקבלת החלטות באמצעות ארבעה משתנים מרכזיים, תוך דגש מיוחד על השפעת הזמן (דדליין) על הדחף לפעול.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_נוסחת_המוטיבציה", "label": "נוסחת המוטיבציה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "נוסחת המוטיבציה", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "המוטיבציה לבצע משימה מוגדרת על ידי היחס הבא:\n\\[Motivation = \\frac{Expectancy \\times Value}{1 + Impulsiveness \\times Delay}\\]", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_ארבעת_משתני_הנוסחה", "label": "ארבעת משתני הנוסחה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "ארבעת משתני הנוסחה", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 5, "_description": "", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_ציפייה_expectancy", "label": "ציפייה (Expectancy)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "ציפייה (Expectancy)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 3, "_description": "הסיכוי הנתפס להצלחה במשימה. ככל שהציפייה להצלחה גבוהה יותר, המוטיבציה עולה. חוסר ביטחון ביכולת לבצע יוצר הימנעות.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_חוללות_עצמית_self_efficacy", "label": "חוללות עצמית (Self-Efficacy)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "חוללות עצמית (Self-Efficacy)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "האמונה האישית של אדם ביכולתו לבצע משימה ספציפית. אמונה זו נבנית על סמך התנסויות עבר מוצלחות.\n* **יישום:** ביצוע סימולציות או משימות דומות וקלות יותר כדי לצבור ביטחון בסיסי.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_חוסר_אונים_נרכש_learned_helplessness", "label": "חוסר אונים נרכש (Learned Helplessness)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "חוסר אונים נרכש (Learned Helplessness)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "מצב פסיכולוגי שבו אדם מרגיש שאין לו שליטה על תוצאות מעשיו בעקבות כישלונות עבר חוזרים, מה שמוריד את הציפייה לאפס.\n* **יישום:** הגדרת משימה עם 100% סיכויי הצלחה בתחילת היום כדי לשבור את הדפוס.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_ערך_value", "label": "ערך (Value)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "ערך (Value)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 3, "_description": "מידת האטרקטיביות של המשימה או הפרס שלה. ערך גבוה מגביר מוטיבציה. אם המשימה משעממת, הערך שלה נמוך.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_מוטיבציה_פנימית_intrinsic_value", "label": "מוטיבציה פנימית (Intrinsic Value)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מוטיבציה פנימית (Intrinsic Value)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "מידת ההנאה או העניין מעצם ביצוע המשימה ללא קשר לפרס חיצוני.\n* **יישום:** התאמת שיטת העבודה להעדפות אישיות (כגון שמיעת מוזיקה או שימוש בכלים אהובים).", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_תגמול_חיצוני_extrinsic_reward", "label": "תגמול חיצוני (Extrinsic Reward)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תגמול חיצוני (Extrinsic Reward)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "הפרסים, הכסף, או ההכרה החברתית שמתקבלים בעקבות השלמת המשימה.\n* **יישום:** קביעת צ'ופר ברור וידוע מראש שיינתן רק לאחר סיום המשימה.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_אימפולסיביות_impulsiveness", "label": "אימפולסיביות (Impulsiveness)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "אימפולסיביות (Impulsiveness)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 3, "_description": "הרגישות של האדם לעיכובים בזמן וקושי בדחיית סיפוקים. אימפולסיביות גבוהה מקטינה את המוטיבציה לטווח הארוך ומגבירה דחיינות.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_קושי_בדחיית_סיפוקים_delay_gratification", "label": "קושי בדחיית סיפוקים (Delay Gratification)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "קושי בדחיית סיפוקים (Delay Gratification)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "הנטייה לבחור בפרס קטן ומיידי (כמו גלילה ברשתות חברתיות) על פני פרס גדול ועתידי (סיום פרויקט משמעותי).\n* **יישום:** הרחקת הסמארטפון מהחדר או שימוש באפליקציות חוסמות מסיחים.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_סגנון_קשב_וריכוז_attention_regulation", "label": "סגנון קשב וריכוז (Attention Regulation)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "סגנון קשב וריכוז (Attention Regulation)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "רמת הקושי הפיזיולוגית של האדם לשמור על קשב מתמשך לאורך זמן במשימות מונוטוניות.\n* **יישום:** שימוש בשיטת פומודורו (25 דקות עבודה, 5 דקות הפסקה מוגדרת).", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_עיכוב_delay", "label": "עיכוב (Delay)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עיכוב (Delay)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 3, "_description": "הזמן שנותר עד לקבלת הפרס או השלמת המשימה. ככל שהעיכוב גדול יותר, המוטיבציה הנוכחית קטנה (תופעה המכונה Temporal Discounting).", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_היוון_טמפורלי_temporal_discounting", "label": "היוון טמפורלי (Temporal Discounting)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "היוון טמפורלי (Temporal Discounting)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "הפחתת הערך של תגמול עתידי ככל שהוא רחוק יותר בזמן. עבור מוח אנושי, מטרות רחוקות (כמו פנסיה או הגשת עבודה בעוד חודש) מרגישות כמעט חסרות ערך בהווה.\n* **יישום:** חלוקת הפרויקט לאבני דרך שבועיות ויומיות המרגישות דחופות בהווה.", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_אפקט_סוף_השבוע_deadline_rush_effect", "label": "אפקט סוף השבוע (Deadline Rush Effect)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אפקט סוף השבוע (Deadline Rush Effect)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "העלייה הדרמטית ברמת המוטיבציה והמיקוד ברגע שמרחק הזמן (Delay) שואף לאפס, מה שמסביר מדוע רוב העבודה נעשית בלילה האחרון.\n* **יישום:** קביעת פגישת התקדמות עם גורם חיצוני באמצע הדרך כדי לייצר \"דדליין מלאכותי\".", "_is_h1": false}, {"id": "knowledge_base_productivity_tmt_מנגנון_פעולה_interventions", "label": "מנגנון פעולה (Interventions)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מנגנון פעולה (Interventions)", "community": 1, "community_name": "Community 1", "source_file": "knowledge_base/productivity_tmt.md", "file_type": "document", "degree": 1, "_description": "* **הקטנת ה-Delay:** פירוק משימה גדולה למשימות קטנות יומיות עם דדליינים עצמיים קרובים.\n* **העלאת ה-Expectancy:** ביצוע צעד ראשון קטן וקל מאוד כדי לשבור את מחסום ההתחלה.\n* **הקטנת ה-Impulsiveness:** יצירת סביבה נטולת הסחות דעת.\n* **העלאת ה-Value:** הוספת פרס קטן מיד עם סיום שלב במשימה או שינוי הגדרת המשימה כדי שתהיה מעניינת יותר.", "_is_h1": false}, {"id": "knowledge_base_relationships_aristotle", "label": "relationships_aristotle.md", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_aristotle.md", "community": 39, "community_name": "Community 39", "source_file": "knowledge_base/relationships_aristotle.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_aristotle_חברות_ומידות_טובות_aristotle", "label": "חברות ומידות טובות (Aristotle)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "חברות ומידות טובות (Aristotle)", "community": 39, "community_name": "Community 39", "source_file": "knowledge_base/relationships_aristotle.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nAristotle's Nicomachean Ethics", "_is_h1": true}, {"id": "knowledge_base_relationships_aristotle_הגדרה", "label": "הגדרה", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 39, "community_name": "Community 39", "source_file": "knowledge_base/relationships_aristotle.md", "file_type": "document", "degree": 1, "_description": "אריסטו רואה בחברות (Philia) רכיב הכרחי לחלוטין לחיים טובים. בספרו \"האתיקה הניקומכאית\", הוא טוען ש\"איש לא יבחר לחיות ללא חברים, גם אם יהיו לו כל שאר הטובין שבעולם\". חברות אינה רק קשר רגשי, אלא אמצעי מרכזי לפיתוח אישיות מוסרית ולהשגת האושר העליון ושגשוג אנושי (Eudaimonia).", "_is_h1": false}, {"id": "knowledge_base_relationships_aristotle_עקרונות_מרכזיים_שלושת_סוגי_החברות", "label": "עקרונות מרכזיים: שלושת סוגי החברות", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים: שלושת סוגי החברות", "community": 39, "community_name": "Community 39", "source_file": "knowledge_base/relationships_aristotle.md", "file_type": "document", "degree": 1, "_description": "אריסטו מסווג את מערכות היחסים לשלוש רמות, בהתאם למוטיבציה העומדת בבסיסן. חברות דורשת רצון טוב הדדי ומודע.\n\n1. **חברות של תועלת (Friendship of Utility):**\n   * הקשר מבוסס על היתרון או התועלת שכל צד מפיק מהשני (למשל, קולגות בעבודה, שותפים עסקיים).\n   * חברות זו נוטה להיות שברירית וזמנית, שכן ברגע שהתועלת נעלמת - הקשר מתפרק.\n2. **חברות של הנאה (Friendship of Pleasure):**\n   * הקשר מבוסס על ההנאה המשותפת מהבילוי יחד (למשל, חברים לתחביב או שותפים למסיבות).\n   * נפוצה במיוחד בקרב צעירים. גם חברות זו היא זמנית, שכן תחומי עניין והנאות משתנים עם הזמן.\n3. **חברות של סגולה/מעלה (Complete / Virtue Friendship):**\n   * הרמה הגבוהה והמושלמת ביותר של חברות.\n   * מתבססת על הערכה עמוקה של אופיו והמידות הטובות של האחר.\n   * החברים רוצים בטובתו של השני פשוט בגלל מי שהוא, ולא בגלל תועלת או הנאה רגעית.\n   * חברות זו היא נדירה, יציבה ודורשת זמן ואינטימיות כדי להיבנות.", "_is_h1": false}, {"id": "knowledge_base_relationships_aristotle_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 39, "community_name": "Community 39", "source_file": "knowledge_base/relationships_aristotle.md", "file_type": "document", "degree": 1, "_description": "חברות של סגולה פועלת כ**מראה**. דרך העיניים של חבר אמת, אנו יכולים לראות את עצמנו ואת המידות הטובות שלנו בצורה ברורה יותר. מערכות יחסים עמוקות אינן רק \"בונוס\" לחיים, אלא הן המסגרת שבה אנו מתרגלים התנהגות מוסרית, לומדים להבחין בין טוב לרע, ומעצבים את האישיות שלנו לעבר שגשוג אנושי מלא. אדם טוב זקוק לאנשים טובים סביבו כדי לממש את הפוטנציאל המוסרי שלו.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment", "label": "relationships_attachment.md", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_attachment.md", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_תיאוריית_ההיקשרות_במערכות_יחסים_בוגרות_attachment_theory", "label": "תיאוריית ההיקשרות במערכות יחסים בוגרות (Attachment Theory)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "תיאוריית ההיקשרות במערכות יחסים בוגרות (Attachment Theory)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nBowlby, J. (1982). Attachment and loss; Hazan, C., & Shaver, P. (1987). Romantic love as an attachment process. Journal of Personality and Social Psychology.", "_is_h1": true}, {"id": "knowledge_base_relationships_attachment_הגדרה", "label": "הגדרה", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "תיאוריית ההיקשרות מסבירה כיצד דפוסי הקשר שפיתחנו בילדות עם המטפלים העיקריים שלנו מעצבים את הדרך שבה אנו מנהלים מערכות יחסים, אינטימיות וקונפליקטים בבגרותנו.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_ארבעת_דפוסי_ההיקשרות_המרכזיים", "label": "ארבעת דפוסי ההיקשרות המרכזיים", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "ארבעת דפוסי ההיקשרות המרכזיים", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 5, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_היקשרות_בטוחה_secure", "label": "היקשרות בטוחה (Secure)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "היקשרות בטוחה (Secure)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 3, "_description": "נוחות עם אינטימיות מחד ועם עצמאות מאידך. יכולת לתקשר צרכים ורגשות בצורה פתוחה ולתת אמון בבן הזוג.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_מודל_עבודה_פנימי_חיובי_positive_working_model", "label": "מודל עבודה פנימי חיובי (Positive Working Model)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מודל עבודה פנימי חיובי (Positive Working Model)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "תפיסה עצמית כראוי לאהבה ותפיסת האחר כנגיש, אמין ותומך.\n* **יישום:** פתרון קונפליקטים מתוך ביטחון ששני הצדדים רוצים בטובת הקשר, ללא האשמות הדדיות.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_ויסות_רגשי_יעיל_effective_emotion_regulation", "label": "ויסות רגשי יעיל (Effective Emotion Regulation)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "ויסות רגשי יעיל (Effective Emotion Regulation)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "יכולת להתמודד עם מתח וקושי בקשר ללא כניסה לחרדה קיצונית או לחלופין התנתקות קרה.\n* **יישום:** בקשת מרחב או שיחה רגועה בעת הצורך מבלי לאיים על יציבות הקשר.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_היקשרות_חרדתית_anxious_preoccupied", "label": "היקשרות חרדתית (Anxious-Preoccupied)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "היקשרות חרדתית (Anxious-Preoccupied)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 3, "_description": "רצון עז לאינטימיות גבוהה לצד פחד מתמיד מנטישה, דחייה או חוסר הערכה. נטייה לרגישות יתר לאיתותים שליליים מצד בן הזוג.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_התנהגויות_של_מחאה_protest_behaviors", "label": "התנהגויות של מחאה (Protest Behaviors)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "התנהגויות של מחאה (Protest Behaviors)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "פעולות המיועדות לשקם את הקשר ולקבל תשומת לב באמצעות יצירת דרמה, כגון ניסיונות לגרום לקנאה, התעלמות מכוונת, או שיחות מרובות ללא מענה.\n* **יישום:** זיהוי התנהגות המחאה בזמן אמת ועצירתה לטובת הבעת הצורך האמיתי בביטחון.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_רגישות_יתר_לאיומים_hyperactivation_of_attachment_system", "label": "רגישות יתר לאיומים (Hyperactivation of Attachment System)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "רגישות יתר לאיומים (Hyperactivation of Attachment System)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "רדאר רגיש מדי לשינויים קלים ביותר בטון הדיבור, בהודעות הטקסט או במצב הרוח של בן הזוג, המתפרשים מיד כסימן לנטישה מתקרבת.\n* **יישום:** ביצוע בדיקת מציאות (Reality Check) לפני שמגיבים בסערה לשינוי זמני בהתנהגות בן הזוג.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_היקשרות_נמנעת_מתגוננת_dismissive_avoidant", "label": "היקשרות נמנעת-מתגוננת (Dismissive-Avoidant)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "היקשרות נמנעת-מתגוננת (Dismissive-Avoidant)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 3, "_description": "העדפה מובהקת לעצמאות רגשית והסתמכות עצמית. נטייה להתרחק או להדוף קשר כאשר רמת האינטימיות עולה או בזמן קונפליקט.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_אסטרטגיות_הרחקה_deactivating_strategies", "label": "אסטרטגיות הרחקה (Deactivating Strategies)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אסטרטגיות הרחקה (Deactivating Strategies)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "פעולות מודעות ולא מודעות שנועדו למנוע קירבה רגשית גדולה מדי, כגון התמקדות מוגזמת בפגמים של בן הזוג, פנטזיות על \"הבן זוג המושלם\", או התחמקות משיחות עומק.\n* **יישום:** מודעות עצמית לכך שהצורך במרחק נובע מפחד מאינטימיות, ולאו דווקא מחוסר התאמה של בן הזוג.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_עצמאות_מדומה_hyper_independence", "label": "עצמאות מדומה (Hyper-Independence)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עצמאות מדומה (Hyper-Independence)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "אמונה נוקשה שאדם יכול ויכול רק לסמוך על עצמו, מה שמוביל לקושי רב לבקש או לקבל עזרה, תמיכה או הבעת פגיעות.\n* **יישום:** תרגול הבעת בקשה קטנה לעזרה או שיתוף בקושי אישי קטן עם בן הזוג.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_היקשרות_נמנעת_חרדתית_fearful_avoidant_disorganized", "label": "היקשרות נמנעת-חרדתית (Fearful-Avoidant / Disorganized)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "היקשרות נמנעת-חרדתית (Fearful-Avoidant / Disorganized)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 3, "_description": "שילוב של רצון עז בקרבה לצד פחד עמוק מאינטימיות ופגיעה. מאופיין בדפוס תנודתי של התקרבות והתרחקות קיצונית.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_מעגל_התקרבות_התרחקות_come_here_go_away_loop", "label": "מעגל התקרבות-התרחקות (Come-Here-Go-Away Loop)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מעגל התקרבות-התרחקות (Come-Here-Go-Away Loop)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "כאשר הם רחוקים רגשית הם חווים חרדה ורצון עז בקרבה, אך ברגע שהקשר מתהדק והופך לאינטימי, הם חווים בהלה ונסוגים במהירות.\n* **יישום:** תיאום מראש עם בן הזוג על קצב התקרבות איטי ומבוקר.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_תפיסת_עצמי_והזולת_כשליליים_negative_self_other_model", "label": "תפיסת עצמי והזולת כשליליים (Negative Self & Other Model)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת עצמי והזולת כשליליים (Negative Self &amp; Other Model)", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "אמונה פנימית עמוקה שהם עצמם אינם ראויים לאהבה, ובו בזמן שאחרים אינם אמינים ופוגעניים מטבעם.\n* **יישום:** פנייה לטיפול רגשי/פסיכולוגי לבניית תחושת ערך עצמי וביטחון בסיסיים.", "_is_h1": false}, {"id": "knowledge_base_relationships_attachment_מנגנון_פעולה_ויישום_לשיפור_מערכות_יחסים", "label": "מנגנון פעולה ויישום לשיפור מערכות יחסים", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מנגנון פעולה ויישום לשיפור מערכות יחסים", "community": 2, "community_name": "Community 2", "source_file": "knowledge_base/relationships_attachment.md", "file_type": "document", "degree": 1, "_description": "* **מודעות עצמית:** זיהוי הדפוס האישי והבנה מהם ה\"טריגרים\" הרגשיים שלנו בקשר (למשל, שתיקה של בן הזוג המפעילה חרדת נטישה).\n* **ויסות משותף (Coregulation):** למידה של תקשורת מקרבת המביעה את הצורך הבסיסי בביטחון או במרחב מבלי להאשים את הצד השני, דבר המפחית את מעגל ה\"חרדתי-נמנע\" הקלאסי.", "_is_h1": false}, {"id": "knowledge_base_relationships_brown", "label": "relationships_brown.md", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "relationships_brown.md", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_relationships_brown_כוחה_של_פגיעות_והתמודדות_עם_בושה_brené_brown", "label": "כוחה של פגיעות והתמודדות עם בושה (Brené Brown)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "כוחה של פגיעות והתמודדות עם בושה (Brené Brown)", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nBrené Brown's Daring Greatly and The Gifts of Imperfection", "_is_h1": true}, {"id": "knowledge_base_relationships_brown_הגדרה", "label": "הגדרה", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 25, "community_name": "Community 25", "source_file": "knowledge_base/relationships_brown.md", "file_type": "document", "degree": 1, "_description": "פרופסור ברנה בראון היא חוקרת מודרנית העוסקת בנושאים של אומץ, פגיעות (Vulnerability), בושה, ואמפתיה. בניגוד לתפיסה החברתית שרואה בפגיעות חולשה, מחקריה של בראון מוכיחים כי היכולת להיות פגיע היא המקור העיקרי לחדשנות, ליצירתיות, ולאומץ במערכות
