, "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "שלושת הצרכים הפסיכולוגיים הבסיסיים", "community": 37, "community_name": "Community 37", "source_file": "knowledge_base/motivation_sdt.md", "file_type": "document", "degree": 1, "_description": "התיאוריה מגדירה שלושה צרכים פסיכולוגיים אוניברסליים שהכרחיים לבריאות נפשית, רווחה, ומוטיבציה אופטימלית:\n1. **אוטונומיה (Autonomy):** הצורך להרגיש שליטה על ההתנהגות ועל המטרות האישיות. תחושה של בחירה חופשית והכוונה עצמית.\n2. **מסוגלות (Competence):** הצורך לחוות שליטה בסביבה ולהשיג תוצאות רצויות. תחושה של יעילות ויכולת להתמודד עם אתגרים.\n3. **שייכות (Relatedness):** הצורך להרגיש מחובר לאחרים, לדאוג ושידאגו לך. תחושה של קשרים חברתיים משמעותיים ובטוחים.", "_is_h1": false}, {"id": "knowledge_base_motivation_sdt_מנגנון_פעולה_intervention", "label": "מנגנון פעולה (Intervention)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מנגנון פעולה (Intervention)", "community": 37, "community_name": "Community 37", "source_file": "knowledge_base/motivation_sdt.md", "file_type": "document", "degree": 1, "_description": "כאשר סביבה מספקת ותומכת בשלושת הצרכים הללו, המוטיבציה הפנימית עולה משמעותית, ואיתה גם הפרודוקטיביות וההתמדה.\nלעומת זאת, סביבה הפוגעת באוטונומיה (למשל, באמצעות תגמולים חיצוניים נוקשים או פיקוח יתר) עלולה לפגוע במוטיבציה הפנימית.", "_is_h1": false}, {"id": "knowledge_base_motivation_sdt_יישום_לפרודוקטיביות_אישית", "label": "יישום לפרודוקטיביות אישית", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "יישום לפרודוקטיביות אישית", "community": 37, "community_name": "Community 37", "source_file": "knowledge_base/motivation_sdt.md", "file_type": "document", "degree": 1, "_description": "כדי להגביר מוטיבציה למשימה שאין חשק לבצע:\n* **אוטונומיה:** כיצד אני יכול לבצע את המשימה בדרך *שלי*? (בחירת שעות, בחירת שיטת העבודה).\n* **מסוגלות:** כיצד אוכל לפרק את המשימה כך שאחווה הצלחות קטנות ומהירות שיוכיחו לי שאני מסוגל?\n* **שייכות:** האם אוכל לחבר את המשימה למטרה גדולה יותר התורמת לצוות, למשפחה או לקהילה שלי?", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral", "label": "personality_behavioral.md", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_behavioral.md", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_ניתוח_התנהגות_יישומי_behavioral", "label": "ניתוח התנהגות יישומי (Behavioral)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "ניתוח התנהגות יישומי (Behavioral)", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nB.F. Skinner & Watson", "_is_h1": true}, {"id": "knowledge_base_personality_behavioral_הגדרה", "label": "הגדרה", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "הגישה ההתנהגותית (ביהביוריזם) מתמקדת בחקר התנהגות גלויה הניתנת לתצפית ולמדידה, וכיצד היא מעוצבת ומשתנה על ידי גירויים וחיזוקים בסביבה. לפי גישה זו, תודעה ומחשבות הן משתנים סמויים, וההתנהגות עצמה היא המפתח להבנת האדם ולשינוי הרגליו.", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_1_מודל_abc_functional_behavior_analysis", "label": "1. מודל ABC (Functional Behavior Analysis)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. מודל ABC (Functional Behavior Analysis)", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "הכלי המרכזי לניתוח התנהגות והבנת המניעים העומדים מאחוריה:\n*   **Antecedent (מקדים/טריגר):** הגירויים הסביבתיים או המצבים הפנימיים שקודמים להתנהגות ומעוררים אותה (למשל, שעמום, חרדה, עומס).\n*   **Behavior (התנהגות):** הפעולה הפיזית או התגובה של האדם (כמו דחיינות, הימנעות, ריצה).\n*   **Consequence (תוצאה):** מה שמתרחש מיד לאחר ההתנהגות ומשפיע על הסיכוי שהיא תחזור על עצמה.", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_2_חיזוקים_מול_עונשים_reinforcements_punishments", "label": "2. חיזוקים מול עונשים (Reinforcements & Punishments)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. חיזוקים מול עונשים (Reinforcements &amp; Punishments)", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "*   **חיזוק חיובי (Positive Reinforcement):** קבלת גירוי נעים המגדיל את תדירות ההתנהגות (פרס, מחמאה, תחושת הישג).\n*   **חיזוק שלילי / הימנעות (Negative Reinforcement):** הסרת גירוי בלתי נעים המגדילה את תדירות ההתנהגות (למשל, דחיית משימה קשה מפחיתה זמנית את מפלס החרדה ומביאה להקלה מהירה, ולכן הדחיינות מתחזקת).", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_3_עיצוב_התנהגות_והרגלים_shaping_habits", "label": "3. עיצוב התנהגות והרגלים (Shaping & Habits)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. עיצוב התנהגות והרגלים (Shaping &amp; Habits)", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "תהליך של בניית הרגלים חדשים על ידי חלוקת מטרות מורכבות לצעדים קטנים ומתן חיזוקים עקביים.", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_אינדיקטורים_לשוניים_והתנהגותיים_linguistic_behavioral_indicators", "label": "אינדיקטורים לשוניים והתנהגותיים (Linguistic & Behavioral Indicators)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אינדיקטורים לשוניים והתנהגותיים (Linguistic &amp; Behavioral Indicators)", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "*   **טריגרים ומקדימים (A):** ביטויים כמו \"מול המשימה\", \"כשאני רואה את\", \"לפני ה...\", \"התנאים היו\", \"הסביבה גרמה לי\".\n*   **הימנעות ודחיינות (B):** מילים כמו \"דחיתי\", \"העדפתי לעשות משהו אחר\", \"ברחתי ל...\", \"נמנעתי משיחה\", \"ביטלתי ברגע האחרון\".\n*   **חיזוק שלילי והקלה (C):** מילים כמו \"הקלה\", \"סוף סוף שקט\", \"פתאום נרגעתי\", \"הסרתי את הדאגה\", \"ירד לי אבן מהלב\".\n*   **חיזוק חיובי (C):** מילים כמו \"סיפוק\", \"תגמול\", \"פידבק חיובי\", \"שווה את המאמץ\", \"רציתי להשיג\".", "_is_h1": false}, {"id": "knowledge_base_personality_behavioral_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 15, "community_name": "Community 15", "source_file": "knowledge_base/personality_behavioral.md", "file_type": "document", "degree": 1, "_description": "האישיות היא אוסף של הרגלים והתנהגויות שנלמדו לאורך השנים דרך מערכות של חיזוקים סביבתיים. במערכות יחסים, אינטראקציות רבות מעוצבות על ידי חיזוקים הדדיים. שינוי אישי או זוגי מתחיל בהבנת הטריגרים (A) והתוצאות (C) של ההתנהגויות שלנו, ועיצוב מחדש של הסביבה כדי לתמוך בהרגלים חיוביים ומצמיחים.", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism", "label": "personality_buddhism.md", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_buddhism.md", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism_העדר_עצמי_וחמלה_buddhism", "label": "העדר עצמי וחמלה (Buddhism)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "העדר עצמי וחמלה (Buddhism)", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nEarly Buddhist Teachings (Siddhartha Gautama)", "_is_h1": true}, {"id": "knowledge_base_personality_buddhism_הגדרה", "label": "הגדרה", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 1, "_description": "ליבת תורתו של סידהארתא גאוטמה (הבודהה) עוסקת בשחרור מסבל (Dukkha). הבודהיזם מציע רדיקליות פילוסופית בכל הנוגע לאישיות: הוא שולל את קיומו של \"אני\" קבוע ובלתי משתנה, וטוען ששחרור מתאפשר רק על ידי הבנת אשליית הנפרדות וההכרה בקשר ההדדי של כל תופעות הטבע.", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism_1_העדר_עצמי_קבוע_anatta_non_self", "label": "1. העדר עצמי קבוע (Anatta / Non-Self)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. העדר עצמי קבוע (Anatta / Non-Self)", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 1, "_description": "הבודהה לימד שמה שאנו קוראים לו \"אני\", \"אישיות\" או \"נשמה\" הוא למעשה אוסף זמני ומשתנה של תהליכים גופניים ונפשיים (חמשת המצרפים - Skandhas). אין גרעין קבוע מאחורי התופעות הללו. ההבנה של רעיון ה-Anatta נועדה להפסיק את הנטייה הבלתי פוסקת שלנו ל\"עשיית-אני\" ו\"עשיית-שלי\" - ההיאחזות בזהויות, ברכוש ובתפקידים, שמייצרת חרדה ואגואיזם.", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism_2_קשר_הדדי_ותלות_גומלין_dependent_origination", "label": "2. קשר הדדי ותלות גומלין (Dependent Origination)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. קשר הדדי ותלות גומלין (Dependent Origination)", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 1, "_description": "שום דבר אינו קיים בבידוד. כל תופעה, כולל עצם קיומנו, עולה ודועכת כתלות בסיבות ובתנאים אחרים. בדיוק כפי שמרכבה היא רק אוסף של חלקים התלויים זה בזה, כך גם האדם הוא אוסף של תהליכים התלויים בסביבתו ובאנשים אחרים. הכרה בתלות הגומלין ממסמסת את אשליית \"העצמי הנפרד\".", "_is_h1": false}, {"id": "knowledge_base_personality_buddhism_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 26, "community_name": "Community 26", "source_file": "knowledge_base/personality_buddhism.md", "file_type": "document", "degree": 1, "_description": "כאשר חומות האגו (המבוססות על האשליה של \"אני נפרד שצריך להגן עליו\") נופלות, מערכות היחסים עוברות טרנספורמציה:\n* **חמלה (Karuna):** החמלה אינה חובה מוסרית חיצונית, אלא תוצאה טבעית של ההבנה שכולנו חולקים את אותו טבע משתנה ואת אותה נטייה לסבל. כאשר אדם מבין שרווחתו האישית שזורה ברווחתם של אחרים, אלטרואיזם מופיע כתגובה טבעית ולא כמאמץ.\n* **העדר תחרותיות:** בהיעדר \"עצמי\" נוקשה שיש לפאר או להגן עליו, מערכות היחסים מתנקות מתחרותיות, קינאה או רצון לשליטה. נוצר \"מרחב\" פנימי שמאפשר חיבור עמוק ואמיתי יותר לזולת. התפתחות אישית, בראייה הבודהיסטית, היא תהליך של \"הפחתת\" האגו לטובת חיבור רחב יותר ליקום ולכל היצורים החיים.", "_is_h1": false}, {"id": "knowledge_base_personality_cbt", "label": "personality_cbt.md", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_cbt.md", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_טיפול_קוגניטיבי_התנהגותי_cbt", "label": "טיפול קוגניטיבי התנהגותי (CBT)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "טיפול קוגניטיבי התנהגותי (CBT)", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nAaron Beck & Albert Ellis", "_is_h1": true}, {"id": "knowledge_base_personality_cbt_הגדרה", "label": "הגדרה", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "טיפול קוגניטיבי התנהגותי (CBT) הוא גישה טיפולית ממוקדת קצרת-טווח, המבוססת על ההנחה שרגשות והתנהגויות שליליים נובעים מדפוסי חשיבה ופירושים מעוותים של המציאות, ולא מהאירועים עצמם. על ידי זיהוי ואתגור דפוסי חשיבה אלו, המטופל יכול לשנות את מצבו הרגשי ותפקודו ההתנהגותי.", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_1_עיוותי_חשיבה_cognitive_distortions", "label": "1. עיוותי חשיבה (Cognitive Distortions)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. עיוותי חשיבה (Cognitive Distortions)", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "דפוסים מוטים ובלתי יעילים של עיבוד מידע הגורמים למצוקה רגשית:\n*   **הכללת יתר (Overgeneralization):** הסקת מסקנה גורפת מאירוע בודד.\n*   **חשיבה של הכל או כלום (All-or-Nothing Thinking):** תפיסת המציאות בשחור ולבן, ללא גווני ביניים.\n*   **קריאת מחשבות (Mind Reading):** אמונה מוצקה שאנו יודעים מה אחרים חושבים עלינו, ללא הוכחה.\n*   **חשיבה רגשית (Emotional Reasoning):** הנחה שהרגש השלילי משקף את האמת העובדתית.", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_2_אמונות_ליבה_core_beliefs", "label": "2. אמונות ליבה (Core Beliefs)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. אמונות ליבה (Core Beliefs)", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "הנחות היסוד העמוקות והנוקשות ביותר שיש לאדם על עצמו, על אחרים ועל העולם (למשל: \"אני לא ראוי\", \"העולם מסוכן\").", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_3_משולש_ה_cbt_cbt_triangle", "label": "3. משולש ה-CBT (CBT Triangle)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. משולש ה-CBT (CBT Triangle)", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "ההשפעה ההדדית והמעגלית בין שלושה מרכיבים: מחשבות, רגשות, והתנהגויות (הימנעות/פיצוי).", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_אינדיקטורים_לשוניים_והתנהגותיים_linguistic_behavioral_indicators", "label": "אינדיקטורים לשוניים והתנהגותיים (Linguistic & Behavioral Indicators)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אינדיקטורים לשוניים והתנהגותיים (Linguistic &amp; Behavioral Indicators)", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "*   **הכללת יתר:** מילים כמו \"תמיד\", \"אף פעם\", \"כולם\", \"אף אחד\", \"אף פעם לא מצליח\", \"כמו תמיד\".\n*   **חשיבת הכל-או-כלום:** מילים כמו \"כישלון מוחלט\", \"מושלם\", \"או הכל או כלום\", \"או ש... או ש...\", \"אכזבה גמורה\".\n*   **חשיבה קטסטרופלית:** מילים כמו \"נורא ואיום\", \"אסון\", \"סוף העולם\", \"יהרוס את הכל\", \"לא אוכל לעמוד בזה\".\n*   **חשיבה רגשית:** מילים כמו \"מרגיש לי ש...\", \"הרגשה חזקה\", \"אינטואיציה שלי אומרת\", \"מתוסכל סימן שזה לא יעבוד\".\n*   **חוקי 'צריך' ו'חייב':** מילים כמו \"אני צריך\", \"אני חייב\", \"הייתי אמור\", \"אסור לי\", \"חובה עלי\".", "_is_h1": false}, {"id": "knowledge_base_personality_cbt_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 16, "community_name": "Community 16", "source_file": "knowledge_base/personality_cbt.md", "file_type": "document", "degree": 1, "_description": "לפי גישת ה-CBT, בעיות במערכות יחסים נובעות לרוב מעיוותי חשיבה הדדיים (כמו \"קריאת מחשבות\" או \"התאמה אישית\"). פיתוח תקשורת בריאה ושיפור האישיות דורשים למידה מודעת של זיהוי המחשבות האוטומטיות השליליות, הטלת ספק באמינותן, והחלפתן בפרשנויות גמישות ומציאותיות יותר.", "_is_h1": false}, {"id": "knowledge_base_personality_clinical", "label": "personality_clinical.md", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_clinical.md", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_פסיכיאטריה_קלינית_ומדדים_פיזיולוגיים_clinical", "label": "פסיכיאטריה קלינית ומדדים פיזיולוגיים (Clinical)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "פסיכיאטריה קלינית ומדדים פיזיולוגיים (Clinical)", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nDSM-5-TR / Clinical Psychiatry", "_is_h1": true}, {"id": "knowledge_base_personality_clinical_הגדרה", "label": "הגדרה", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "הגישה הקלינית מתמקדת במיפוי וניתוח של סימפטומים נפשיים ופיזיולוגיים, סווגם תחת קריטריונים אבחוניים מדעיים (כמו ה-DSM-5), ובדיקת השפעתם על התפקוד היומיומי ורווחתו של האדם. גישה זו מייחסת חשיבות רבה לקשר הדו-כיווני שבין מדדי גוף (שינה, דופק) למצבים נפשיים.", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_1_תסמינים_קליניים_ורמות_סטרס_distress_symptoms", "label": "1. תסמינים קליניים ורמות סטרס (Distress & Symptoms)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. תסמינים קליניים ורמות סטרס (Distress &amp; Symptoms)", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "מעקב וזיהוי של דפוסים המעידים על קושי נפשי מתפתח:\n*   **תסמיני חרדה (Anxiety):** דאגנות יתר, מתח שרירי, דפיקות לב מוגברות ודפוסי הימנעות.\n*   **מצב רוח ירוד (Depressive Features):** חוסר מוטיבציה, אובדן הנאה (Anhedonia), ותפיסה עצמית שלילית.\n*   **סומטיזציה (Somatization):** ביטוי גופני של לחץ נפשי, כגון כאבי ראש, בטן, או תשישות פיזית לא מוסברת.", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_2_שינה_ותפקוד_יומיומי_daily_functioning_sleep", "label": "2. שינה ותפקוד יומיומי (Daily Functioning & Sleep)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. שינה ותפקוד יומיומי (Daily Functioning &amp; Sleep)", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "הערכה של איכות השינה, קשיי הירדמות או יקיצות מוקדמות, ורמות האנרגיה והריכוז במהלך היום.", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_3_מתאם_פיזיולוגי_נפשי_mind_body_correlation", "label": "3. מתאם פיזיולוגי-נפשי (Mind-Body Correlation)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. מתאם פיזיולוגי-נפשי (Mind-Body Correlation)", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "הקשר ההדדי בין מדדי הבריאות של הגוף לבין המצב המנטלי – דופק גבוה במנוחה או איכות שינה נמוכה המנבאים ומחריפים מצבי חרדה.", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_אינדיקטורים_לשוניים_והתנהגותיים_linguistic_behavioral_indicators", "label": "אינדיקטורים לשוניים והתנהגותיים (Linguistic & Behavioral Indicators)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אינדיקטורים לשוניים והתנהגותיים (Linguistic &amp; Behavioral Indicators)", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "*   **תסמיני חרדה:** מילים כמו \"לחץ\", \"דאגה\", \"מוטרד\", \"לא שקט\", \"פחד\", \"משותק מלחץ\", \"חרד\".\n*   **סומטיזציה:** ביטויים כמו \"לחץ בחזה\", \"קוצר נשימה\", \"כאב בטן\", \"כאב ראש\", \"שרירים תפוסים\", \"בחילות\", \"מחנק\".\n*   **נדודי שינה ותפקוד:** ביטויים כמו \"לא מצליח להירדם\", \"קמתי מוקדם\", \"עייפות גמורה\", \"חסר אנרגיה\", \"סחוט\", \"חוסר ריכוז\", \"מותש\".\n*   **תנודות במצב הרוח:** ביטויים כמו \"עליות וירידות\", \"רכבת הרים\", \"מצב רוח בריצפה\", \"מאניה\", \"פתאום הכל קרס\", \"היי מטורף\".", "_is_h1": false}, {"id": "knowledge_base_personality_clinical_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 17, "community_name": "Community 17", "source_file": "knowledge_base/personality_clinical.md", "file_type": "document", "degree": 1, "_description": "לפי הגישה הקלינית, המצב הפיזיולוגי והבריאותי של האדם מהווה את התשתית ליציבות האישיותית שלו. מחסור בשינה, סטרס פיזיולוגי ותסמינים לא מטופלים פוגעים ביכולת הוויסות הרגשי, דבר המוביל לתגובתיות-יתר, קושי בריכוז, וחיכוך מוגבר במערכות יחסים אישיות ומקצועיות. שמירה על איזון בריאותי היא אבן יסוד בחוסן הנפשי.", "_is_h1": false}, {"id": "knowledge_base_personality_frankl", "label": "personality_frankl.md", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_frankl.md", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_frankl_מציאת_משמעות_ולוגותרפיה_viktor_frankl", "label": "מציאת משמעות ולוגותרפיה (Viktor Frankl)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "מציאת משמעות ולוגותרפיה (Viktor Frankl)", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nViktor Frankl's Man's Search for Meaning", "_is_h1": true}, {"id": "knowledge_base_personality_frankl_הגדרה", "label": "הגדרה", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 1, "_description": "ויקטור פרנקל, פסיכיאטר וניצול שואה, פיתח את ה\"לוגותרפיה\" (ריפוי באמצעות משמעות). בניגוד לפרויד (שטען שהאדם מונע מדחף העונג) ולאדלר (דחף לעוצמה), פרנקל טען שהכוח המניע העמוק ביותר של האדם הוא \"השאיפה למשמעות\" (Will to Meaning).", "_is_h1": false}, {"id": "knowledge_base_personality_frankl_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_frankl_1_משמעות_בחיים", "label": "1. משמעות בחיים", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. משמעות בחיים", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 1, "_description": "לפי פרנקל, המשמעות אינה משהו שממציאים, אלא משהו שמגלים. היא שונה מאדם לאדם ומיום ליום. אנו יכולים למצוא משמעות בשלוש דרכים עיקריות:\n1.  **יצירה או עשייה:** כתיבת ספר, בניית עסק, התנדבות למען מטרה חשובה.\n2.  **התנסות או אהבה:** חוויה של טבע, אומנות, ומעל לכל - מפגש עמוק של אהבה עם אדם אחר, המאפשר לנו לראות את הייחוד שלו.\n3.  **העמדה שלנו כלפי סבל בלתי נמנע:** גם כשנלקחת מאיתנו כל חירות חיצונית, נשארת לנו החירות הפנימית העליונה: לבחור את העמדה ואת הגישה שלנו כלפי המצב. אדם יכול למצוא משמעות אפילו בסבל, אם הוא רואה בו הזדמנות לצמיחה או להפגנת אומץ אנושי.", "_is_h1": false}, {"id": "knowledge_base_personality_frankl_2_הריק_הקיומי_existential_vacuum", "label": "2. הריק הקיומי (Existential Vacuum)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. הריק הקיומי (Existential Vacuum)", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 1, "_description": "כאשר אדם אינו מוצא משמעות לחייו, הוא חש ריקנות, שעמום וחוסר תכלית. זהו \"ריק קיומי\" שעלול להוביל לדיכאון, התמכרויות וחיפוש פתולוגי אחר עונג או כוח (כפיצוי על היעדר המשמעות).", "_is_h1": false}, {"id": "knowledge_base_personality_frankl_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 27, "community_name": "Community 27", "source_file": "knowledge_base/personality_frankl.md", "file_type": "document", "degree": 1, "_description": "אישיות בריאה וחסינה מתפתחת כאשר אדם מכיר באחריותו האישית למצוא פשר לחייו. אהבה, לפי פרנקל, היא הדרך היחידה לתפוס אדם אחר בפנימיות הווייתו. מי שאוהב רואה לא רק את תכונותיו של האהוב, אלא את הפוטנציאל שעוד גלום בו, ועוזר לו לממש פוטנציאל זה. יחסים אישיים משמשים כמקור מרכזי למשמעות.", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic", "label": "personality_humanistic.md", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_humanistic.md", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_גישה_הומניסטית_ואקזיסטנציאליסטית_humanistic_existential", "label": "גישה הומניסטית ואקזיסטנציאליסטית (Humanistic & Existential)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "גישה הומניסטית ואקזיסטנציאליסטית (Humanistic &amp; Existential)", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nIrvin Yalom, Carl Rogers & Abraham Maslow", "_is_h1": true}, {"id": "knowledge_base_personality_humanistic_הגדרה", "label": "הגדרה", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "הגישה ההומניסטית-אקזיסטנציאלית מדגישה את הפוטנציאל המולד של האדם לצמיחה, בחירה חופשית, וחיפוש אחר משמעות. היא רואה באדם יישות שלמה השואפת למימוש עצמי, תוך התמודדות בלתי נמנעת עם השאלות והדאגות הקיומיות של החיים.", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_1_4_הדאגות_הקיומיות_irvin_yalom", "label": "1. 4 הדאגות הקיומיות (Irvin Yalom)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. 4 הדאגות הקיומיות (Irvin Yalom)", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "העוגנים שכל אדם נדרש להתמודד איתם:\n*   **המוות (Mortality):** המודעות לסופיות החיים והמתח בינה לבין הרצון להמשיך להתקיים.\n*   **החופש והאחריות (Freedom & Responsibility):** הבנת החופש המוחלט לבחור את דרכנו, לצד נשיאה באחריות המלאה להשלכות המעשים.\n*   **הבדידות הקיומית (Isolation):** ההכרה שכל אדם נכנס לעולם לבד ויוצא ממנו לבד.\n*   **חוסר משמעות (Meaninglessness):** החיפוש אחר מטרה ותכלית בעולם שאין בו משמעות מוגדרת מראש.", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_2_יחס_חיובי_בלתי_מותנה_והעצמי_carl_rogers", "label": "2. יחס חיובי בלתי מותנה והעצמי (Carl Rogers)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. יחס חיובי בלתי מותנה והעצמי (Carl Rogers)", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "רוג'רס חקר את הפער בין ה**עצמי הריאלי** (מי שאני בפועל) ל**עצמי האידיאלי** (מי שאני חושב שאני צריך להיות) כגורם למצוקה.", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_3_הגשמה_עצמית_self_actualization", "label": "3. הגשמה עצמית (Self-Actualization)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. הגשמה עצמית (Self-Actualization)", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "הדחף המולד של האדם לפתח את כישוריו ואישיותו לגרסה הטובה ביותר שלו (ראש פירמידת הצרכים של מאסלו).", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_אינדיקטורים_לשוניים_והתנהגותיים_linguistic_behavioral_indicators", "label": "אינדיקטורים לשוניים והתנהגותיים (Linguistic & Behavioral Indicators)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אינדיקטורים לשוניים והתנהגותיים (Linguistic &amp; Behavioral Indicators)", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "*   **בדידות קיומית:** מילים כמו \"לבד בעולם\", \"אף אחד לא מבין\", \"נפרדות\", \"ריקנות\", \"ריק\", \"תלוש\".\n*   **חופש ואחריות:** מילים כמו \"הכל בידיים שלי\", \"אני בחרתי\", \"באחריותי\", \"אין לי ברירה\" (סמל לבריחה מאחריות), \"אילוצים חיצוניים\".\n*   **חוסר משמעות:** ביטויים כמו \"בשביל מה\", \"מה הטעם\", \"למה בכלל לטרוח\", \"תחושת ריקנות\", \"חוסר כיוון\", \"חיפוש דרך\".\n*   **אותנטיות מול ריצוי:** ביטויים כמו \"לעשות מה שמצפים\", \"לא נעים לי\", \"לשים מסכה\", \"להיות אני\", \"האמת שלי\", \"חיבור פנימי\".\n*   **העצמי הריאלי מול האידיאלי:** ביטויים כמו \"מי שאני באמת\", \"הלוואי שהייתי\", \"אני חייב להיות מושלם\", \"לא עומד בסטנדרטים של עצמי\".", "_is_h1": false}, {"id": "knowledge_base_personality_humanistic_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 18, "community_name": "Community 18", "source_file": "knowledge_base/personality_humanistic.md", "file_type": "document", "degree": 1, "_description": "מערכות יחסים בריאות לפי הגישה ההומניסטית מבוססות על כנות, אמפתיה ואותנטיות (כמו במותג \"אני-אתה\" של בובר). האישיות מתפתחת כאשר האדם לוקח אחריות קיומית על חייו ומשתחרר מתכתיבים חיצוניים ומניפולציות של ריצוי חברתי, תוך חתירה מתמדת למימוש הערכים הפנימיים שלו.", "_is_h1": false}, {"id": "knowledge_base_personality_jung", "label": "personality_jung.md", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_jung.md", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_jung_הצל_הפרסונה_ותהליך_האינדיבידואציה_carl_jung", "label": "הצל, הפרסונה ותהליך האינדיבידואציה (Carl Jung)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "הצל, הפרסונה ותהליך האינדיבידואציה (Carl Jung)", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nCarl Jung's Collected Works", "_is_h1": true}, {"id": "knowledge_base_personality_jung_הגדרה", "label": "הגדרה", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "קארל יונג, פסיכיאטר ופסיכואנליטיקאי שוויצרי, ייסד את הפסיכולוגיה האנליטית. בניגוד לפרויד שהתמקד בתת-מודע האישי ובדחפים מודחקים, יונג הרחיב את היריעה וטען לקיומו של \"תת-מודע קולקטיבי\" המכיל ארכיטיפים אוניברסליים. הוא חקר כיצד התת-מודע מעצב את האישיות שלנו.", "_is_h1": false}, {"id": "knowledge_base_personality_jung_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_jung_1_הפרסונה_persona", "label": "1. הפרסונה (Persona)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. הפרסונה (Persona)", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "המסכה שאנו עוטים בחברה כדי להתאים את עצמנו לציפיות החברתיות ולהגן על ה\"אני\" הפנימי שלנו. הפרסונה היא חשובה כדי לתפקד בעולם, אך הסכנה היא שהאדם יזדהה לחלוטין עם הפרסונה שלו (למשל, \"אני המנהל הקשוח\", או \"אני האם המושלמת\") ויאבד קשר עם מי שהוא באמת.", "_is_h1": false}, {"id": "knowledge_base_personality_jung_2_הצל_the_shadow", "label": "2. הצל (The Shadow)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. הצל (The Shadow)", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "החלק בתת-מודע המכיל את כל התכונות, הרגשות והדחפים שאנו מסרבים להכיר בהם כחלק מאיתנו (כעס, קנאה, פחדים, דחפים מיניים, חולשות, ולעיתים גם כישרונות מודחקים). מכיוון שאנו מדחיקים את הצל, אנו נוטים לחוות אותו דרך מנגנון ה**השלכה (Projection)** - אנו רואים את התכונות הללו אצל אנשים אחרים ושונאים אותם בגלל זה. כשאדם אחר מכעיס אותנו בצורה לא פרופורציונלית, פעמים רבות זהו הצל שלנו שמשתקף בו.", "_is_h1": false}, {"id": "knowledge_base_personality_jung_3_אינדיבידואציה_individuation", "label": "3. אינדיבידואציה (Individuation)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. אינדיבידואציה (Individuation)", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "מטרת החיים הפסיכולוגית לפי יונג. זהו תהליך של התפתחות הדרגתית שבמהלכה האדם מביא למודעות את כל חלקי אישיותו, כולל הצל והתת-מודע, ומשלב אותם לאישיות שלמה ואותנטית אחת (ה\"עצמי\" - The Self).", "_is_h1": false}, {"id": "knowledge_base_personality_jung_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 20, "community_name": "Community 20", "source_file": "knowledge_base/personality_jung.md", "file_type": "document", "degree": 1, "_description": "אישיות בוגרת לפי יונג היא אישיות שעשתה \"עבודת צל\" (Shadow Work) והכירה בחלקים האפלים שלה. במערכות יחסים אישיות ורומנטיות, אנו משליכים פעמים רבות תכונות של אנימה/אנימוס (הצד הנשי בגבר או הצד הגברי באישה) על בני הזוג שלנו. מודעות עצמית לתהליכי ההשלכה היא המפתח ליחסים בריאים, שכן היא מונעת מאיתנו להאשים את הזולת בקונפליקטים הפנימיים שלנו, ומאפשרת לנו לראות אותו כפי שהוא באמת.", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman", "label": "personality_kahneman.md", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_kahneman.md", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman_מערכת_1_ומערכת_2_והטיות_קוגניטיביות_daniel_kahneman", "label": "מערכת 1 ומערכת 2 והטיות קוגניטיביות (Daniel Kahneman)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "מערכת 1 ומערכת 2 והטיות קוגניטיביות (Daniel Kahneman)", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nDaniel Kahneman's Thinking, Fast and Slow", "_is_h1": true}, {"id": "knowledge_base_personality_kahneman_הגדרה", "label": "הגדרה", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 1, "_description": "פרופסור דניאל כהנמן, זוכה פרס נובל לכלכלה ואחד ממייסדי הכלכלה ההתנהגותית, הפריך את התפיסה הקלאסית לפיה בני אדם פועלים תמיד כ\"שחקנים רציונליים\". בספרו \"לחשוב מהר, לחשוב לאט\", הוא מציג מודל שלפיו התודעה והחשיבה שלנו מחולקות לשתי מערכות הפעלה שונות לחלוטין.", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman_1_שתי_מערכות_החשיבה", "label": "1. שתי מערכות החשיבה", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. שתי מערכות החשיבה", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 1, "_description": "*   **מערכת 1 (המהירה):** פועלת באופן אוטומטי ומהיר, עם מעט או ללא מאמץ, וללא תחושה של שליטה רצונית. זוהי אינטואיציה. היא מזהה רגשות על פניו של אדם אחר, משלימה ביטויים מוכרים, ומקבלת החלטות מהירות בזמן אמת.\n*   **מערכת 2 (האיטית):** מקצה קשב רב לפעולות מנטליות הדורשות מאמץ (כגון חישוב מתמטי, בדיקת לוגיקה, או ניסיון לעצור תגובה אימפולסיבית). היא רציונלית אך עצלנית, ולעיתים קרובות מאמצת את ההמלצות המהירות של מערכת 1 מבלי לבדוק אותן.", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman_2_הטיות_קוגניטיביות_cognitive_biases_וכללי_אצבע_heuristics", "label": "2. הטיות קוגניטיביות (Cognitive Biases) וכללי אצבע (Heuristics)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. הטיות קוגניטיביות (Cognitive Biases) וכללי אצבע (Heuristics)", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 1, "_description": "מכיוון שמערכת 1 ממהרת להסיק מסקנות כדי לחסוך באנרגיה, היא מועדת לשגיאות אופייניות (\"הטיות\"):\n*   **הטיית האישור (Confirmation Bias):** הנטייה לחפש, לפרש ולזכור מידע באופן שמאשר את אמונותינו הקיימות.\n*   **זמינות (Availability Heuristic):** אנו שופטים את הסבירות של אירוע לפי הקלות שבה אנו נזכרים בדוגמאות מן העבר (ולא לפי הסטטיסטיקה האמיתית שלו).\n*   **שנאת הפסד (Loss Aversion):** הפחד להפסיד 100 שקלים חזק פי שניים מהשמחה של להרוויח 100 שקלים. התגובה הרגשית שלנו להפסד חדה הרבה יותר מתגובתנו לרווח.", "_is_h1": false}, {"id": "knowledge_base_personality_kahneman_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 28, "community_name": "Community 28", "source_file": "knowledge_base/personality_kahneman.md", "file_type": "document", "degree": 1, "_description": "אישיות השואפת למודעות עצמית צריכה להכיר בכך שהחלטותיה – כולל ביחס לאנשים אחרים – רצופות לעיתים קרובות בכשלים לוגיים מהירים של \"מערכת 1\". במערכות יחסים, למשל, אנו עשויים \"לצבוע\" אדם מסוים באור שלילי או חיובי על סמך אירוע זמין בזיכרון, או בגלל הטיית האישור (נזכור לו רק את הפעמים שטעה). ההכרה במגבלות הרציונליות שלנו מאפשרת חמלה רבה יותר כלפי טעויותינו וכלפי טעויות הזולת, ופותחת פתח לשימוש מודע ב\"מערכת 2\" ליישוב קונפליקטים מורכבים במקום תגובות אימפולסיביות.", "_is_h1": false}, {"id": "knowledge_base_personality_maslow", "label": "personality_maslow.md", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_maslow.md", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_maslow_פירמידת_הצרכים_ומימוש_עצמי_abraham_maslow", "label": "פירמידת הצרכים ומימוש עצמי (Abraham Maslow)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "פירמידת הצרכים ומימוש עצמי (Abraham Maslow)", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nAbraham Maslow's Motivation and Personality", "_is_h1": true}, {"id": "knowledge_base_personality_maslow_הגדרה", "label": "הגדרה", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 1, "_description": "אברהם מאסלו, יחד עם קרל רוג'רס, ייסד את הפסיכולוגיה ההומניסטית. הוא טען שהאדם אינו מונע רק מדחפים שליליים או חסכים, אלא משאיפה מולדת להתפתחות חיובית ולהגשמה. התיאוריה המפורסמת ביותר שלו היא \"היררכיית הצרכים\" (פירמידת מאסלו).", "_is_h1": false}, {"id": "knowledge_base_personality_maslow_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 18.6, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 2, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_maslow_היררכיית_הצרכים_hierarchy_of_needs", "label": "היררכיית הצרכים (Hierarchy of Needs)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "היררכיית הצרכים (Hierarchy of Needs)", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 1, "_description": "מאסלו דירג את צרכי האדם מהבסיסי ביותר ועד לגבוה ביותר. לרוב, אי אפשר לספק צורך גבוה אם הצרכים שמתחתיו אינם מסופקים במידה סבירה.\n1.  **צרכים פיזיולוגיים:** אוכל, מים, שינה, נשימה.\n2.  **צורכי ביטחון:** ביטחון אישי, תעסוקתי, בריאותי, סביבה יציבה.\n3.  **צורכי שייכות ואהבה:** חברות, משפחה, אינטימיות וקשרים חברתיים. (זהו שלב מרכזי ביחסים בינאישיים).\n4.  **צורכי הערכה:** הצורך בכבוד, הישגים, מעמד והכרה מאחרים, וכן הערכה עצמית וכבוד עצמי.\n5.  **הגשמה עצמית (Self-Actualization):** השלב הגבוה ביותר. הדחף לממש את כל הפוטנציאל הגלום באדם, יצירתיות, פתרון בעיות, מוסריות, וקבלה של העובדות ללא דעות קדומות.\n\n*בהמשך חייו הוסיף מאסלו שלב נוסף בראש הפירמידה: \"התעלות עצמית\" (Self-Transcendence) - הרצון לעזור לאחרים למצוא הגשמה או להתחבר למשהו הגדול מהעצמי.*", "_is_h1": false}, {"id": "knowledge_base_personality_maslow_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 38, "community_name": "Community 38", "source_file": "knowledge_base/personality_maslow.md", "file_type": "document", "degree": 1, "_description": "אישיות בריאה מתפתחת כאשר האדם אינו \"תקוע\" במאבק הישרדותי על צרכי החסר שלו. במערכות יחסים, מאסלו הבחין בין \"אהבת חסר\" (D-Love / Deficiency Love) - אהבה שמבוססת על צורך באחר כדי למלא ריקנות או חוסר ביטחון, לבין \"אהבת הוויה\" (B-Love / Being Love) - אהבה לא תלויה בדבר שניתנת מתוך עמדה של שפע, ובה בני הזוג מאפשרים זה לזה חירות לצמוח ולהגיע להגשמה עצמית.", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche", "label": "personality_nietzsche.md", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_nietzsche.md", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_הרצון_לעוצמה_ויצירת_ערכים_friedrich_nietzsche", "label": "הרצון לעוצמה ויצירת ערכים (Friedrich Nietzsche)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "הרצון לעוצמה ויצירת ערכים (Friedrich Nietzsche)", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nFriedrich Nietzsche's Thus Spoke Zarathustra and Beyond Good and Evil", "_is_h1": true}, {"id": "knowledge_base_personality_nietzsche_הגדרה", "label": "הגדרה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "פרידריך ניטשה ביקר בחריפות את המוסר המסורתי (במיוחד המוסר הנוצרי והדמוקרטי), שראה בו \"מוסר עבדים\" המדכא את האינסטינקטים הטבעיים של האדם. במקומם, הוא הציע פילוסופיה של התעלות אישית, שבה המטרה העליונה אינה חיפוש אושר או שלווה, אלא עליונות, עוצמה ויצירת ערכים עצמאיים.", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_1_הרצון_לעוצמה_will_to_power", "label": "1. הרצון לעוצמה (Will to Power)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. הרצון לעוצמה (Will to Power)", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "זהו הכוח המניע הבסיסי של האדם והיקום. אין זו שאיפה כוחנית לשלוט באחרים באופן פוליטי, אלא שאיפה פנימית עמוקה לצמיחה, מימוש עצמי, והתגברות על מכשולים. כל דחף אנושי, מכיבוש ועד יצירת אומנות, נובע מהרצון להרחיב את ההשפעה והעוצמה של האני.", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_2_העל_אדם_übermensch", "label": "2. העל-אדם (Übermensch)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. העל-אדם (Übermensch)", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "האידיאל האנושי של ניטשה. העל-אדם הוא מי שהצליח להשתחרר מהמוסכמות והערכים של העדר (החברה), ויצר לעצמו מערכת ערכים עצמאית ואותנטית. הוא מתאפיין ביכולת לאמץ את החיים בשלמותם, כולל הכאב והסבל, ולראות בהם כלים להתחשלות (\"מה שלא הורג אותי, מחשל אותי\").", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_3_אהבת_הגורל_amor_fati", "label": "3. אהבת הגורל (Amor Fati)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. אהבת הגורל (Amor Fati)", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "הדרישה לאהוב את הגורל שלנו, ללא רצון לשנות דבר בעבר, בהווה או בעתיד. יכולתו של האדם לומר \"כן\" מוחלט לחיים כמו שהם. ניטשה העמיד את מבחן ה\"חזרה הנצחית\": האם היית מוכן לחיות את חייך שוב ושוב, על כל פרטיהם, לנצח? אדם שלם יענה בחיוב.", "_is_h1": false}, {"id": "knowledge_base_personality_nietzsche_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 21, "community_name": "Community 21", "source_file": "knowledge_base/personality_nietzsche.md", "file_type": "document", "degree": 1, "_description": "אישיות חזקה נמדדת ביכולתה לחשוב בעצמאות ולסרב להיות \"חלק מהעדר\". מערכות יחסים ראויות, בעיני ניטשה, אינן מבוססות על רחמים, תלות או סימפטיה מחלישה, אלא על חברות אמיתית בין אינדיבידואלים חזקים ושווים (Star Friendship) המאתגרים זה את זה למצוינות, לעמידה בקשיים ולהתגברות עצמית.", "_is_h1": false}, {"id": "knowledge_base_personality_plato", "label": "personality_plato.md", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_plato.md", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_plato_המבנה_המשולש_של_הנפש_ואהבה_אפלטונית_plato", "label": "המבנה המשולש של הנפש ואהבה אפלטונית (Plato)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "המבנה המשולש של הנפש ואהבה אפלטונית (Plato)", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nPlato's The Republic and The Symposium", "_is_h1": true}, {"id": "knowledge_base_personality_plato_הגדרה", "label": "הגדרה", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 1, "_description": "לפי הפילוסוף היווני אפלטון, אישיות האדם מורכבת ממאבקים פנימיים בתוך הנפש (Psyche). בספרו \"הרפובליקה\", אפלטון מחלק את הנפש לשלושה חלקים נפרדים. אדם \"צודק\" ומאוזן הוא זה שאצלו השכל שולט ומכוון את שאר חלקי הנפש. במקביל, בספרו \"המשתה\", הוא מציג את מושג ה\"ארוס\" (Eros - אהבה או תשוקה) ככוח מניע המסוגל לרומם את האדם.", "_is_h1": false}, {"id": "knowledge_base_personality_plato_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_plato_חלוקת_הנפש_the_tripartite_soul", "label": "חלוקת הנפש (The Tripartite Soul)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "חלוקת הנפש (The Tripartite Soul)", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 1, "_description": "1. **החלק השכלי (Logistikon):** שוכן בראש. זהו החלק ההגיוני שוחר האמת והחוכמה. תפקידו הוא לנהל ולשלוט בשני החלקים האחרים, כדי להבטיח שהאדם פועל למען \"הטוב\".\n2. **החלק הנלהב/רגשי (Thumoeides):** שוכן בחזה. מייצג את הרגשות העזים כמו אומץ, גאווה, כעס ושאיפה לכבוד. הוא משמש כ\"אוכף החוק\" של השכל ומסייע לו בניהול הנפש.\n3. **החלק המתאווה (Epithumetikon):** שוכן בבטן. אחראי על הדחפים והיצרים הפיזיים הבסיסיים (אוכל, מין, כסף). זהו החלק הגדול ביותר בנפש ואם אינו מרוסן על ידי השכל, הוא עלול להוביל לכאוס.\n\nאפלטון משווה את הנפש ל**מרכבה**: הרכב (השכל) צריך לנווט שני סוסים - סוס אחד אציל (הרגש/כבוד) וסוס אחד פראי וסורר (התשוקות).", "_is_h1": false}, {"id": "knowledge_base_personality_plato_אהבה_אפלטונית_platonic_love", "label": "אהבה אפלטונית (Platonic Love)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אהבה אפלטונית (Platonic Love)", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 1, "_description": "בניגוד למשמעות המודרנית של \"אהבה אפלטונית\" כחברות ללא משיכה פיזית, המשמעות המקורית של אפלטון מתארת את האהבה ככוח התמרה (טרנספורמציה). זהו תהליך מדורג (\"סולם האהבה\"):\n* מתחיל ממשיכה לגוף יפה אחד.\n* עולה להערכת היופי בכל הגופים.\n* מתרומם ליופי של הנפש והמידות.\n* ומגיע לשיאו באהבת ה\"יופי\" וה\"טוב\" המוחלטים (אידאת היופי).", "_is_h1": false}, {"id": "knowledge_base_personality_plato_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 29, "community_name": "Community 29", "source_file": "knowledge_base/personality_plato.md", "file_type": "document", "degree": 1, "_description": "אישיות בריאה דורשת **הכוונה נכונה של התשוקה**. במקום להדחיק את הדחפים לחלוטין, מערכת יחסים משמעותית (המונעת מאהבה אפלטונית אמיתית) מנתבת את אנרגיית התשוקה כלפי מעלה. בני הזוג או החברים משתמשים באהבתם כדי לרומם אחד את השני מבחינה מוסרית ואינטלקטואלית, ולקרב זה את זה אל האמת והחוכמה.", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic", "label": "personality_psychodynamic.md", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_psychodynamic.md", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_טיפול_ומנגנונים_פסיכודינמיים_psychodynamic", "label": "טיפול ומנגנונים פסיכודינמיים (Psychodynamic)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 31.4, "font": {"size": 12, "color": "#ffffff"}, "title": "טיפול ומנגנונים פסיכודינמיים (Psychodynamic)", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 5, "_description": "מקור אקדמי:\nSigmund Freud & Melanie Klein", "_is_h1": true}, {"id": "knowledge_base_personality_psychodynamic_הגדרה", "label": "הגדרה", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "הגישה הפסיכודינמית עוסקת בכוחות הנפשיים הפועלים באדם – במיוחד הקונפליקטים הלא מודעים בין דחפים, פחדים ומשאלות לבין דרישות המציאות והמוסר. גישה זו שואפת להעלות חומרים תת-מודעים אל המודעות כדי להפחית חרדה ולשפר את התפקוד הנפשי והרפלקטיבי.", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_1_מנגנוני_הגנה_defense_mechanisms", "label": "1. מנגנוני הגנה (Defense Mechanisms)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. מנגנוני הגנה (Defense Mechanisms)", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "אסטרטגיות נפשיות לא מודעות שנועדו להגן על ה\"אני\" (Ego) מפני חרדה:\n*   **הדחקה (Repression):** קבירת רגשות או פחדים כואבים בתת-מודע כדי להימנע מהתמודדות.\n*   **השלכה (Projection):** שיוך דחפים או רגשות לא מקובלים של העצמי אל האחר.\n*   **אינטלקטואליזציה (Intellectualization):** בריחה מחוויות רגשיות אל תוך ניתוח שכלתני יבש וקר.\n*   **רציונליזציה (Rationalization):** המצאת הסברים הגיוניים להתנהגות שנובעת ממניעים לא מודעים.", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_2_יחסי_אובייקט_object_relations", "label": "2. יחסי אובייקט (Object Relations)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. יחסי אובייקט (Object Relations)", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "מערכות היחסים המוקדמות מופנמות בתוכנו והופכות למודלים נפשיים יציבים המעצבים את כל מערכות היחסים הבוגרות.", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_3_העברה_transference", "label": "3. העברה (Transference)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. העברה (Transference)", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "השלכת רגשות, ציפיות ודפוסי התנהגות שחווינו בעבר מול דמויות משמעותיות אל דמויות בהווה.", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_אינדיקטורים_לשוניים_והתנהגותיים_linguistic_behavioral_indicators", "label": "אינדיקטורים לשוניים והתנהגותיים (Linguistic & Behavioral Indicators)", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "אינדיקטורים לשוניים והתנהגותיים (Linguistic &amp; Behavioral Indicators)", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "*   **הדחקה:** ביטויים כמו \"לא רוצה לחשוב על זה\", \"שכחתי מזה\", \"הדחקתי\", \"קברתי את זה\", \"לא משנה\", \"לא רלוונטי כרגע\".\n*   **השלכה:** ביטויים כמו \"הם שונאים אותי\", \"כולם נגדי\", \"אנשים קנאים\", \"כולם אנוכיים\", \"היא כועסת עלי\" (כאשר הכותב בפועל כועס).\n*   **אינטלקטואליזציה:** מילים כמו \"מבחינה אנליטית\", \"רציונלית\", \"באופן אובייקטיבי\", \"ניתוח קר של המצב\", \"סטטיסטית\".\n*   **הצל:** ביטויים כמו \"מעצבן אותי אצלו\", \"לא סובל אנשים ש...\", \"מגעיל אותי\", \"דחייה עמוקה\", \"מפריע לי מאוד\".\n*   **העברה:** ביטויים כמו \"מזכיר לי את...\", \"כמו מול אבא\", \"כמו מול אמא\", \"תמיד מול סמכות אני מרגיש...\".", "_is_h1": false}, {"id": "knowledge_base_personality_psychodynamic_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#BAB0AC", "border": "#BAB0AC", "highlight": {"background": "#ffffff", "border": "#BAB0AC"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 19, "community_name": "Community 19", "source_file": "knowledge_base/personality_psychodynamic.md", "file_type": "document", "degree": 1, "_description": "האישיות ומערכות היחסים הבוגרות מעוצבות באופן ישיר על ידי הקונפליקטים הלא-פתורים מהעבר ומנגנוני ההגנה הפעילים של האדם. טיפול פסיכודינמי חותר לזיהוי העברה ופירוק מנגנוני הגנה נוקשים, המאפשרים למטופל להשתחרר מדפוסים חוזרים ומזיקים בקשרים אינטרפרסונליים ולפתח אישיות אינטגרטיבית וגמישה יותר.", "_is_h1": false}, {"id": "knowledge_base_personality_rogers", "label": "personality_rogers.md", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_rogers.md", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_rogers_קבלה_חיובית_והגשמה_עצמית_carl_rogers", "label": "קבלה חיובית והגשמה עצמית (Carl Rogers)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "קבלה חיובית והגשמה עצמית (Carl Rogers)", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nCarl Rogers' Client-Centered Therapy and On Becoming a Person", "_is_h1": true}, {"id": "knowledge_base_personality_rogers_הגדרה", "label": "הגדרה", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 1, "_description": "קרל רוג'רס, ממייסדי הפסיכולוגיה ההומניסטית, האמין כי לבני אדם יש נטייה מולדת (Actualizing Tendency) לצמוח, להתפתח ולממש את הפוטנציאל הגלום בהם, בדומה לזרע השואף להפוך לעץ. פתולוגיות או קשיים רגשיים מתעוררים כאשר סביבתו של האדם חוסמת נטייה טבעית זו.", "_is_h1": false}, {"id": "knowledge_base_personality_rogers_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_rogers_1_מושג_העצמי_the_self_concept", "label": "1. מושג העצמי (The Self-Concept)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. מושג העצמי (The Self-Concept)", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 1, "_description": "האופן שבו האדם תופס את עצמו מורכב משני חלקים:\n*   **העצמי הריאלי (Real Self):** מי שאני כרגע, החוויות בפועל.\n*   **העצמי האידיאלי (Ideal Self):** האדם שאני שואף להיות, הערכים והתקוות שלי.\nכאשר קיים התאמה (Congruence) בין העצמי הריאלי לאידיאלי, האדם חווה שלווה, הערכה עצמית ויכולת מימוש. כשיש פער גדול (Incongruence), מתעוררות חרדה, חוסר אותנטיות ונוירוזות.", "_is_h1": false}, {"id": "knowledge_base_personality_rogers_2_הערכה_חיובית_מותנית_מול_בלתי_מותנית", "label": "2. הערכה חיובית מותנית מול בלתי מותנית", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. הערכה חיובית מותנית מול בלתי מותנית", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 1, "_description": "אנשים זקוקים להערכה ואהבה. \n*   **הערכה מותנית (Conditional Positive Regard):** כשההורים או החברה מעניקים אהבה רק בתנאי שהאדם מתנהג בדרך מסוימת (\"אאהב אותך רק אם תצליח בלימודים\"). הדבר גורם לאדם לאמץ \"תנאי ערך\" ולנתק חלקים אותנטיים מעצמו.\n*   **הערכה חיובית בלתי מותנית (Unconditional Positive Regard):** קבלה מלאה של האדם כפי שהוא, ללא ביקורת ושיפוט. זוהי הסביבה ההכרחית לצמיחה פסיכולוגית ולריפוי.", "_is_h1": false}, {"id": "knowledge_base_personality_rogers_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 30, "community_name": "Community 30", "source_file": "knowledge_base/personality_rogers.md", "file_type": "document", "degree": 1, "_description": "אישיות מתפקדת במלואה (Fully Functioning Person) מאופיינת בפתיחות לחוויה, אמון פנימי עמוק והיכולת לחיות באופן קיומי בהווה. מערכות יחסים טיפוליות וחבריות צריכות להיות מבוססות על שלוש תכונות:\n1.  **כנות ואותנטיות (Congruence)** מצד השותף לקשר.\n2.  **קבלה חיובית בלתי מותנית** של האחר.\n3.  **אמפתיה** עמוקה מנקודת המבט של האחר. \nאלו הם התנאים שמאפשרים לאנשים להסיר את מגננותיהם ולשוב לנתיב ההגשמה העצמית שלהם.", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau", "label": "personality_rousseau.md", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_rousseau.md", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau_אהבה_עצמית_טבעית_מול_גאווה_rousseau", "label": "אהבה עצמית טבעית מול גאווה (Rousseau)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "אהבה עצמית טבעית מול גאווה (Rousseau)", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nDiscourse on Inequality and Emile (Jean-Jacques Rousseau)", "_is_h1": true}, {"id": "knowledge_base_personality_rousseau_הגדרה", "label": "הגדרה", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 1, "_description": "ז'אן-ז'אק רוסו היה מאושיות תקופת ההשכלה, אך הרבה לבקר את ההנחה שהקדמה והתרבות משפרות את האדם. הוא טען שב\"מצב הטבע\" האדם נולד טוב, פשוט ואותנטי, ודווקא החברה והתרבות הן אלו שמשחיתות את האישיות שלו. משנתו הפסיכולוגית מבוססת על ההבחנה בין שני סוגים של אהבה עצמית.", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau_עקרונות_מרכזיים_שני_פניה_של_האהבה_העצמית", "label": "עקרונות מרכזיים: שני פניה של האהבה העצמית", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים: שני פניה של האהבה העצמית", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau_1_האהבה_העצמית_הטבעית_amour_de_soi", "label": "1. האהבה העצמית הטבעית (Amour de soi)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. האהבה העצמית הטבעית (Amour de soi)", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 1, "_description": "* **מהות:** היצר ההישרדותי הבסיסי - הדאגה הטבעית שלנו לקיום, למזון, למנוחה ולביטחון.\n* **תכונות:** אהבה זו היא טהורה, אבסולוטית, ואינה תלויה באחרים. אדם במצב הטבע שמספק את צרכיו חש שלם ולא חש צורך לפגוע בזולת.", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau_2_הגאווה_היהירות_amour_propre", "label": "2. הגאווה / היהירות (Amour-propre)", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. הגאווה / היהירות (Amour-propre)", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 1, "_description": "* **מהות:** \"אהבה עצמית מעוותת\" שהופיעה רק כשהאדם התחיל לחיות בקבוצות מאורגנות ופיתח שפה ורכוש. \n* **תכונות:** זוהי אהבה עצמית **השוואתית ורלציונית**. היא ניזונה מהשאלה: \"איך אני נראה ביחס לאחרים? מי עשיר יותר? מי מוצלח יותר?\". \n* רוסו טען שרוב תחלואי החברה - חוסר שוויון, קנאה, מניפולציות ודיכאון - נובעים מהשתלטות ה-Amour-propre על האישיות. האדם הפסיק לחיות \"בתוך עצמו\" והתחיל לחיות רק דרך עיניהם של אחרים.", "_is_h1": false}, {"id": "knowledge_base_personality_rousseau_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#F28E2B", "border": "#F28E2B", "highlight": {"background": "#ffffff", "border": "#F28E2B"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 31, "community_name": "Community 31", "source_file": "knowledge_base/personality_rousseau.md", "file_type": "document", "degree": 1, "_description": "רוסו היה פסימי לגבי מערכות היחסים בחברה המודרנית המבוססת על השוואה. \n* **ניכור פנימי:** במערכות יחסים המונעות מ-Amour-propre, לעולם איננו כנים. אנו מציגי
