ם מסכה חברתית כדי לקבל סטטוס ואישור, ובכך מאבדים את האישיות האותנטית שלנו.\n* **ריפוי וחינוך:** רוסו ניסה להציע פתרונות להצלת האישיות. בספרו \"אמיל\", הוא הציע מתודת חינוך שמטרתה לגדל ילד רחוק מהשפעות משחיתות של החברה, כדי שה-Amour de soi שלו יתחזק לפני שהוא ייחשף להשוואות הרעילות של העולם האמיתי.\nהאישיות הבוגרת הבריאה, מבחינת רוסו, מנסה למצוא איזון וקהילה (\"האמנה החברתית\") שתאפשר חיים ללא הצורך לדרוס או להרשים אחרים באופן מתמיד.", "_is_h1": false}, {"id": "knowledge_base_personality_sartre", "label": "personality_sartre.md", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_sartre.md", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_קיום_קודם_למהות_וחירות_מוחלטת_jean_paul_sartre", "label": "קיום קודם למהות וחירות מוחלטת (Jean-Paul Sartre)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "קיום קודם למהות וחירות מוחלטת (Jean-Paul Sartre)", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nJean-Paul Sartre's Being and Nothingness", "_is_h1": true}, {"id": "knowledge_base_personality_sartre_הגדרה", "label": "הגדרה", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "ז'אן-פול סארטר היה מההוגים המרכזיים של האקזיסטנציאליזם המודרני. עקרון היסוד שלו הוא ש\"הקיום קודם למהות\" (Existence precedes essence). כלומר, בניגוד לחפצים שיש להם תכלית מוגדרת מראש (סכין נועד לחתוך), האדם פשוט \"נזרק\" אל העולם ללא מטרה, טבע או מהות מוגדרת מראש, והוא זה שחייב ליצור את זהותו באמצעות בחירותיו ומעשיו.", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_1_חירות_מוחלטת_ואחריות", "label": "1. חירות מוחלטת ואחריות", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. חירות מוחלטת ואחריות", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "האדם נדון להיות חופשי (\"Condemned to be free\"). החירות הזו אינה בהכרח דבר משמח, שכן היא מביאה עימה אחריות עצומה. האדם אחראי לחלוטין למי שהוא ולמה שהוא עושה. כל ניסיון לתלות את האשמה בנסיבות, בעבר, או בטבע האנושי הוא בריחה מאחריות.", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_2_חוסר_תום_לב_bad_faith_mauvaise_foi", "label": "2. חוסר תום לב (Bad Faith / Mauvaise Foi)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. חוסר תום לב (Bad Faith / Mauvaise Foi)", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "מצב שבו האדם משקר לעצמו ומתכחש לחירותו. אדם פועל ב\"חוסר תום לב\" כשהוא מאמץ תפקיד חברתי (למשל, \"אני רק מלצר\", או \"אני אדם ביישן ולכן לא יכול לעשות זאת\") ומאמין שזוהי המהות המוחלטת שלו, תוך התעלמות מהעובדה שהוא חופשי לבחור אחרת בכל רגע נתון.", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_3_ה_מבט_והאחר_the_gaze", "label": "3. ה\"מבט\" והאחר (The Gaze)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. ה&quot;מבט&quot; והאחר (The Gaze)", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "מושג מרכזי של סארטר המתאר כיצד נוכחותו של אדם אחר משנה את תפיסת העצמי שלנו. כשאנו לבד, אנו הסובייקט המוחלט של עולמנו. כשאדם אחר מביט בנו, אנו הופכים פתאום לאובייקט בעולמו. המבט של האחר גורם לנו לבושה ולמודעות עצמית מעיקה, כי הוא מציב אותנו כחפץ נשפט (מכאן האמרה \"הגיהינום הוא הזולת\").", "_is_h1": false}, {"id": "knowledge_base_personality_sartre_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 22, "community_name": "Community 22", "source_file": "knowledge_base/personality_sartre.md", "file_type": "document", "degree": 1, "_description": "אישיות אותנטית דורשת קבלה אמיצה של החירות והאחריות. מערכות יחסים הן זירה מורכבת של מאבק בין חברויות, שכן כל אדם מנסה לשמור על עצמאותו הסובייקטיבית מול ניסיונו של האחר להפוך אותו לאובייקט. יחסים כנים דורשים הכרה בחירותו המוחלטת של האחר מבלי לנסות לצמצם אותו לתפקיד או לחפץ.", "_is_h1": false}, {"id": "knowledge_base_personality_socrates", "label": "personality_socrates.md", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_socrates.md", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_חקירה_עצמית_והדיאלקטיקה_הסוקרטית_socrates", "label": "חקירה עצמית והדיאלקטיקה הסוקרטית (Socrates)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "חקירה עצמית והדיאלקטיקה הסוקרטית (Socrates)", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nPlato's Socratic Dialogues", "_is_h1": true}, {"id": "knowledge_base_personality_socrates_הגדרה", "label": "הגדרה", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "הפילוסופיה של סוקרטס מציבה את **הנפש** כגרעין המהותי של אישיות האדם. בניגוד לרדיפה אחר עושר, כוח או תענוגות גוף, סוקרטס האמין שמטרת החיים העליונה היא \"לדאוג לנפש\" ולבריאותה המוסרית. הוא טבע את הגישה שחיים ללא התבוננות פנימית אינם חיים ראויים לאדם.", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_1_דע_את_עצמך_והחיים_הנבחנים", "label": "1. \"דע את עצמך\" והחיים הנבחנים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. &quot;דע את עצמך&quot; והחיים הנבחנים", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "* **החיים שלא נבחנו אינם שווים שיחיו אותם:** סוקרטס האמין שבאמצעות רפלקציה עצמית ותשאול מתמיד, אדם יכול לזהות את הבורות של עצמו ולאתגר את אמונותיו.\n* **ענווה אינטלקטואלית:** ה\"חוכמה\" הסוקרטית מבוססת על ההכרה בכך שאינך יודע הכל (\"אני יודע שאינני יודע\"). רק מתוך צניעות זו, נוצר מקום לפיתוח אישיות אמיתי ולצמיחה.", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_2_המידה_הטובה_היא_ידע_socratic_intellectualism", "label": "2. המידה הטובה היא ידע (Socratic Intellectualism)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. המידה הטובה היא ידע (Socratic Intellectualism)", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "סוקרטס טען שאנשים לא עושים רע מתוך כוונה תחילה, אלא מתוך בורות (חוסר ידע של מהו הטוב האמיתי). ברגע שאדם יודע באמת מהו הדבר הנכון, הוא יפעל לפיו. לכן, כל המידות הטובות (כמו אומץ או צדק) מאוחדות על ידי החוכמה - הידיעה כיצד לפעול נכון.", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_3_הדיאלקטיקה_הסוקרטית_כמרחב_יחסים", "label": "3. הדיאלקטיקה הסוקרטית כמרחב יחסים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. הדיאלקטיקה הסוקרטית כמרחב יחסים", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "הכלי המרכזי של סוקרטס לא היה הרצאות נאומיות, אלא **דיאלוג (שיחה מובנית)**. סוקרטס השווה את עצמו למיילדת - הוא עוזר לאנשים \"ללדת\" את האמת שכבר קיימת בתוך נשמתם.", "_is_h1": false}, {"id": "knowledge_base_personality_socrates_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 23, "community_name": "Community 23", "source_file": "knowledge_base/personality_socrates.md", "file_type": "document", "degree": 1, "_description": "עבור סוקרטס, האינדיבידואל אינו יצור מבודד. האמת והמידה הטובה לא מתגלות לבד בחדר סגור, אלא דרך **קשר חברתי ואינטראקציה**. באמצעות שיחה כנה ועמוקה עם חברים או מבקרים, אדם מעמת את דעותיו, חושף סתירות ולומד על עצמו. מערכות יחסים פועלות כמעבדת ניסויים מוסרית - הן המרחב שבו אנו מפתחים את העקרונות שמנחים את קבלת ההחלטות שלנו ומעצבים את אישיותנו.", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza", "label": "personality_spinoza.md", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_spinoza.md", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza_קונאטוס_תבונה_ומערכות_יחסים_spinoza", "label": "קונאטוס, תבונה ומערכות יחסים (Spinoza)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "קונאטוס, תבונה ומערכות יחסים (Spinoza)", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nEthics (Baruch Spinoza)", "_is_h1": true}, {"id": "knowledge_base_personality_spinoza_הגדרה", "label": "הגדרה", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 1, "_description": "ברוך שפינוזה הציג בספרו \"אתיקה\" מודל פסיכולוגי חלוצי השולל את רעיון הרצון החופשי המוחלט. עבורו, אלוהים והטבע הם אחד, ובני האדם הם חלק אינטגרלי ממערכת חוקים טבעית (דטרמיניזם). האישיות האנושית, על פי שפינוזה, מונעת כולה על ידי יצר קיומי בסיסי הנקרא \"קונאטוס\" (Conatus) - השאיפה להמשיך להתקיים ולהעצים את כוח הפעולה שלנו.", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza_1_קונאטוס_conatus", "label": "1. קונאטוס (Conatus)", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. קונאטוס (Conatus)", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 1, "_description": "* כל דבר בטבע, כולל האדם, שואף להתמיד בישותו. \n* אנחנו לא רוצים דברים בגלל שהם \"טובים\", אלא אנחנו קוראים לדברים \"טובים\" כי אנחנו רוצים אותם (כלומר, הם עוזרים לקונאטוס שלנו).\n* כוח הפעולה שלנו עולה ויורד כל הזמן בתגובה לאינטראקציות עם הסביבה. עלייה בכוח מורגשת כ**שמחה**, וירידה בכוח מורגשת כ**עצב**.", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza_2_אמוציות_affects_פעיל_מול_סביל", "label": "2. אמוציות (Affects): פעיל מול סביל", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. אמוציות (Affects): פעיל מול סביל", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 1, "_description": "שפינוזה סירב לראות ברגשות פגמים שיש להדחיק. הוא חילק אותם לשניים:\n* **רגשות סבילים (Passions):** רגשות (כמו פחד, קנאה, או הנאה רגעית מאוכל) שנגרמים מגורמים חיצוניים שאנחנו לא מבינים עד הסוף. במצב זה אנחנו \"סובלים\" ומופעלים מבחוץ.\n* **רגשות פעילים (Actions):** כאשר אנו משתמשים בתבונה כדי להבין מדוע אנחנו מרגישים כפי שאנחנו מרגישים, הרגש הופך מסביל לפעיל. התבונה משחררת אותנו מהשתעבדות ליצרים.", "_is_h1": false}, {"id": "knowledge_base_personality_spinoza_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#E15759", "border": "#E15759", "highlight": {"background": "#ffffff", "border": "#E15759"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 32, "community_name": "Community 32", "source_file": "knowledge_base/personality_spinoza.md", "file_type": "document", "degree": 1, "_description": "לפי שפינוזה, כל מפגש עם אדם אחר משפיע (Affects) עלינו פיזית ונפשית. אישיות חזקה ואתית היא כזו שמחפשת בצורה רציונלית מערכות יחסים שמעצימות אותה.\n* **יחסים מחזקים:** כאשר שני אנשים המונעים מתבונה חוברים יחד, כוח הפעולה המשותף שלהם גדל משמעותית. חברות ואהבה במיטבן הן כוחות רציונליים שמגדילים את השמחה של כולם.\n* **אהבה מתוך תבונה:** שפינוזה מגדיר אהבה כ\"שמחה המלווה באידיאה של סיבה חיצונית\". אהבה אמיתית אינה תלות פסיבית באדם אחר שתמלא אותנו, אלא הבנה צלולה והערכה של מה שמעצים אותנו יחד. דרך אהבת האחר מתוך הבנה (ולא מתוך אובססיה/תשוקה עיוורת), האדם מתקרב לאהבת הטבע/אלוהים השלם.", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism", "label": "personality_stoicism.md", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_stoicism.md", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_הדיכוטומיה_של_השליטה_וויסות_רגשי_הפילוסופיה_הסטואית", "label": "הדיכוטומיה של השליטה וויסות רגשי (הפילוסופיה הסטואית)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "הדיכוטומיה של השליטה וויסות רגשי (הפילוסופיה הסטואית)", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nMarcus Aurelius' Meditations, Seneca's Letters", "_is_h1": true}, {"id": "knowledge_base_personality_stoicism_הגדרה", "label": "הגדרה", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "הסטואיציזם היא אסכולה פילוסופית עתיקה (מיוון ורומא, המיוצגת על ידי הוגים כמו מרקוס אורליוס, סנקה ואפיקטטוס) המתמקדת בפיתוח שליטה עצמית, חוסן נפשי וחופש מחרדות והרס רגשי. המטרה העליונה היא לחיות ב\"אטרקסיה\" (Ataraxia) - שלוות נפש הרמונית, שאינה תלויה בנסיבות חיצוניות.", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 4, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_1_הדיכוטומיה_של_השליטה_dichotomy_of_control", "label": "1. הדיכוטומיה של השליטה (Dichotomy of Control)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. הדיכוטומיה של השליטה (Dichotomy of Control)", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "אפיקטטוס ניסח את עקרון הליבה: ישנם דברים שהם בשליטתנו לחלוטין (המחשבות שלנו, הבחירות, הפעולות והתגובות שלנו), וישנם דברים שאינם בשליטתנו (דעות של אחרים עלינו, מזג האוויר, מצב הכלכלה, מחלות). הסבל האנושי נוצר כשאנחנו מנסים לשלוט במה שאינו בשליטתנו, או כשאנו קושרים את האושר שלנו לתוצאות חיצוניות.", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_2_האירוע_מול_הפרשנות", "label": "2. האירוע מול הפרשנות", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. האירוע מול הפרשנות", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "הסטואים לימדו שלא הדברים עצמם הם שמטרידים אותנו, אלא האופן שבו אנו מפרשים אותם. אירוע שלילי (כמו פיטורים או פרידה) הוא אובייקטיבי. הסבל מגיע מהפרשנות השלילית שלנו לאירוע. על ידי אימון לשינוי הפרשנות הרציונלית, האדם יכול להימנע מכאב רגשי מיותר.", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_3_אהבת_הגורל_ומוות_amor_fati_memento_mori", "label": "3. אהבת הגורל ומוות (Amor Fati / Memento Mori)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. אהבת הגורל ומוות (Amor Fati / Memento Mori)", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "*   **Amor Fati:** לקבל כל מה שקורה ולאהוב את הגורל, מתוך הבנה שהכול חלק מסדר טבעי גדול יותר. למצוא את ההזדמנות שבכל מכשול (האבן שחוסמת את הדרך, הופכת לדרך).\n*   **Memento Mori:** \"זכור את המוות\". תזכורת מתמדת לסופיות החיים. זה לא נועד לדכא, אלא להעניק פרספקטיבה מיידית למשברים קטנים בחיים, ולעודד אותנו להתמקד במה שחשוב באמת.", "_is_h1": false}, {"id": "knowledge_base_personality_stoicism_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 24, "community_name": "Community 24", "source_file": "knowledge_base/personality_stoicism.md", "file_type": "document", "degree": 1, "_description": "אישיות על פי הסטואיציזם צריכה להיות יציבה כמו סלע אל מול גלי הים החיצוניים. במערכות יחסים, חברות מבוססת על שיתוף מידות טובות (Virtue). עם זאת, על האדם להבין שגם אובדן של אדם אהוב (למרות שהוא כואב) הוא חלק מהטבע ושאינו בשליטתו. במצבים של קונפליקט עם אחרים, הסטואי שואל: \"האם זה בשליטתי? האם הכעס שלו הוא בעיה שלי או שלו?\" ובכך נמנע מלהיגרר לדרמה רגשית, ושומר על שלוותו.", "_is_h1": false}, {"id": "knowledge_base_personality_taoism", "label": "personality_taoism.md", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "personality_taoism.md", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_taoism_טבעיות_פשטות_ועשייה_ללא_מאמץ_taoism", "label": "טבעיות, פשטות ועשייה ללא מאמץ (Taoism)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "טבעיות, פשטות ועשייה ללא מאמץ (Taoism)", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nDaodejing (Laozi) and Zhuangzi", "_is_h1": true}, {"id": "knowledge_base_personality_taoism_הגדרה", "label": "הגדרה", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 1, "_description": "הדאואיזם, כפי שנוסח על ידי לאו דזה וג'ואנג דזה, מציג גישה הפוכה לחלוטין לקונפוציאניזם. במקום לעצב את האישיות על ידי חוקים חברתיים ומסורת, הדאואיזם רואה באדם חלק מה\"דאו\" (הדרך / הטבע) - הזרימה הספונטנית של היקום. הניסיון לאלף או לתקן את טבע האדם רק מרחיק אותו מהאותנטיות שלו ומייצר קונפליקטים.", "_is_h1": false}, {"id": "knowledge_base_personality_taoism_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 3, "_description": "", "_is_h1": false}, {"id": "knowledge_base_personality_taoism_1_טבעיות_ziran_ו_בול_העץ_הלא_מגולף", "label": "1. טבעיות (Ziran) ו\"בול העץ הלא מגולף\"", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. טבעיות (Ziran) ו&quot;בול העץ הלא מגולף&quot;", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 1, "_description": "האידיאל הדאואיסטי הוא חזרה למצב של \"בול עץ לא מגולף\" (Pǔ) - מצב פשוט, כן ומשוחרר מיומרות, תשוקות מוגזמות והתניות חברתיות. ג'ואנג דזה הדגיש כי אין \"טבע אנושי\" קבוע שצריך לתקן, וכי שיפוטים מוסריים נוקשים של \"טוב\" ו\"רע\" הם המצאות אנושיות שמגבילות את החופש והספונטניות.", "_is_h1": false}, {"id": "knowledge_base_personality_taoism_2_וו_וויי_wu_wei_עשייה_ללא_מאמץ", "label": "2. וו-וויי (Wu Wei) - עשייה ללא מאמץ", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. וו-וויי (Wu Wei) - עשייה ללא מאמץ", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 1, "_description": "מושג הליבה של הדאואיזם. אין הכוונה לחוסר מעש או פסיביות מוחלטת, אלא ל**פעולה ללא התנגדות**. זהו מצב בו האדם פועל בתיאום עם המציאות, ללא כפייה, ללא אגו מנופח וללא מאבק נגד הזרם. כמו המים, שהם רכים וגמישים אך מסוגלים לשחוק אבנים קשות מתוך התמדה וזרימה טבעית בנתיב ההתנגדות הקטנה ביותר.", "_is_h1": false}, {"id": "knowledge_base_personality_taoism_תפיסת_מערכות_היחסים_והאישיות", "label": "תפיסת מערכות היחסים והאישיות", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תפיסת מערכות היחסים והאישיות", "community": 33, "community_name": "Community 33", "source_file": "knowledge_base/personality_taoism.md", "file_type": "document", "degree": 1, "_description": "בדאואיזם, הרמוניה במערכות יחסים נוצרת לא מתוך קודקס של חובות, אלא מתוך **הרפיית השליטה**. \n* **היעדר כפייה:** הניסיון לשנות אנשים אחרים או לכפות עליהם התנהגות מסוימת (גם אם הכוונה טובה) יוצר דיסהרמוניה. קשר אמיתי מתקיים כאשר אנחנו מאפשרים לאחר להיות מי שהוא.\n* **חמלה וענווה:** לאו דזה מונה את \"שלושת האוצרות\" שלו: חמלה, פשטות/חסכנות, וענווה (הסירוב לעמוד בראש). חמלה דאואיסטית היא היכולת להכיל את כאבו של האחר ללא הדחף האגואיסטי \"לתקן\" אותו.\n* **כוחו של השקט:** דרך השתקת האגו וטיפוח שקט פנימי, אדם מייצר סביבו חלל ריק שמאפשר למערכות יחסים להתפתח בצורה אורגנית ואותנטית, ללא חיכוך מיותר.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini", "label": "persuasion_cialdini.md", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "persuasion_cialdini.md", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_ששת_עקרונות_השכנוע_של_צ_אלדיני_cialdini_s_six_principles_of_persuasion", "label": "ששת עקרונות השכנוע של צ'אלדיני (Cialdini's Six Principles of Persuasion)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "ששת עקרונות השכנוע של צ&#x27;אלדיני (Cialdini&#x27;s Six Principles of Persuasion)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nCialdini, R. B. (2001). Influence: Science and practice. Allyn and Bacon.", "_is_h1": true}, {"id": "knowledge_base_persuasion_cialdini_הגדרה", "label": "הגדרה", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "רוברט צ'אלדיני הגדיר שישה קיצורי דרך קוגניטיביים והתנהגותיים שמניעים בני אדם להיענות לבקשות ולשנות את עמדותיהם. עקרונות אלו מבוססים על לחצים חברתיים מולדים וצרכים פסיכולוגיים של עקביות ושייכות.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_ששת_העקרונות", "label": "ששת העקרונות", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 40.0, "font": {"size": 12, "color": "#ffffff"}, "title": "ששת העקרונות", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 7, "_description": "", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_הדדיות_reciprocity", "label": "הדדיות (Reciprocity)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "הדדיות (Reciprocity)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "אנשים מרגישים מחויבים להחזיר טובה למי שנתן להם משהו קודם (מתנה, עזרה או ויתור). המנגנון מבוסס על צורך חברתי אבולוציוני לשיתוף פעולה הדדי.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מנגנון_הוויתור_ההדדי_rejection_then_retreat", "label": "מנגנון הוויתור ההדדי (Rejection-then-Retreat)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מנגנון הוויתור ההדדי (Rejection-then-Retreat)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "טכניקה שבה מציעים הצעה ראשונית גדולה וקיצונית שסביר שתידחה, ולאחר מכן נסוגים להצעה קטנה וסבירה יותר (שהיא מטרתנו האמיתית). הצד השני מפרש את הנסיגה כוויתור ומרגיש מחויב לבצע ויתור נגדי ולהסכים.\n* **יישום:** בקשת תקציב או משימה גדולה תחילה, וצמצום לבקשה הריאלית לאחר סירוב.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מתנות_חד_צדדיות_unsolicited_gifts", "label": "מתנות חד-צדדיות (Unsolicited Gifts)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מתנות חד-צדדיות (Unsolicited Gifts)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "מתן ערך ללא תנאי מפעיל את לחץ ההדדיות באופן לא מודע. אנשים יסכימו להצעות יקרות בהרבה משווי המתנה המקורית רק כדי להשתחרר מהחוב הרגשי.\n* **יישום:** שיתוף מידע מקצועי ייחודי בחינם לפני תחילת משא ומתן.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_עקביות_ומחויבות_commitment_and_consistency", "label": "עקביות ומחויבות (Commitment and Consistency)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "עקביות ומחויבות (Commitment and Consistency)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "אנשים שואפים להיות עקביים עם הצהרות, התחייבויות או פעולות קודמות שלהם, במיוחד אם הן נעשו בפומבי. ברגע שאדם ביצע צעד קטן בכיוון מסוים, קל יותר לשכנע אותו לבצע צעדים גדולים יותר באותו כיוון.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_טכניקת_רגל_בדלת_foot_in_the_door", "label": "טכניקת רגל בדלת (Foot-in-the-door)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "טכניקת רגל בדלת (Foot-in-the-door)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "השגת הסכמה קטנה וקלה לביצוע תחילה, ולאחר מכן הצגת בקשה גדולה בהרבה באותו נושא. ההסכמה הראשונית משנה את התפיסה העצמית של האדם לגבי הנושא.\n* **יישום:** בקשת חתימה על עצומה מקדימה את ההסכמה לתלות שלט תמיכה גדול.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מחויבות_פומבית_ובכתב_public_and_written_commitments", "label": "מחויבות פומבית ובכתב (Public and Written Commitments)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מחויבות פומבית ובכתב (Public and Written Commitments)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "התחייבות שנכתבת או מוצהרת בפני אנשים אחרים היא בעלת סיכויי התמדה עצומים. הלחץ החברתי להיתפס כעקבי ואמין מונע נסיגה.\n* **יישום:** כתיבת יעדים יומיים בקבוצה משותפת או שליחת סיכום משימות בכתב.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_הוכחה_חברתית_social_proof", "label": "הוכחה חברתית (Social Proof)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "הוכחה חברתית (Social Proof)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "במצבי אי-ודאות, אנשים מסתכלים על מעשיהם והתנהגותם של אחרים (במיוחד הדומים להם) כדי לקבוע מהי הפעולה הנכונה.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_עקרון_הדמיון_similarity_principle", "label": "עקרון הדמיון (Similarity Principle)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרון הדמיון (Similarity Principle)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "אנו נוטים לחקות התנהגות של אנשים שאנו מזהים כדומים לנו במעמד, בגיל, או באופי.\n* **יישום:** הצגת סיפורי הצלחה של אנשים מאותה נישה מדויקת של קהל היעד.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_בורות_פלורליסטית_pluralistic_ignorance", "label": "בורות פלורליסטית (Pluralistic Ignorance)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "בורות פלורליסטית (Pluralistic Ignorance)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "במצב עמום, כל אדם מחליט שהכל כשורה מכיוון שאף אחד אחר אינו פועל. הדבר עלול לשתק קבוצות שלמות.\n* **יישום:** הגדרת משימות ואחריות אישית מדויקת לכל חבר צוות כדי למנוע הימנעות קבוצתית.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_חיבוב_liking", "label": "חיבוב (Liking)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "חיבוב (Liking)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "קל יותר לשכנע אנשים שאוהבים אותנו. חיבוב נוצר כתוצאה מדמיון, מחמאות, ושיתוף פעולה לעבר מטרה משותפת.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מציאת_נקודות_דמיון_similarity_mirroring", "label": "מציאת נקודות דמיון (Similarity & Mirroring)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מציאת נקודות דמיון (Similarity &amp; Mirroring)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "אנשים מחבבים את מי שדומה להם. שיקוף שפת גוף, שימוש במונחים דומים ומציאת תחומי עניין משותפים מגבירים את החיבור באופן מיידי.\n* **יישום:** שימוש במונחים מקצועיים של בן שיחך ושיקוף קצב הדיבור שלו.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_שיתוף_פעולה_ומטרות_על_cooperation_superordinate_goals", "label": "שיתוף פעולה ומטרות על (Cooperation & Superordinate Goals)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "שיתוף פעולה ומטרות על (Cooperation &amp; Superordinate Goals)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "מאמץ משותף להשגת מטרה שאי אפשר להשיג לבד שובר מחיצות ומייצר חיבה הדדית חזקה.\n* **יישום:** הצגת פרויקט כמשימה משותפת שבה ההצלחה של שני הצדדים תלויה זה בזה.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_סמכות_authority", "label": "סמכות (Authority)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "סמכות (Authority)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "אנשים נוטים לציית ולהקשיב למומחים או לבעלי תפקידים מוגדרים הנושאים סממני סמכות מוכרים (כמו תארים, תעודות, לבוש רשמי).", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_סממני_סמכות_חיצוניים_trappings_of_authority", "label": "סממני סמכות חיצוניים (Trappings of Authority)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "סממני סמכות חיצוניים (Trappings of Authority)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "תארים אקדמיים, לבוש יוקרתי, ותארים מקצועיים משפיעים על הציות עוד לפני שנבחן תוכן הדברים.\n* **יישום:** הדגשת שנות הניסיון או התמחות ממוקדת בתחילת פגישה מקצועית.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מומחיות_ויושרה_expertise_and_trustworthiness", "label": "מומחיות ויושרה (Expertise and Trustworthiness)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "מומחיות ויושרה (Expertise and Trustworthiness)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "סמכות אמיתית נבנית משילוב של ידע מקצועי מוכח לצד יושרה (כולל נכונות להודות בחולשה קטנה בתחילת הדרך כדי להראות אמינות).\n* **יישום:** הצגת מגבלה קלה של המוצר או השירות מיוזמתך כדי לבנות אמינות מוחלטת להמשך.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_מחסור_scarcity", "label": "מחסור (Scarcity)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 22.9, "font": {"size": 12, "color": "#ffffff"}, "title": "מחסור (Scarcity)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 3, "_description": "הצעה או משאב נתפסים כבעלי ערך רב יותר ככל שהם פחות זמינים, מוגבלים בזמן או בכמות. הפחד מהפסד (Loss Aversion) הוא מניע עוצמתי.", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_עקרון_ההפסד_הנתפס_loss_aversion", "label": "עקרון ההפסד הנתפס (Loss Aversion)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרון ההפסד הנתפס (Loss Aversion)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "אנשים מונעים פי 2 מהפחד להפסיד הזדמנות מאשר מהרצון להרוויח אותה.\n* **יישום:** הצגת הדברים במונחים של \"מה תפסיד אם לא תפעל עכשיו\" במקום רק \"מה תרוויח\".", "_is_h1": false}, {"id": "knowledge_base_persuasion_cialdini_תחרות_על_משאבים_מוגבלים_competition_for_limited_resources", "label": "תחרות על משאבים מוגבלים (Competition for Limited Resources)", "color": {"background": "#4E79A7", "border": "#4E79A7", "highlight": {"background": "#ffffff", "border": "#4E79A7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "תחרות על משאבים מוגבלים (Competition for Limited Resources)", "community": 0, "community_name": "Community 0", "source_file": "knowledge_base/persuasion_cialdini.md", "file_type": "document", "degree": 1, "_description": "מחסור הופך לעוצמתי פי כמה כאשר ישנה תחרות ישירה וגלויה של אנשים אחרים על אותו משאב.\n* **יישום:** יצירת הרשמה מוגבלת בזמן המציגה את מספר הנרשמים הנוכחי.", "_is_h1": false}, ommunity 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "ברטולט ברכט, מחזאי ומשורר גרמני גולה, שינה את פני התיאטרון בעזרת \"התיאטרון האפי\". לגישתו, האמנות לא נועדה לאפשר לאדם לברוח לעולם של רגשות פסיביים, אלא לעורר אותו לחשיבה ביקורתית ולפעולה לשינוי החברה.", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "1. **אפקט הניכור (Verfremdungseffekt):** שבירת האשליה התיאטרלית. המטרה היא לגרום לקהל לא להזדהות רגשית בצורה עיוורת עם הגיבור, אלא לבחון את מעשיו בצורה ביקורתית ולהבין את הכוחות החברתיים המניעים אותו.\n2. **האדם כתוצר של החברה:** אישיות אינה \"טבע מולד\" וקבוע, אלא מושפעת במידה רבה מהמבנה הכלכלי והמעמדי שבו האדם חי.", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_5_יצירות_מפורסמות_ניתוח_ספרותי_ותמטי", "label": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_1_questions_from_a_worker_who_reads_שאלות_של_פועל_קורא", "label": "1. Questions from a Worker Who Reads (שאלות של פועל קורא)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Questions from a Worker Who Reads (שאלות של פועל קורא)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** היסטוריה מנקודת מבט מעמדית, ביקורת על קידוש מנהיגים בודדים.\n*   **ניתוח תמטי:** פועל קורא שואל שאלות לגבי מפעלי הבנייה הגדולים בהיסטוריה (מי בנה את תבאי בעלת שבעת השערים? האם המלכים סחבו את סלעי הענק?). ברכט יוצא נגד כתיבת ההיסטוריה שמתעלמת מהאנשים הפשוטים, ומדגיש שכל הישג קולקטיבי נבנה על גבם של אינדיבידואלים ששמם נשכח.\n*   **מושג מפתח:** *ראייה ביקורתית של יחסי כוח והיסטוריה.*", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_2_to_those_who_follow_in_our_wake_אל_הדורות_הבאים", "label": "2. To Those Who Follow in Our Wake (אל הדורות הבאים)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. To Those Who Follow in Our Wake (אל הדורות הבאים)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** קושי החיים בזמן מלחמה ודיכוי, והמחיר המוסרי של המאבק.\n*   **ניתוח תמטי:** שיר שנכתב מתוך גלות מגרמניה הנאצית. ברכט מתאר תקופה שבה \"שיחה על עצים היא כמעט פשע, משום שהיא כוללת שתיקה על מעשי נבלה כה רבים\". הוא מבקש מהדורות הבאים שיחיו בזמנים קלים יותר לזכור אותם ברחמים, ומסביר שהמאבק באי-צדק אילץ אותם לפעול בקשיחות שפגעה בעדינותם שלהם.\n*   **מושג מפתח:** *השפעת הסביבה הפוליטית הקשה על השחתת או עיצוב הרגש האנושי.*", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_3_the_mask_of_evil_מסכת_הרשע", "label": "3. The Mask of Evil (מסכת הרשע)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. The Mask of Evil (מסכת הרשע)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** המאמץ הכרוך ברשעות לעומת הטבעיות של הטוב.\n*   **ניתוח תמטי:** שיר קצר המתאר מסכה מזרחית של שד עם ורידים נפוחים שמסמלת את הרשע. ברכט מציין שהוורידים הבולטים מראים כמה מאמץ נדרש כדי להיות רע. המסקנה היא שהטבע האנושי הבסיסי נוטה לחמלה, ושרשעות ואכזריות דורשות אנרגיה מנטלית רבה ומאמץ מעוות.\n*   **מושג מפתח:** *הטבע האנושי המולד כנוטה לטוב.*", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_4_general_your_tank_is_a_powerful_vehicle_גנרל_הטנק_שלך_הוא_רכב_חזק", "label": "4. General, Your Tank Is a Powerful Vehicle (גנרל, הטנק שלך הוא רכב חזק)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. General, Your Tank Is a Powerful Vehicle (גנרל, הטנק שלך הוא רכב חזק)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** מגבלות המלחמה והטכנולוגיה מול המרכיב האנושי.\n*   **ניתוח תמטי:** ברכט פונה לגנרל ומציין שהטנק שלו יכול לרמוס יערות ולפוצץ ערים, והמטוס שלו יכול לעוף מהר יותר מסופה, אך לשניהם יש חיסרון אחד גדול: הם זקוקים לאדם כדי להפעיל אותם. השיר מדגיש את כוחו של חופש הבחירה והמצפון של היחיד, שיכול לסרב להוות בורג במכונת המלחמה.\n*   **מושג מפתח:** *חירות המצפון האנושי אל מול מערכות כוח.*", "_is_h1": false}, {"id": "knowledge_base_poetry_brecht_5_song_of_the_moldau_שיר_המולדו", "label": "5. Song of the Moldau (שיר המולדו)", "color": {"background": "#76B7B2", "border": "#76B7B2", "highlight": {"background": "#ffffff", "border": "#76B7B2"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Song of the Moldau (שיר המולדו)", "community": 3, "community_name": "Community 3", "source_file": "knowledge_base/poetry_brecht.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** שינוי היסטורי בלתי נמנע ונפילת עריצים.\n*   **ניתוח תמטי:** שיר המתאר את זרימת המים בנהר המולדו כסמל לזמן שזורם ומשנה הכול. ברכט כותב שגם אם העריצים נראים חזקים כיום, דבר אינו נשאר יציב לנצח, והחלשים והמדוכאים של היום יירשו את העתיד. השיר מנסה להפיח תקווה ומוטיבציה במצבים של דיכוי מתמשך.\n*   **מושג מפתח:** *השלמה עם זרימת הזמן והיכולת לשאת קשיים זמניים.*", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan", "label": "poetry_dylan.md", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_dylan.md", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_זרימה_שינוי_חברתי_וחופש_מוחלט_bob_dylan", "label": "זרימה, שינוי חברתי וחופש מוחלט (Bob Dylan)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "זרימה, שינוי חברתי וחופש מוחלט (Bob Dylan)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nBob Dylan's Lyrics", "_is_h1": true}, {"id": "knowledge_base_poetry_dylan_הגדרה", "label": "הגדרה", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "בוב דילן, חתן פרס נובל לספרות ויוצר משפיע, תרגם שירה לפזמונאות ויצר פסקול דורות שלמים. דרך מילות שיריו הוא חוקר את תפקיד האדם בחברה משתנה, אי-צדק חברתי, וקונפליקטים מורכבים במערכות יחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "1. **ההשלמה עם השינוי:** \"The Times They Are A-Changin'\". דילן עוסק בכורח שבשינוי התמידי, גם ברמה הפוליטית וגם ברמה האישית. מי שלא זורם עם השינוי יטבע; יש להישאר דינמיים ולהמציא את עצמנו מחדש.\n2. **אשליות וחירות:** שירים רבים עוסקים בניפוץ אשליות. דילן אינו סומך על אידיאולוגיות נוקשות. החירות האישית חזקה יותר מכל תיוג.\n3. **אהבה בלתי מושלמת:** שירי האהבה שלו (\"Don't Think Twice, It's All Right\") מציגים לעיתים קרובות פרידות, אכזבות ומורכבות אמיתית, ללא אידיאליזציה סכרינית של מערכת היחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_5_יצירות_מפורסמות_ניתוח_ספרותי_ותמטי", "label": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_1_blowin_in_the_wind_נישא_ברוח", "label": "1. Blowin’ in the Wind (נישא ברוח)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Blowin’ in the Wind (נישא ברוח)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** שאלות קיומיות על צדק, מלחמה וחוסר אדישות אנושית.\n*   **ניתוח תמטי:** השיר מורכב מרצף שאלות רטוריות על כמה סבל צריך לעבור כדי שנכיר בו, וכמה זמן אנשים יכולים להתעלם מאי-צדק. התשובה \"נישאת ברוח\" מסמלת שהפתרונות הם פשוטים, גלויים לעין ונמצאים סביבנו, אך דורשים קשב ורצון פנימי להשתנות.\n*   **מושג מפתח:** *התעוררות מוסרית ואחריות אישית לחברה.*", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_2_the_times_they_are_a_changin_הזמנים_משתנים", "label": "2. The Times They Are A-Changin’ (הזמנים משתנים)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. The Times They Are A-Changin’ (הזמנים משתנים)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** חילופי דורות, זרימה עם השינוי וניפוץ השמרנות.\n*   **ניתוח תמטי:** המנון הקורא לכולם – פוליטיקאים, הורים וכותבים – להבין שהישן מפנה את מקומו לחדש. דילן מדגיש שהניסיון להילחם בשינוי או לשמר מבנים ישנים הוא חסר סיכוי. אישיות בריאה צריכה לדעת להסתגל ולהשתנות.\n*   **מושג מפתח:** *גמישות פסיכולוגית וקבלת ארעיות המציאות.*", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_3_like_a_rolling_stone_כמו_אבן_מתגלגלת", "label": "3. Like a Rolling Stone (כמו אבן מתגלגלת)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Like a Rolling Stone (כמו אבן מתגלגלת)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** אובדן מעמד, התפכחות מאשליות וחופש שנובע מחוסר כל.\n*   **ניתוח תמטי:** פנייה ישירה לאדם שחי חיי מותרות מזויפים ואיבד הכול. למרות הטון המטיף והנוקב, השיר מציג נקודת מבט משחררת: כשאין לך שום דבר להפסיד, אתה חופשי באמת ליצור את זהותך האמיתית ללא תלות בציפיות של אחרים.\n*   **מושג מפתח:** *אובדן אשליות כהזדמנות לאותנטיות.*", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_4_a_hard_rain_s_a_gonna_fall_גשם_כבד_עומד_ליפול", "label": "4. A Hard Rain’s A-Gonna Fall (גשם כבד עומד ליפול)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. A Hard Rain’s A-Gonna Fall (גשם כבד עומד ליפול)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** משבר, מלחמה אפוקליפטית ותפקידו של המשורר כעד.\n*   **ניתוח תמטי:** שיר בעל דימויים סוריאליסטיים עשירים המתאר עולם על סף חורבן (נכתב ברקע משבר הטילים בקובה). דילן מתאר מפגש עם זוועות וחוסר צדק, ומצהיר שתפקידו של האינדיבידואל הוא לעמוד, לראות, לכתוב ולשקף את האמת לעולם לפני שיגיע האסון.\n*   **מושג מפתח:** *חוסן נפשי ותפקיד האמן כנושא האמת.*", "_is_h1": false}, {"id": "knowledge_base_poetry_dylan_5_tangled_up_in_blue_מסובך_בכאב_עצבות", "label": "5. Tangled Up in Blue (מסובך בכאב / עצבות)", "color": {"background": "#59A14F", "border": "#59A14F", "highlight": {"background": "#ffffff", "border": "#59A14F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Tangled Up in Blue (מסובך בכאב / עצבות)", "community": 4, "community_name": "Community 4", "source_file": "knowledge_base/poetry_dylan.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** אהבה לאורך זמן, פרידות ומסעות חיים מצטלבים.\n*   **ניתוח תמטי:** דילן מפרק את המבנה הליניארי של זמן ומתאר מערכת יחסים מורכבת שנפרסת על פני שנים ומרחקים. האוהבים מתקרבים, מתרחקים, משתנים, אך תמיד נותרים קשורים תודעתית ברקע הכללי (\"הכחול\"). השיר מדגים שאהבה אמיתית אינה סטטית אלא דינמית ומעצבת את מסלול חיינו.\n*   **מושג מפתח:** *מורכבות הקשר האנושי לאורך ציר הזמן.*", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot", "label": "poetry_eliot.md", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_eliot.md", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_ניכור_מודרני_שבריריות_וחיפוש_רוחני_t_s_eliot", "label": "ניכור מודרני, שבריריות וחיפוש רוחני (T.S. Eliot)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "ניכור מודרני, שבריריות וחיפוש רוחני (T.S. Eliot)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nT.S. Eliot's The Waste Land and The Love Song of J. Alfred Prufrock", "_is_h1": true}, {"id": "knowledge_base_poetry_eliot_הגדרה", "label": "הגדרה", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "ת.ס. אליוט היה ממובילי השירה המודרניסטית. יצירותיו מתארות את משבר התרבות של תחילת המאה ה-20: תחושת הריקנות, חוסר התוחלת והניכור העמוק בעולם המודרני שאיבד את משמעותו.", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "1. **ארץ הישימון (The Waste Land):** התחושה שהעולם המודרני הוא מקום עקר, שבור וחסר שורשים. האנשים בו נעים כמו מכונות, מתקשרים בצורה שטחית, וסובלים ממשבר רוחני של חוסר יכולת לאהוב באמת או להאמין במשהו.\n2. **שיתוק רגשי וחרדה מודרנית:** דרך הדמות של פּרוּפרוֹק (\"שיר האהבה של ג'יי אלפרד פרופרוק\"), אליוט מתאר אדם שמשותק מהססנות ופחד מפני מה שאחרים יחשבו עליו. \"האם אעז להפריע ליקום?\" הפחד מדחייה מונע ממנו לחיות.", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_5_יצירות_מפורסמות_ניתוח_ספרותי_ותמטי", "label": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_1_the_waste_land_ארץ_הישימון", "label": "1. The Waste Land (ארץ הישימון)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. The Waste Land (ארץ הישימון)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** התפרקות התרבות המערבית שלאחר מלחמת העולם הראשונה, ניכור ועקרות נפשית.\n*   **ניתוח תמטי:** אליוט משתמש בטכניקה של קולאז' ציטוטים ומיתוסים כדי להמחיש את השברים של העולם המודרני. החיים מוצגים כריקים ממשמעות, המערכות הבינאישיות הן שטחיות ומכניות, והעולם כולו מייחל ל\"גשם\" רוחני שישיב לו את החיות והפריון.\n*   **מושג מפתח:** *התפוררות התרבות המשותפת והצורך לחבר מחדש את השברים של העבר.*", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_2_the_love_song_of_j_alfred_prufrock_שיר_האהבה_של_ג_יי_אלפרד_פרופרוק", "label": "2. The Love Song of J. Alfred Prufrock (שיר האהבה של ג'יי אלפרד פרופרוק)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. The Love Song of J. Alfred Prufrock (שיר האהבה של ג&#x27;יי אלפרד פרופרוק)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** שיתוק רגשי, מודעות עצמית מופרזת וחרדה חברתית.\n*   **ניתוח תמטי:** דמותו של פרופרוק היא סמל לאדם המודרני המהסס. הוא רוצה ליצור קשר משמעותי, לבטא רגש או להציע נישואין, אך הפחד משיפוט של הסובבים אותו ומכישלון משתק אותו לחלוטין. הוא מעדיף לסגת ולא להסתכן.\n*   **מושג מפתח:** *הפחד מפני פגיעות (Vulnerability) המוביל לחוסר מעש ובדידות.*", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_3_the_hollow_men_האנשים_החלולים", "label": "3. The Hollow Men (האנשים החלולים)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. The Hollow Men (האנשים החלולים)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** ריקנות רוחנית, אדישות מוסרית וחוסר אונים.\n*   **ניתוח תמטי:** השיר מתאר דמויות שהן כמו דחלילים – מלאים בקש, ללא נשמה או כיוון. הם אינם מסוגלים לבחור בטוב או ברע, ומתקיימים במעין אזור דמדומים קיומי. השיר מדגיש שהאסון הגדול ביותר של האישיות הוא אדישות ואיבוד היכולת להרגיש.\n*   **מושג מפתח:** *הריקנות הפנימית כתוצאה מאיבוד אמונה וערכים.*", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_4_four_quartets_ארבעה_קוורטטים", "label": "4. Four Quartets (ארבעה קוורטטים)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Four Quartets (ארבעה קוורטטים)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** זמן, היסטוריה, זיכרון והחיפוש אחר נקודת השקט הנצחית.\n*   **ניתוח תמטי:** יצירתו המאוחרת והפילוסופית ביותר של אליוט. הוא דן ביחס שבין העבר, ההווה והעתיד, וטוען שניתן לגאול את הזמן האבוד רק באמצעות הגעה ל\"נקודת השקט של העולם המסתובב\" – מצב של מדיטציה, קבלה וחיבור רוחני עמוק שמצוי מעבר לתלאות היומיום.\n*   **מושג מפתח:** *ההשלמה עם הזמן ומציאת שלווה קיומית פנימית.*", "_is_h1": false}, {"id": "knowledge_base_poetry_eliot_5_journey_of_the_magi_מסע_האמגושים", "label": "5. Journey of the Magi (מסע האמגושים)", "color": {"background": "#EDC948", "border": "#EDC948", "highlight": {"background": "#ffffff", "border": "#EDC948"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Journey of the Magi (מסע האמגושים)", "community": 5, "community_name": "Community 5", "source_file": "knowledge_base/poetry_eliot.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** לידה מחדש, הקושי שבשינוי רוחני והקרבת הישן.\n*   **ניתוח תמטי:** השיר מספר את סיפורם של שלושת האמגושים במסעם לבית לחם. המסע מתואר כקשה, מפרך ומלא ספקות. עבורם, לידתו של ישו פירושה גם מותו של העולם הישן והערכים שהם הכירו. השיר מדגים ששינוי אישי עמוק דורש מאיתנו \"להמית\" חלקים מעצמנו כדי לצמוח מחדש.\n*   **מושג מפתח:** *הכאב הכרוך בשינוי אישי ובהתפתחות רוחנית.*", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg", "label": "poetry_ginsberg.md", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_ginsberg.md", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_מרד_זעקה_ואותנטיות_רדיקלית_allen_ginsberg", "label": "מרד, זעקה ואותנטיות רדיקלית (Allen Ginsberg)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "מרד, זעקה ואותנטיות רדיקלית (Allen Ginsberg)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nAllen Ginsberg's Howl and Other Poems", "_is_h1": true}, {"id": "knowledge_base_poetry_ginsberg_הגדרה", "label": "הגדרה", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "אלן גינזברג היה מהקולות המרכזיים של דור הביט (The Beat Generation) בארה\"ב. בפואמה המפורסמת \"יללה\" (Howl), הוא יצא נגד החומרנות, הניכור והצביעות של החברה האמריקאית, וקרא לביטוי חופשי, רוחני ורגשי ללא צנזורה.", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "1. **ביטוי גולמי של הנפש:** גינזברג האמין שהאמנות והחיים צריכים להיות מבוטאים באופן ספונטני ואמיתי לחלוטין (\"המחשבה הראשונה היא המחשבה הטובה ביותר\"). אין להדחיק כאב, שיגעון, יצרים או תשוקות רוחניות למען נימוס חברתי.\n2. **האדם מול המכונה (מולוך):** הוא ראה בחברה הקפיטליסטית המודרנית כוח מדכא שמקריב את הנפש, החמלה והאינדיבידואליות לטובת יעילות וממון.", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_5_יצירות_מפורסמות_ניתוח_ספרותי_ותמטי", "label": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (ניתוח ספרותי ותמטי)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_1_howl_יללה", "label": "1. Howl (יללה)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Howl (יללה)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** זעקה נגד הניכור החברתי, השמדת מוחות יצירתיים על ידי קונפורמיזם, וקידוש השבורים והחריגים.\n*   **ניתוח תמטי:** הפואמה נפתחת בשורה המפורסמת \"ראיתי את הטובים בבני דורי נהרסים על ידי שיגעון...\". גינזברג מאשים את \"מולוך\" (החברה התעשייתית, המכנית והחומרנית) בשבירת נפשו של האדם. הוא קורא להכיר בקדושתה של הנפש האנושית על כל מורכבותה ושיגעונותיה, ומציג סולידריות רדיקלית עם החלשים.\n*   **מושג מפתח:** *שחרור רגשי וזעקה נגד המערכת המדכאת.*", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_2_kaddish_קדיש", "label": "2. Kaddish (קדיש)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Kaddish (קדיש)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** אבל, יחסי אם ובן, שיגעון ופיוס מול המוות.\n*   **ניתוח תמטי:** קינה מונומנטלית על מות אמו, נעמי, שסבלה ממחלת נפש קשה לאורך חייה. גינזברג מתאר באומץ וכנות קשה את הטירוף, הקושי המשפחתי, אך גם את החמלה והאהבה הבלתי מותנית. זהו מסע לניקוי רגשי ולמציאת פיוס מול זיכרונות קשים של פגיעות ואובדן.\n*   **מושג מפתח:** *עיבוד טראומה משפחתית וחיבוק המורכבות של האהבה.*", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_3_a_supermarket_in_california_סופרמרקט_בקליפורניה", "label": "3. A Supermarket in California (סופרמרקט בקליפורניה)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. A Supermarket in California (סופרמרקט בקליפורניה)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** צרכנות מודרנית, ניכור מהטבע וגעגוע לאמנות העבר.\n*   **ניתוח תמטי:** גינזברג משוטט בסופרמרקט הומה ומדמיין שהוא פוגש את וולט ויטמן. הוא מציב את השפע המלאכותי והמנוכר של אמריקה הצרכנית מול האידיאלים של ויטמן של חיבור לטבע ולאחווה. השיר מציג את תחושת הבדידות וההליכה לאיבוד של האינדיבידואל בתוך השפע המודרני.\n*   **מושג מפתח:** *הפער בין השפע החומרי לריקנות הרוחנית.*", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_4_sunflower_sutra_סוטרת_החמניה", "label": "4. Sunflower Sutra (סוטרת החמניה)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Sunflower Sutra (סוטרת החמניה)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** גילוי היופי והקדושה הפנימית בתוך הלכלוך והתעשייה.\n*   **ניתוח תמטי:** תוך כדי ישיבה במגרש גרוטאות מלוכלך, גינזברג וחברו מוצאים חמנייה מכוסה בפיח תעשייתי. החמנייה הופכת למטאפורה לאדם: גם אם אנו מלוכלכים מבחוץ על ידי החברה או הקשיים, אנו לא המעטפת החיצונית שלנו, אלא נותרים יצורים של אור ויופי פנימי.\n*   **מושג מפתח:** *הכרה בערך העצמי ובקדושה הפנימית ללא קשר לנסיבות החיצוניות.*", "_is_h1": false}, {"id": "knowledge_base_poetry_ginsberg_5_america_אמריקה", "label": "5. America (אמריקה)", "color": {"background": "#B07AA1", "border": "#B07AA1", "highlight": {"background": "#ffffff", "border": "#B07AA1"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. America (אמריקה)", "community": 6, "community_name": "Community 6", "source_file": "knowledge_base/poetry_ginsberg.md", "file_type": "document", "degree": 1, "_description": "*   **הנושא:** פוליטיקה, ייאוש אישי, ומערכת היחסים המתוחה של האדם עם מדינתו.\n*   **ניתוח תמטי:** שיר סאטירי ופרובוקטיבי שבו גינזברג מנהל שיחה ישירה עם אמריקה. הוא מבטא ייאוש, הומור, אכזבה וכעס על המלחמות והפרנויה הממשלתית, אך תחת המעטפת הצינית מורגשת דאגה ואהבה עמוקה לעתיד החברה וטבע האדם.\n*   **מושג מפתח:** *עימות עם הממסד ומציאת קול אינדיבידואלי עצמאי.*", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe", "label": "poetry_goethe.md", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_goethe.md", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_הסער_והפרץ_והשאיפה_הבלתי_פוסקת_johann_wolfgang_von_goethe", "label": "הסער והפרץ והשאיפה הבלתי פוסקת (Johann Wolfgang von Goethe)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "הסער והפרץ והשאיפה הבלתי פוסקת (Johann Wolfgang von Goethe)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nJohann Wolfgang von Goethe's Faust", "_is_h1": true}, {"id": "knowledge_base_poetry_goethe_הגדרה", "label": "הגדרה", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "יוהאן וולפגנג פון גתה, גדול סופרי גרמניה, ייצג את תנועת ה\"סער והפרץ\" והרומנטיקה המוקדמת. יצירותיו מתאפיינות בדמויות החוות רגשות סוערים, קונפליקטים עזים בין רגש לתבונה, ושאיפה אינסופית לידע ולמשמעות (כמו ביצירת המופת \"פאוסט\").", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "עקרונות מרכזיים", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "1. **השאיפה האינסופית:** הטרגדיה של פאוסט מדגימה שהאדם ניצל כל עוד הוא ממשיך לשאוף ולהתפתח (\"מי שמתאמץ ושואף תמיד, אותו נוכל לגאול\").\n2. **מורכבות הרגש:** ב\"ייסורי ורתר הצעיר\", גתה מציג את ההרס שעלול להיגרם כאשר הרגש (אהבה נכזבת) משתלט לחלוטין על התבונה, אך גם מעלה על נס את האותנטיות של רגש עמוק ובלתי מתפשר.\n3. **הטבע כהשתקפות הנפש:** החוויה האנושית אינה מנותקת מהטבע; הסערות בטבע משקפות את הסערות בתוך אישיות האדם.", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_5_יצירות_מפורסמות_טקסטים_פומביים", "label": "5 יצירות מפורסמות (טקסטים פומביים)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 35.7, "font": {"size": 12, "color": "#ffffff"}, "title": "5 יצירות מפורסמות (טקסטים פומביים)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 6, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_1_erlkönig_שר_היער", "label": "1. Erlkönig (שר היער)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "1. Erlkönig (שר היער)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "*בלדה דרמטית וטראגית על ילד ואביו הרוכבים בלילה ביער.*\n> \"Wer reitet so spät durch Nacht und Wind?\n> Es ist der Vater mit seinem Kind;\n> Er hat den Knaben wohl in dem Arm,\n> Er fasst ihn sicher, er hält ihn warm.\"\n*הסבר:* שר היער מסמל את הפחדים המודחקים והתת-מודעים של הילד, המאיימים על חייו, בעוד האב המייצג את התבונה הרציונלית מנסה ללא הועיל לפשט את הדברים כ\"תופעות טבע\".", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_2_der_zauberlehrling_שוליית_הקוסם", "label": "2. Der Zauberlehrling (שוליית הקוסם)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "2. Der Zauberlehrling (שוליית הקוסם)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "*משל על אובדן שליטה בשל חוסר ניסיון ויוהרה.*\n> \"Hat der alte Hexenmeister\n> Sich doch einmal wegbegeben!\n> Und nun sollen seine Geister\n> Auch nach meinem Willen leben.\"\n*הסבר:* ניסיון לשלוט בכוחות שהם מעבר ליכולתו של האדם ללא הבנה עמוקה, דבר שמוביל לכאוס. מייצג את החשיבות של מנטורשיפ וצניעות פנימית.", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_3_prometheus_פרומתאוס", "label": "3. Prometheus (פרומתאוס)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "3. Prometheus (פרומתאוס)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "*שיר מרד רוחני של האדם המודרני מול הסמכות העליונה.*\n> \"Bedecke deinen Himmel, Zeus,\n> Mit Wolkendunst!\n> Und übe, dem Knaben gleich,\n> Der Disteln köpft,\n> An Eichen dich und Bergeshöhn!\"\n*הסבר:* פרומתאוס מבטא את החופש וההסתמכות העצמית של האדם, המסרב להשתחוות לכוחות חיצוניים ובונה את חייו ועוצמתו במו ידיו.", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_4_ginkgo_biloba_גינקגו_בילובה", "label": "4. Ginkgo Biloba (גינקגו בילובה)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "4. Ginkgo Biloba (גינקגו בילובה)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "*שיר על אחדות הניגודים המיוצג על ידי עלה הגינקגו.*\n> \"Dieses Baums Blatt, der von Osten\n> Meinem Garten anvertraut,\n> Gibt geheimen Sinn zu kosten,\n> Wie es den Wissenden erbaut.\"\n*הסבר:* גתה רואה בעלה הדו-אונתי סמל לישות אחת שהיא בעצם שתיים, מטאפורה המדגימה את המורכבות של הפיצול וההרמוניה בתוך הנפש ובמערכות יחסים.", "_is_h1": false}, {"id": "knowledge_base_poetry_goethe_5_wanderers_nachtlied_שיר_לילה_לנודד", "label": "5. Wanderers Nachtlied (שיר לילה לנודד)", "color": {"background": "#FF9DA7", "border": "#FF9DA7", "highlight": {"background": "#ffffff", "border": "#FF9DA7"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "5. Wanderers Nachtlied (שיר לילה לנודד)", "community": 7, "community_name": "Community 7", "source_file": "knowledge_base/poetry_goethe.md", "file_type": "document", "degree": 1, "_description": "*שיר קצר המביע חיפוש אחר שלווה פנימית וסיום מסע.*\n> \"Über allen Gipfeln\n> Ist Ruh,\n> In allen Wipfeln\n> Spürest du\n> Kaum einen Hauch;\"\n*הסבר:* הנודד מחפש שלווה בסביבה הטבעית. השיר מציע כי השקט האולטימטיבי מגיע עם קבלת סופיות החיים וההרמוניה עם הטבע.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine", "label": "poetry_heine.md", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "poetry_heine.md", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_אירוניה_רומנטית_ושבריריות_הלב_heinrich_heine", "label": "אירוניה רומנטית ושבריריות הלב (Heinrich Heine)", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 27.1, "font": {"size": 12, "color": "#ffffff"}, "title": "אירוניה רומנטית ושבריריות הלב (Heinrich Heine)", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 4, "_description": "מקור אקדמי:\nHeinrich Heine's Book of Songs", "_is_h1": true}, {"id": "knowledge_base_poetry_heine_הגדרה", "label": "הגדרה", "color": {"background": "#9C755F", "border": "#9C755F", "highlight": {"background": "#ffffff", "border": "#9C755F"}}, "size": 14.3, "font": {"size": 0, "color": "#ffffff"}, "title": "הגדרה", "community": 8, "community_name": "Community 8", "source_file": "knowledge_base/poetry_heine.md", "file_type": "document", "degree": 1, "_description": "היינריך היינה, משורר גרמני-יהודי בולט, גישר בין התקופה הרומנטית לריאליזם. הוא ידוע ביכולתו לשלב רגש רומנטי עמוק ולצידו אירוניה מושחזת המנפצת את האשליה הרומנטית עצמה.", "_is_h1": false}, {"id": "knowledge_base_poetry_heine_עקרונות_מרכזיים", "label": "עקרונות מרכזיים", "color": {"background": "#9C755F", "border": "#9C755F", "hi
