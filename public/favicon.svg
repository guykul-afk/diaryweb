<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <!-- Sky / Sun Gradient -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3e6c" />
      <stop offset="60%" stop-color="#ff7e40" />
      <stop offset="100%" stop-color="#ffbe3b" />
    </linearGradient>
    
    <!-- Sun Glow Gradient -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#fffa65" />
      <stop offset="100%" stop-color="#ff7e40" />
    </linearGradient>

    <!-- Deep Sea Gradient -->
    <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2639" />
      <stop offset="50%" stop-color="#111823" />
      <stop offset="100%" stop-color="#0a0f18" />
    </linearGradient>

    <!-- Sun Reflection on Water Gradient -->
    <linearGradient id="reflectGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffa65" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ff7e40" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff3e6c" stop-opacity="0" />
    </linearGradient>

    <!-- Sun Glow Filter -->
    <filter id="sunGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Rounded Mask/Background -->
  <rect width="48" height="48" rx="12" fill="url(#seaGrad)" />
  
  <!-- Sky Path -->
  <path d="M0 0h48v26H0z" fill="url(#skyGrad)" />

  <!-- Glowing Sun emerging from the horizon -->
  <circle cx="24" cy="26" r="11" fill="url(#sunGrad)" filter="url(#sunGlow)" />

  <!-- Sea Base Over Sky -->
  <path d="M0 26c8-1 16 1 24 0s16-1 24 0v22H0V26z" fill="url(#seaGrad)" />

  <!-- Sun reflection on water surface -->
  <polygon points="17,26 31,26 35,46 13,46" fill="url(#reflectGrad)" style="mix-blend-mode: color-dodge;" />

  <!-- Stylish Sea Waves (Visual representation of sea ripples) -->
  <path d="M 2 30 Q 13 28.5 24 30.5 T 46 30" stroke="#ffd97d" stroke-width="1.2" stroke-linecap="round" opacity="0.65" />
  <path d="M 6 35 Q 17 33.5 28 35.5 T 42 35" stroke="#ff7e40" stroke-width="1.0" stroke-linecap="round" opacity="0.5" />
  <path d="M 12 40 Q 21 38.5 30 40.5 T 38 40" stroke="#38bdf8" stroke-width="0.8" stroke-linecap="round" opacity="0.4" />
</svg>